name: Update Religion Data

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

# ВОТ ЭТОТ БЛОК РЕШАЕТ ПРОБЛЕМУ:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run data builder script
        run: python build_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-update religious data" || echo "No changes to commit"
          git push
