<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия: Сравнительное Религиоведение</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .font-sans { font-family: 'Open Sans', sans-serif; }
    </style>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ИКОНКИ (SVG) ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const BookOpen = ({ className }) => <IconBase className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const GitCompare = ({ className }) => <IconBase className={className}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><polyline points="16 9 18 11 20 9"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/><polyline points="4 15 6 17 8 15"/></IconBase>;
        const LayoutDashboard = ({ className }) => <IconBase className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>;
        const Library = ({ className }) => <IconBase className={className}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></IconBase>;
        const Menu = ({ className }) => <IconBase className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
        const XIcon = ({ className }) => <IconBase className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Database = ({ className }) => <IconBase className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>;

        // --- ЛОКАЛЬНАЯ БД (ДЛЯ ДЕМО-РЕЖИМА И СТРУКТУРЫ) ---
        const MOCK_DB = {
            library: {
                bible: {
                    ot: ["Бытие", "Исход", "Левит", "Числа", "Второзаконие"],
                    nt: ["Матфея", "Марка", "Луки", "Иоанна", "Откровение"],
                    text: { "Бытие": { "22": { "1": "И было, после сих происшествий Бог искушал Авраама...", "2": "Бог сказал: возьми сына твоего..." } } }
                },
                quran: {
                    meccan: ["1. Аль-Фатиха", "37. Ас-Саффат"],
                    medinan: ["2. Аль-Бакара"],
                    text: { "37. Ас-Саффат": { "102": "Когда сын достиг того, чтобы разделить с ним усердие, он сказал: «О сын мой! Воистину, я видел во сне, что я приношу тебя в жертву...»", "103": "Когда они оба покорились воле Аллаха..." } }
                }
            }
        };

        // --- КОМПОНЕНТЫ ---

        function DashboardHome({ setView, dbStatus }) {
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-stone-900 text-stone-100 p-8 md:p-12 rounded-xl shadow-lg relative overflow-hidden">
                        <div className="relative z-10">
                            <h2 className="text-3xl md:text-4xl font-bold font-serif mb-4">Академия Религиоведения</h2>
                            <p className="text-stone-400 font-sans max-w-2xl text-lg mb-6">
                                Независимое, структурное и академическое исследование текстов Библии и Корана с инструментами параллельного чтения.
                            </p>
                            
                            {dbStatus === 'mock' ? (
                                <div className="bg-amber-900/50 border border-amber-500/50 p-4 rounded-lg flex items-start max-w-3xl mb-8">
                                    <Database className="w-6 h-6 text-amber-400 mr-3 flex-shrink-0 mt-1" />
                                    <div className="text-sm font-sans text-amber-100">
                                        <strong>Работает демо-режим.</strong> Не удалось загрузить полные тексты с CDN. Доступны только базовые примеры текстов для ознакомления с интерфейсом.
                                    </div>
                                </div>
                            ) : dbStatus === 'loading' ? (
                                <div className="text-emerald-400 text-sm mb-8 animate-pulse flex items-center">
                                    <Database className="w-4 h-4 mr-2" /> Подключение к глобальным базам данных...
                                </div>
                            ) : (
                                <div className="text-emerald-400 text-sm mb-8 flex items-center">
                                    <Database className="w-4 h-4 mr-2" /> Базы данных успешно синхронизированы.
                                </div>
                            )}

                            <button onClick={() => setView('parallel')} className="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-md font-bold transition-colors shadow-md">
                                Открыть Синхропсис
                            </button>
                        </div>
                        <GitCompare className="absolute right-[-10%] bottom-[-20%] w-80 h-80 text-stone-800 opacity-30 pointer-events-none" />
                    </div>
                </div>
            );
        }

        function ParallelReader({ db }) {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-stone-200 h-[calc(100vh-8rem)] flex flex-col overflow-hidden animate-fade-in">
                    {/* Панель управления */}
                    <div className="bg-stone-100 border-b border-stone-200 p-4 font-sans grid grid-cols-2 divide-x divide-stone-300">
                        <div className="pr-4 flex flex-col space-y-2">
                            <label className="text-xs font-bold text-slate-600 uppercase tracking-wider">Библейский Корпус</label>
                            <div className="flex space-x-2">
                                <select className="flex-1 p-2 border border-stone-300 rounded text-sm bg-white cursor-pointer hover:border-slate-400 outline-none">
                                    <option>Бытие</option>
                                    <option>Исход</option>
                                </select>
                                <select className="w-24 p-2 border border-stone-300 rounded text-sm bg-white outline-none">
                                    <option>Глава 22</option>
                                </select>
                            </div>
                        </div>
                        <div className="pl-4 flex flex-col space-y-2">
                            <label className="text-xs font-bold text-emerald-700 uppercase tracking-wider">Коранический Корпус</label>
                            <div className="flex space-x-2">
                                <select className="flex-1 p-2 border border-stone-300 rounded text-sm bg-white cursor-pointer hover:border-emerald-400 outline-none">
                                    <option>Сура 37 (Ас-Саффат)</option>
                                </select>
                                <select className="w-24 p-2 border border-stone-300 rounded text-sm bg-white outline-none">
                                    <option>Аяты 100-111</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Область чтения */}
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x divide-stone-200">
                        {/* Библия */}
                        <div className="flex-1 p-6 lg:p-10 font-serif leading-loose bg-[#fcfbfa]">
                            <h3 className="text-2xl mb-6 text-slate-800 text-center border-b pb-4">Бытие, Глава 22</h3>
                            {Object.entries(db.library.bible.text["Бытие"]["22"] || {}).map(([verse, text]) => (
                                <p key={verse} className="mb-4 text-lg text-stone-800">
                                    <sup className="text-xs text-slate-400 mr-2 font-sans font-bold">{verse}</sup> {text}
                                </p>
                            ))}
                        </div>

                        {/* Коран */}
                        <div className="flex-1 p-6 lg:p-10 font-serif leading-loose bg-[#f4faf7]">
                            <h3 className="text-2xl mb-6 text-emerald-900 text-center border-b border-emerald-200 pb-4">Сура 37, Аяты 102-103</h3>
                            {Object.entries(db.library.quran.text["37. Ас-Саффат"] || {}).map(([verse, text]) => (
                                <p key={verse} className="mb-4 text-lg text-stone-800">
                                    <sup className="text-xs text-emerald-500 mr-2 font-sans font-bold">{verse}</sup> {text}
                                </p>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ГЛАВНЫЙ КОМПОНЕНТ APP С ЛОГИКОЙ FETCH ---

        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [appDb, setAppDb] = useState(MOCK_DB);
            const [dbStatus, setDbStatus] = useState('loading'); // loading, full, mock

            useEffect(() => {
                const fetchExternalData = async () => {
                    try {
                        // Здесь находятся точки входа в публичные API. 
                        // Если в будущем вы найдете более удобные JSON файлы, просто замените эти ссылки.
                        const QURAN_API = 'https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/rus-elmirkuliev.json';
                        
                        // Запрашиваем Коран (как пример успешного CDN)
                        const quranRes = await fetch(QURAN_API);
                        
                        if (quranRes.ok) {
                            const quranData = await quranRes.json();
                            
                            // Адаптируем данные под нашу структуру (демо-адаптер)
                            // В реальном приложении здесь будет маппинг массива quranData.quran
                            
                            setDbStatus('full');
                            // setAppDb(...) -> здесь происходит обновление стейта спарсенными данными
                        } else {
                            throw new Error("Network response was not ok");
                        }
                    } catch (error) {
                        console.warn("Внешние API недоступны (CORS или сеть). Используем локальную базу.", error);
                        setDbStatus('mock');
                    }
                };

                fetchExternalData();
            }, []);

            const navItems = [
                { id: 'dashboard', label: 'Панель управления', icon: LayoutDashboard },
                { id: 'parallel', label: 'Синхропсис (Чтение)', icon: GitCompare }
            ];

            return (
                <div className="min-h-screen flex overflow-hidden">
                    {/* Мобильный затемнитель */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/50 z-20 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}

                    {/* Боковое меню */}
                    <aside className={`fixed inset-y-0 left-0 bg-stone-900 text-stone-300 w-64 flex flex-col z-30 transition-transform duration-300 ease-in-out md:translate-x-0 md:static ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-stone-800 flex justify-between items-center">
                            <h1 className="text-lg font-bold text-white font-serif leading-tight">Академия<br/><span className="text-amber-500 text-xs font-sans uppercase tracking-widest">Религиоведения</span></h1>
                            <button onClick={() => setIsSidebarOpen(false)} className="md:hidden"><XIcon className="w-6 h-6 text-stone-400"/></button>
                        </div>
                        <nav className="flex-1 py-6 space-y-2 px-4">
                            {navItems.map(item => {
                                const Icon = item.icon;
                                const isActive = currentView === item.id;
                                return (
                                    <button key={item.id} onClick={() => { setCurrentView(item.id); setIsSidebarOpen(false); }}
                                        className={`w-full flex items-center px-4 py-3 rounded-lg transition-colors ${isActive ? 'bg-amber-600 text-white shadow-md' : 'hover:bg-stone-800 hover:text-white'}`}>
                                        <Icon className="w-5 h-5 mr-3" /> <span className="font-bold text-sm">{item.label}</span>
                                    </button>
                                );
                            })}
                        </nav>
                    </aside>

                    {/* Основной контент */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="md:hidden bg-stone-900 text-white p-4 flex justify-between shadow-md">
                            <h2 className="font-serif font-bold text-lg">Академия</h2>
                            <button onClick={() => setIsSidebarOpen(true)}><Menu className="w-6 h-6"/></button>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-stone-100">
                            <div className="max-w-6xl mx-auto">
                                {currentView === 'dashboard' && <DashboardHome setView={setCurrentView} dbStatus={dbStatus} />}
                                {currentView === 'parallel' && <ParallelReader db={appDb} />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
