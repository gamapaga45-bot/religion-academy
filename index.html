            const generate = async (question) => {
                const q = question || text;
                if (!q.trim()) return;
                setLoading(true); setResult('');
                const tradStr = tradition === 'both' ? 'как в Библии, так и в Коране, сравнивая подходы' : tradition === 'bible' ? 'в Библии и христианской традиции' : 'в Коране и исламской традиции';
                const prompt = `Дай глубокий академический анализ темы "${q}" ${tradStr}. Включи: 1) Ключевые отрывки из священных текстов с разбором, 2) Богословскую интерпретацию, 3) Историко-критический анализ, 4) Взгляды разных школ мысли, 5) Практическое значение для верующих.`;
                const res = await fetchZvenoAIAnalysis(prompt, `Тематический анализ: ${q}`, apiKey);
                setResult(res); setLoading(false);
            };

            return (
                <div className="fade-in-up space-y-6 pb-12">
                    <div className="text-center mb-6">
                        <h2 className="text-4xl font-serif font-bold text-stone-900 mb-3">🔬 Глубокий AI Комментарий</h2>
                        <p className="text-stone-500 text-lg">Академический анализ тем через призму Библии и Корана с помощью нейросети</p>
                    </div>

                    {/* Готовые темы */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {DEEP_THEMES.map(t=>(
                            <button key={t.id} onClick={()=>{setTheme(t); setText(t.label); setResult('');}}
                                className={`p-3 rounded-2xl border-2 text-left transition-all ${theme.id===t.id ? 'border-stone-900 bg-stone-900 text-white' : 'border-stone-200 bg-white text-stone-700 hover:border-stone-400'}`}>
                                <span className="text-2xl block mb-1">{t.icon}</span>
                                <span className="text-sm font-bold">{t.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Традиция */}
                    <div className="flex gap-2 bg-stone-100 p-1.5 rounded-2xl w-fit">
                        {[['both','⚖️ Сравнение'],['bible','📖 Библия'],['quran','🌙 Коран']].map(([k,l])=>(
                            <button key={k} onClick={()=>setTradition(k)}
                                className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${tradition===k ? 'bg-white shadow-sm text-stone-900' : 'text-stone-500'}`}>
                                {l}
                            </button>
                        ))}
                    </div>

                    {/* Свой вопрос */}
                    <div className="bg-white border border-stone-200 rounded-2xl p-5">
                        <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3">Или задайте свой вопрос</p>
                        <div className="flex gap-3">
                            <input value={customQ} onChange={e=>setCustomQ(e.target.value)}
                                onKeyDown={e=>e.key==='Enter' && generate(customQ)}
                                placeholder="Например: Как Библия и Коран объясняют существование зла?"
                                className="flex-1 p-3 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 text-sm"/>
                            <button onClick={()=>generate(customQ || text)} disabled={loading}
                                className="bg-stone-900 hover:bg-stone-700 text-white px-6 py-3 rounded-xl font-bold text-sm disabled:opacity-50 transition-all flex items-center gap-2">
                                {loading ? <><Icons.Loader c="w-4 h-4"/>Анализирую</> : <>✨ Анализ</>}
                            </button>
                        </div>
                        <button onClick={()=>generate(text)} disabled={loading}
                            className="mt-3 w-full py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-xl font-bold text-sm disabled:opacity-50 transition-all">
                            {loading ? 'Нейросеть думает...' : `✨ Анализировать: «${theme.label}»`}
                        </button>
                    </div>

                    {/* Результат */}
                    {loading && (
                        <div className="bg-white border border-stone-200 rounded-2xl p-8 flex items-center gap-4 text-stone-500">
                            <Icons.Loader c="w-6 h-6 text-amber-500"/>
                            <div>
                                <p className="font-bold">ZVENO AI анализирует...</p>
                                <p className="text-sm">200+ моделей изучают священные тексты</p>
                            </div>
                        </div>
                    )}
                    {result && (
                        <div className="bg-white border border-stone-200 rounded-3xl p-8">
                            <div className="flex items-center gap-3 mb-6 pb-4 border-b border-stone-100">
                                <Icons.Sparkles c="w-5 h-5 text-amber-500"/>
                                <span className="text-xs font-bold uppercase tracking-widest text-stone-400">ZVENO AI · Академический анализ · {theme.label}</span>
                            </div>
                            <div className="ai-content" dangerouslySetInnerHTML={{__html: result}}/>
                        </div>
                    )}
                </div>
            );
        }
        
        </script>

        <script type="text/babel">
        // ═══ МОДУЛЬ: МИРОВЫЕ РЕЛИГИИ ═══
        function WorldReligionsModule({ apiKey, setAiModal, setView }) {
            const [selReligion, setSelReligion] = useState(null);
            const [aiText, setAiText] = useState('');
            const [aiLoad, setAiLoad] = useState(false);
            const [tab, setTab] = useState('overview'); // overview | texts | compare

            const colors = {
                amber:'bg-amber-50 border-amber-200 text-amber-800',
                emerald:'bg-emerald-50 border-emerald-200 text-emerald-800',
                yellow:'bg-yellow-50 border-yellow-200 text-yellow-800',
                orange:'bg-orange-50 border-orange-200 text-orange-800',
                stone:'bg-stone-100 border-stone-300 text-stone-700',
                blue:'bg-blue-50 border-blue-200 text-blue-800',
                red:'bg-red-50 border-red-200 text-red-800',
                rose:'bg-rose-50 border-rose-200 text-rose-800',
                purple:'bg-purple-50 border-purple-200 text-purple-800',
                pink:'bg-pink-50 border-pink-200 text-pink-800',
            };

            const askAI = async (q) => {
                setAiLoad(true); setAiText('');
                const r = await fetchZvenoAIAnalysis(q, `Религия: ${selReligion?.name}`, apiKey);
                setAiText(r); setAiLoad(false);
            };

            if (!selReligion) return (
                <div className="fade-in-up space-y-6 pb-20 md:pb-6">
                    <div className="bg-[#1c1b1d] text-white rounded-3xl p-6 md:p-10">
                        <h2 className="text-2xl md:text-4xl font-serif font-bold mb-3">🌍 Мировые Религии</h2>
                        <p className="text-stone-400 text-sm md:text-lg">Полные священные тексты, AI-анализ и сравнение 10 великих духовных традиций человечества</p>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        {WORLD_RELIGIONS.map(r => (
                            <button key={r.id} onClick={()=>setSelReligion(r)}
                                className={`p-5 rounded-2xl border-2 text-left transition-all hover:shadow-lg hover:scale-[1.02] bg-white border-stone-200 hover:border-stone-400`}>
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="text-4xl">{r.emoji}</span>
                                    <div>
                                        <p className="font-serif font-bold text-stone-900 text-lg">{r.name}</p>
                                        <p className="text-xs font-bold text-stone-400 uppercase tracking-widest">{r.sub}</p>
                                    </div>
                                </div>
                                <p className="text-sm text-stone-500">{r.desc}</p>
                                <div className="mt-3 flex items-center gap-2">
                                    <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded-full ${colors[r.color]}`}>Читать →</span>
                                    {r.source==='cdn' && <span className="text-[10px] text-emerald-600 font-bold">Полный текст</span>}
                                </div>
                            </button>
                        ))}
                    </div>
                    <div className="bg-white border border-stone-200 rounded-2xl p-6">
                        <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3">🔬 Сравнительный AI-анализ</p>
                        <div className="flex flex-wrap gap-2 mb-3">
                            {['Что объединяет все религии?','Как разные религии объясняют смерть?','Бог в разных религиях — сравнение','Этика и нравственность в мировых религиях'].map(q=>(
                                <button key={q} onClick={()=>{setSelReligion({name:'Все религии',emoji:'🌍'});askAI(q);}}
                                    className="text-xs bg-stone-100 hover:bg-amber-50 border border-stone-200 hover:border-amber-300 rounded-xl px-3 py-2 text-stone-700 transition-all text-left">
                                    {q}
                                </button>
                            ))}
                        </div>
                        {aiLoad && <div className="flex items-center gap-2 text-stone-400 italic py-3"><Icons.Loader c="w-4 h-4 text-amber-500"/> Нейросеть анализирует...</div>}
                        {aiText && <div className="ai-content mt-3 p-4 bg-stone-50 rounded-xl border border-stone-200" dangerouslySetInnerHTML={{__html: aiText}}/>}
                    </div>
                </div>
            );

            const rel = selReligion;
            const texts = RELIGION_TEXTS[rel.id];

            return (
                <div className="fade-in-up space-y-4 pb-20 md:pb-6">
                    <div className="flex items-center gap-3">
                        <button onClick={()=>{setSelReligion(null);setAiText('');}} className="p-2 rounded-xl bg-white border border-stone-200 hover:bg-stone-100 transition-all">
                            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                        </button>
                        <div className="flex items-center gap-3">
                            <span className="text-3xl">{rel.emoji}</span>
                            <div>
                                <h2 className="font-serif font-bold text-xl md:text-2xl text-stone-900">{rel.name}</h2>
                                <p className="text-xs text-stone-400 font-bold uppercase">{rel.sub}</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-2 bg-stone-100 p-1.5 rounded-2xl overflow-x-auto">
                        {[['overview','📖 Обзор'],['texts','📜 Тексты'],['analysis','🔬 AI Анализ'],['compare','⚖️ Сравнение']].map(([k,l])=>(
                            <button key={k} onClick={()=>setTab(k)}
                                className={`flex-shrink-0 py-2 px-3 md:px-4 rounded-xl text-xs md:text-sm font-bold transition-all ${tab===k?'bg-white shadow-sm text-stone-900':'text-stone-500 hover:text-stone-700'}`}>
                                {l}
                            </button>
                        ))}
                    </div>

                    {tab==='overview' && (
                        <div className="bg-white rounded-2xl border border-stone-200 p-5 md:p-8 space-y-6">
                            <div>
                                <h3 className="font-serif font-bold text-xl mb-3">{rel.emoji} {rel.name}</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {[
                                        rel.id==='bible' && ['Последователей','2.4 млрд','✝️'],
                                        rel.id==='quran' && ['Последователей','1.8 млрд','☪️'],
                                        rel.id==='buddhism' && ['Последователей','500 млн','☸️'],
                                        rel.id==='hinduism' && ['Последователей','1.2 млрд','🕉️'],
                                        rel.id==='taoism' && ['Последователей','12 млн','☯️'],
                                        rel.id==='zoroastrism' && ['Последователей','150 тыс','🔥'],
                                        rel.id==='confucianism' && ['Последователей','6 млн','🏮'],
                                        rel.id==='sikhism' && ['Последователей','30 млн','🪯'],
                                        rel.id==='shinto' && ['Последователей','4 млн','⛩️'],
                                        rel.id==='judaism' && ['Последователей','15 млн','✡️'],
                                    ].filter(Boolean).map(([l,v,e])=>(
                                        <div key={l} className="bg-stone-50 rounded-xl p-3 text-center border border-stone-100">
                                            <p className="text-2xl">{e}</p>
                                            <p className="font-bold text-stone-900 text-sm">{v}</p>
                                            <p className="text-[10px] text-stone-400 uppercase">{l}</p>
                                        </div>
                                    ))}
                                    <div className="bg-stone-50 rounded-xl p-3 text-center border border-stone-100">
                                        <p className="text-2xl">📚</p>
                                        <p className="font-bold text-stone-900 text-sm">{texts ? texts.sections.length + ' разделов' : 'Полная база'}</p>
                                        <p className="text-[10px] text-stone-400 uppercase">Священный текст</p>
                                    </div>
                                </div>
                            </div>
                            <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl">
                                <button onClick={()=>askAI(`Дай подробный обзор религии ${rel.name}: история, основатели, ключевые идеи, священные тексты, практики, сколько последователей`)}
                                    className="w-full py-3 bg-stone-900 hover:bg-stone-700 text-white rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                                    <Icons.Sparkles c="w-4 h-4"/> Получить AI-обзор {rel.name}
                                </button>
                                {aiLoad && <div className="mt-3 flex items-center gap-2 text-stone-400 italic"><Icons.Loader c="w-4 h-4 text-amber-500"/> Анализирую...</div>}
                                {aiText && <div className="mt-3 ai-content" dangerouslySetInnerHTML={{__html: aiText}}/>}
                            </div>
                        </div>
                    )}

                    {tab==='texts' && (
                        <div className="space-y-4">
                            {(rel.id==='bible' || rel.id==='quran' || rel.id==='judaism') ? (
                                <div className="bg-white rounded-2xl border border-stone-200 p-6 text-center">
                                    <p className="text-4xl mb-4">{rel.emoji}</p>
                                    <h3 className="font-serif font-bold text-xl mb-2">{rel.sub} — Полный текст</h3>
                                    <p className="text-stone-500 mb-4">Полный текст доступен в разделе «Библия» или «Коран» с AI-анализом каждого стиха</p>
                                    <div className="flex gap-3 justify-center flex-wrap">
                                    {rel.id==='bible' && <button onClick={()=>setView && setView('bible')} className="px-6 py-3 bg-amber-600 text-white rounded-xl font-bold">Читать Библию →</button>}
                                        {rel.id==='quran' && <button onClick={()=>setView && setView('quran')} className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold">Читать Коран →</button>}
                                    </div>
                                </div>
                            ) : texts ? (
                                texts.sections.map((sec, si) => (
                                    <div key={si} className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
                                        <div className={`px-5 py-3 border-b ${colors[rel.color]}`}>
                                            <h4 className="font-serif font-bold text-sm">{sec.title}</h4>
                                            <p className="text-[10px] opacity-70 mt-0.5">{texts.language}</p>
                                        </div>
                                        <div className="p-5 font-serif space-y-4">
                                            {Object.entries(sec.verses).map(([vn, vt]) => (
                                                <div key={vn} className="flex gap-3 group">
                                                    <sup className="text-xs font-sans font-bold mt-1.5 flex-shrink-0 w-5 text-stone-400">{vn}</sup>
                                                    <span className="flex-1 leading-relaxed text-stone-800">{vt}</span>
                                                    <button onClick={async()=>{
                                                            setAiModal({verseId:vn, verseText:vt, label:`${texts.name} ${sec.title} ст.${vn}`, isBible:false, html:'', loading:true});
                                                            const r = await fetchZvenoAIAnalysis(vt, `${rel.tradition||rel.name}, ${texts.name}, ${sec.title}, стих ${vn}`, apiKey);
                                                            setAiModal({verseId:vn, verseText:vt, label:`${texts.name} ${sec.title} ст.${vn}`, isBible:false, html:r, loading:false});
                                                        }}
                                                        className="flex-shrink-0 px-2 py-1 rounded-lg bg-amber-100 hover:bg-amber-300 border border-amber-200 text-amber-700 text-xs font-bold opacity-0 group-hover:opacity-100 transition-all self-start mt-1"
                                                        title="AI Анализ">✨</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))
                            ) : <div className="bg-white rounded-2xl p-8 text-center text-stone-400">Тексты загружаются...</div>}
                        </div>
                    )}

                    {tab==='analysis' && (
                        <div className="bg-white border border-stone-200 rounded-2xl p-5 md:p-6 space-y-4">
                            <p className="text-xs font-bold uppercase tracking-widest text-stone-400">🔬 AI-анализ: {rel.name}</p>
                            <div className="flex flex-wrap gap-2">
                                {[
                                    `Ключевые концепции и учения ${rel.name}`,
                                    `История возникновения ${rel.name}`,
                                    `Священные практики и ритуалы ${rel.name}`,
                                    `${rel.name} и современность`,
                                    `Этика и мораль в ${rel.name}`,
                                ].map(q=>(
                                    <button key={q} onClick={()=>askAI(q)}
                                        className="text-xs bg-stone-100 hover:bg-amber-50 border border-stone-200 hover:border-amber-300 rounded-xl px-3 py-2 text-stone-700 transition-all text-left">
                                        {q}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input id="rel-q" placeholder={`Спросить об ${rel.name}...`}
                                    className="flex-1 p-3 border border-stone-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-amber-500"
                                    onKeyDown={e=>e.key==='Enter'&&askAI(document.getElementById('rel-q').value)}/>
                                <button onClick={()=>askAI(document.getElementById('rel-q').value)}
                                    disabled={aiLoad}
                                    className="px-4 py-3 bg-amber-600 text-white rounded-xl font-bold text-sm disabled:opacity-50">
                                    {aiLoad?'...':'✨'}
                                </button>
                            </div>
                            {aiLoad && <div className="flex items-center gap-2 text-stone-400 italic"><Icons.Loader c="w-4 h-4 text-amber-500"/> Нейросеть анализирует...</div>}
                            {aiText && <div className="ai-content p-4 bg-stone-50 rounded-xl border border-stone-200" dangerouslySetInnerHTML={{__html:aiText}}/>}
                        </div>
                    )}

                    {tab==='compare' && (
                        <div className="bg-white border border-stone-200 rounded-2xl p-5 md:p-6 space-y-4">
                            <p className="text-xs font-bold uppercase tracking-widest text-stone-400">⚖️ Сравнение с другими религиями</p>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                {WORLD_RELIGIONS.filter(r=>r.id!==rel.id).map(r2=>(
                                    <button key={r2.id}
                                        onClick={()=>askAI(`Подробно сравни ${rel.name} (${rel.sub}) и ${r2.name} (${r2.sub}): сходства, различия, отношение к Богу, этика, загробная жизнь, священные тексты`)}
                                        className="p-3 rounded-xl border border-stone-200 hover:border-amber-300 hover:bg-amber-50 text-left transition-all">
                                        <span className="text-xl block">{r2.emoji}</span>
                                        <span className="text-xs font-bold text-stone-700">{rel.emoji} vs {r2.emoji}</span>
                                        <span className="block text-[10px] text-stone-400">{r2.name}</span>
                                    </button>
                                ))}
                            </div>
                            {aiLoad && <div className="flex items-center gap-2 text-stone-400 italic"><Icons.Loader c="w-4 h-4 text-amber-500"/> Сравниваю...</div>}
                            {aiText && <div className="ai-content p-4 bg-stone-50 rounded-xl border border-stone-200 mt-4" dangerouslySetInnerHTML={{__html:aiText}}/>}
                        </div>
                    )}
                </div>
            );
        }

        // ═══ РАЗДЕЛЁННЫЙ ЭКРАН: вспомогательные компоненты ═══
        var SPLIT_SOURCES = [
            { key: 'bible',        label: '📖 Библия',       color: 'amber'   },
            { key: 'quran',        label: '🌙 Коран',          color: 'emerald' },
            { key: 'buddhism',     label: '☸️ Дхаммапада',    color: 'yellow'  },
            { key: 'hinduism',     label: '🕉️ Бхагавад-гита', color: 'orange'  },
            { key: 'taoism',       label: '☯️ Дао Дэ Цзин',   color: 'stone'   },
            { key: 'zoroastrism',  label: '🔥 Авеста',         color: 'red'     },
            { key: 'confucianism', label: '🏮 Лунь Юй',        color: 'rose'    },
            { key: 'sikhism',      label: '🪯 Гуру Грантх',    color: 'purple'  },
            { key: 'shinto',       label: '⛩️ Кодзики',        color: 'pink'    },
        ];
        var SPLIT_COLORS = {
            amber:   { bg:'#fffbeb', border:'#fde68a', hdr:'#fef3c7', num:'#d97706', txt:'#44403c' },
            emerald: { bg:'#ecfdf5', border:'#6ee7b7', hdr:'#d1fae5', num:'#059669', txt:'#064e3b' },
            yellow:  { bg:'#fefce8', border:'#fde047', hdr:'#fef9c3', num:'#ca8a04', txt:'#422006' },
            orange:  { bg:'#fff7ed', border:'#fdba74', hdr:'#ffedd5', num:'#ea580c', txt:'#431407' },
            stone:   { bg:'#f5f5f4', border:'#d6d3d1', hdr:'#e7e5e4', num:'#78716c', txt:'#1c1917' },
            red:     { bg:'#fff1f2', border:'#fca5a5', hdr:'#fee2e2', num:'#dc2626', txt:'#450a0a' },
            rose:    { bg:'#fff1f3', border:'#fda4af', hdr:'#ffe4e6', num:'#e11d48', txt:'#4c0519' },
            purple:  { bg:'#faf5ff', border:'#d8b4fe', hdr:'#ede9fe', num:'#9333ea', txt:'#3b0764' },
            pink:    { bg:'#fdf2f8', border:'#f0abfc', hdr:'#fae8ff', num:'#c026d3', txt:'#4a044e' },
        };

        function SplitPanel({ side, db, setAiModal, apiKey }) {
            const [src, setSrc]       = useState(side === 'left' ? 'bible' : 'quran');
            const [book, setBook]     = useState('');
            const [chap, setChap]     = useState('1');
            const [surah, setSurah]   = useState('');
            const [secIdx, setSecIdx] = useState(0);

            useEffect(() => {
                if (!book && db.order.bible.length) setBook(db.order.bible[0]);
                if (!surah && db.order.quran.length) setSurah(db.order.quran[0]);
            }, [db.order.bible, db.order.quran]);

            const bChaps = src === 'bible' && book && db.texts.bible[book]
                ? Object.keys(db.texts.bible[book]).sort((a,b)=>+a-+b) : [];

            const getVerses = () => {
                if (src === 'bible') return book && chap ? (db.texts.bible[book]?.[chap] || {}) : {};
                if (src === 'quran') return surah ? (db.texts.quran[surah]?.['1'] || {}) : {};
                try {
                    const relData = RELIGION_TEXTS[src];
                    if (relData && relData.sections && relData.sections[secIdx]) {
                        return relData.sections[secIdx].verses || {};
                    }
                } catch(e) {}
                return {};
            };

            const getHeader = () => {
                if (src === 'bible') return book ? book + (chap ? ', Гл. ' + chap : '') : '—';
                if (src === 'quran') return surah || '—';
                try {
                    const relData = RELIGION_TEXTS[src];
                    return relData?.sections?.[secIdx]?.title || SPLIT_SOURCES.find(s=>s.key===src)?.label || src;
                } catch(e) { return src; }
            };

            const srcMeta  = SPLIT_SOURCES.find(s => s.key === src) || SPLIT_SOURCES[0];
            const clr      = SPLIT_COLORS[srcMeta.color] || SPLIT_COLORS.stone;
            const verses   = getVerses();
            const header   = getHeader();
            const entries  = Object.entries(verses).sort((a,b) => +a[0]-+b[0]);
            const relData  = src !== 'bible' && src !== 'quran' ? (() => { try { return RELIGION_TEXTS[src]; } catch(e) { return null; } })() : null;

            return (
                <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0,
                             borderRight: side === 'left' ? '1px solid #e7e5e4' : 'none'}}>
                    {/* Контролы панели */}
                    <div style={{flexShrink:0, padding:'10px 12px', borderBottom:'1px solid #e7e5e4',
                                 background:'#f9f8f6', display:'flex', flexDirection:'column', gap:8}}>
                        {/* Выбор источника */}
                        <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                            {SPLIT_SOURCES.map(s => (
                                <button key={s.key} onClick={() => setSrc(s.key)}
                                    style={{padding:'3px 8px', borderRadius:8, fontSize:11, fontWeight:700,
                                            border: src === s.key ? '1.5px solid #1c1917' : '1.5px solid #e7e5e4',
                                            background: src === s.key ? '#1c1917' : '#fff',
                                            color: src === s.key ? '#fff' : '#78716c',
                                            cursor:'pointer', transition:'all .15s'}}>
                                    {s.label}
                                </button>
                            ))}
                        </div>
                        {/* Библия: книга + глава */}
                        {src === 'bible' && (
                            <div style={{display:'flex', gap:6}}>
                                <select value={book} onChange={e=>{setBook(e.target.value);setChap('1');}}
                                    style={{flex:1, padding:'5px 8px', border:'1px solid #e7e5e4', borderRadius:8,
                                            fontSize:12, fontWeight:700, background:'#fff', outline:'none'}}>
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={chap} onChange={e=>setChap(e.target.value)}
                                    style={{width:72, padding:'5px 8px', border:'1px solid #e7e5e4', borderRadius:8,
                                            fontSize:12, fontWeight:700, background:'#fff', outline:'none'}}>
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        )}
                        {/* Коран: сура */}
                        {src === 'quran' && (
                            <select value={surah} onChange={e=>setSurah(e.target.value)}
                                style={{width:'100%', padding:'5px 8px', border:'1px solid #6ee7b7', borderRadius:8,
                                        fontSize:12, fontWeight:700, background:'#ecfdf5', outline:'none'}}>
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        )}
                        {/* Другие религии: раздел */}
                        {relData && relData.sections && (
                            <select value={secIdx} onChange={e=>setSecIdx(+e.target.value)}
                                style={{width:'100%', padding:'5px 8px', border:'1px solid #e7e5e4', borderRadius:8,
                                        fontSize:12, fontWeight:700, background:'#fff', outline:'none'}}>
                                {relData.sections.map((sec,i) => <option key={i} value={i}>{sec.title}</option>)}
                            </select>
                        )}
                    </div>
                    {/* Заголовок раздела */}
                    <div style={{flexShrink:0, padding:'8px 14px', background:clr.hdr,
                                 borderBottom:'1px solid ' + clr.border,
                                 fontFamily:'sans-serif', fontWeight:700, fontSize:11,
                                 textTransform:'uppercase', letterSpacing:'0.08em', color:clr.num}}>
                        {header}
                    </div>
                    {/* Стихи */}
                    <div style={{flex:1, overflowY:'auto', background:clr.bg, padding:'16px 14px'}}>
                        {entries.length === 0 ? (
                            <div style={{textAlign:'center', color:'#a8a29e', padding:'40px 0', fontSize:13}}>
                                <div style={{fontSize:28, marginBottom:8}}>📖</div>
                                Тексты загружаются...
                            </div>
                        ) : entries.map(([vn, vt]) => (
                            <div key={vn} style={{display:'flex', gap:8, marginBottom:14,
                                                  padding:'4px 6px', borderRadius:10,
                                                  fontFamily:'Georgia,serif'}}>
                                <sup style={{fontSize:11, fontWeight:700, color:clr.num, flexShrink:0,
                                             width:22, textAlign:'right', paddingTop:4, fontFamily:'sans-serif'}}>
                                    {vn}
                                </sup>
                                <span style={{flex:1, fontSize:15, lineHeight:1.75, color:clr.txt}}>{vt}</span>
                                <button
                                    onClick={async () => {
                                        if (!setAiModal) return;
                                        const lbl = header + ', ст.' + vn;
                                        setAiModal({verseId:vn, verseText:vt, label:lbl, isBible:src==='bible', html:'', loading:true});
                                        const r = await fetchZvenoAIAnalysis(vt, lbl, apiKey);
                                        setAiModal({verseId:vn, verseText:vt, label:lbl, isBible:src==='bible', html:r, loading:false});
                                    }}
                                    style={{flexShrink:0, alignSelf:'flex-start', marginTop:2,
                                            padding:'2px 7px', borderRadius:7, fontSize:11, fontWeight:700,
                                            background:clr.hdr, border:'1px solid ' + clr.border,
                                            color:clr.num, cursor:'pointer', opacity:0,
                                            transition:'opacity .15s'}}
                                    onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                                    onMouseLeave={e=>e.currentTarget.style.opacity='0'}
                                    title="AI анализ">✨</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ═══ МОДУЛЬ: РАЗДЕЛЁННЫЙ ЭКРАН ═══
        function SplitViewModule({ db, apiKey, setAiModal }) {
            return (
                <div style={{background:'#fff', borderRadius:24, border:'1px solid #e7e5e4',
                             boxShadow:'0 1px 4px rgba(0,0,0,.06)',
                             height:'calc(100vh - 6rem)', display:'flex', flexDirection:'column', overflow:'hidden'}}>
                    {/* Заголовок */}
                    <div style={{flexShrink:0, padding:'12px 20px', borderBottom:'1px solid #e7e5e4',
                                 background:'#f9f8f6', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                        <h2 style={{fontFamily:'Georgia,serif', fontWeight:700, fontSize:18, color:'#1c1917', margin:0}}>
                            ⚖️ Разделённый экран
                        </h2>
                        <span style={{fontSize:11, color:'#a8a29e', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em'}}>
                            Два текста одновременно
                        </span>
                    </div>
                    {/* Двухпанельный вид */}
                    <div style={{flex:1, display:'flex', flexDirection:'row', overflow:'hidden', minHeight:0}}>
                        <SplitPanel side="left"  db={db} setAiModal={setAiModal} apiKey={apiKey} />
                        <SplitPanel side="right" db={db} setAiModal={setAiModal} apiKey={apiKey} />
                    </div>
                </div>
            );
        }

        // ═══ МОДУЛЬ: ЧИТАЛКА ДЛЯ ЛЮБОЙ РЕЛИГИИ ═══
        function ReligionReaderModule({ apiKey, setAiModal, setView }) {
            const [selId, setSelId] = useState(WORLD_RELIGIONS[2].id);
            const rel = WORLD_RELIGIONS.find(r=>r.id===selId) || WORLD_RELIGIONS[2];
            const texts = RELIGION_TEXTS[rel.id];

            return (
                <div className="space-y-4 pb-20 md:pb-6">
                    <div className="bg-white border border-stone-200 rounded-2xl p-4">
                        <p className="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-2">Выберите традицию</p>
                        <div className="flex flex-wrap gap-2">
                            {WORLD_RELIGIONS.filter(r=>RELIGION_TEXTS[r.id]).map(r=>(
                                <button key={r.id} onClick={()=>setSelId(r.id)}
                                    className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all border ${selId===r.id?'bg-stone-900 text-white border-stone-900':'bg-white border-stone-200 text-stone-600 hover:border-stone-400'}`}>
                                    {r.emoji} {r.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
                        <div className="p-4 border-b border-stone-100 flex items-center gap-3">
                            <span className="text-2xl">{rel.emoji}</span>
                            <div>
                                <h3 className="font-serif font-bold text-lg">{texts?.name}</h3>
                                <p className="text-xs text-stone-400">{texts?.language} · {rel.tradition}</p>
                            </div>
                        </div>

                        {texts ? (
                            <div className="p-4 md:p-6 font-serif space-y-8">
                                {texts.sections.map((sec, si) => (
                                    <div key={si}>
                                        <h4 className="font-sans font-bold text-xs uppercase tracking-widest text-stone-400 mb-4 pb-2 border-b">{sec.title}</h4>
                                        {Object.entries(sec.verses).map(([vn, vt]) => (
                                            <div key={vn} className="mb-4 flex gap-3 group hover:bg-stone-50/80 rounded-xl p-2 -mx-2 transition-all">
                                                <sup className="text-xs font-sans font-bold mt-1.5 flex-shrink-0 w-5 text-amber-500 text-right">{vn}</sup>
                                                <span className="flex-1 text-lg leading-relaxed text-stone-800">{vt}</span>
                                                <button
                                                    onClick={async()=>{
                                                        setAiModal({verseId:vn, verseText:vt, label:`${texts.name}, ${sec.title}, ст.${vn}`, isBible:false, html:'', loading:true});
                                                        const r = await fetchZvenoAIAnalysis(vt, `${rel.tradition}, ${texts.name}, ${sec.title}, стих ${vn}`, apiKey);
                                                        setAiModal({verseId:vn, verseText:vt, label:`${texts.name}, ${sec.title}, ст.${vn}`, isBible:false, html:r, loading:false});
                                                    }}
                                                    className="flex-shrink-0 px-2 py-1 rounded-lg bg-amber-100 hover:bg-amber-300 border border-amber-200 text-amber-700 text-xs font-bold opacity-0 group-hover:opacity-100 transition-all self-start mt-1">
                                                    ✨ AI
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="p-8 text-center text-stone-400">
                                <p className="text-4xl mb-3">{rel.emoji}</p>
                                <p>Полный текст {rel.sub} доступен в разделе «Библия» или «Коран»</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                        hindu:      {text:'Ригведа: «Насадия-сукта» — гимн о творении. Ни небытия, ни бытия не было. Была тёмная бездна. Из тепла (тапас) возникло первое желание. Брахма создаёт мир, Вишну поддерживает, Шива разрушает. Пуруша — первочеловек, из частей которого создан мир.', key:'Тапас → Пуруша → Жертвоприношение → Мир', src:'Ригведа X.129, Пуруша-сукта'},
                        celtic:     {text:'Кельты не оставили систематического космогонического мифа. Мир делится на три сферы: небо, земля, подземный мир (Аннун/Тир-на-Ног). Острова блаженных на западе — вечная земля богов и героев. Дуб — ось мира. Боги-Туата де Дананн пришли с небес.', key:'Три сферы + Мировой дуб + Туата де Дананн', src:'Лейнстерская книга, Mabinogion'},
                        slavic:     {text:'Мировое яйцо или первичные воды. Сварог (небо-кузнец) — верховный бог. Земля лежит на трёх китах или на утке. Часть мифов: мир создан совместно Богом и дьяволом из песка морского дна — дуалистическое творение.', key:'Рожаницы → Сварог → дуализм Бог/Дьявол', src:'Велесова книга, народные предания'},
                        japanese:   {text:'«Кодзики» (712 н.э.): В начале — хаос (камэ). Из него возникли Три Незримых Бога (Дзингосан-тин). Затем семь поколений богов. Последние — Идзанаги и Идзанами. Стоя на «Плавучем мосту Небес», они помешали копьём море — из капель возник остров Оногоро.', key:'Хаос → Идзанаги+Идзанами → капли → острова', src:'Кодзики (712 н.э.), Нихонги (720 н.э.)'},
                        bible:      {text:'Бытие 1: Бог творит из ничего (creatio ex nihilo) шесть дней. День 1: свет. День 2: небо. День 3: суша и растения. День 4: светила. День 5: рыбы и птицы. День 6: животные и человек по образу Бога. День 7: покой — установление субботы.', key:'Creatio ex nihilo, 6 дней, образ Бога', src:'Бытие 1–2 (Тора/ВЗ)'},
                        quran:      {text:'Коран: Аллах создаёт мир «Кун фаякун» — «Будь! — и оно бывает» (2:117). Шесть «дней» (периодов). Небеса и земля были единым целым (21:30) — учёные видят намёк на Большой взрыв. Человек из глины, в него вдохнули Дух Аллаха (15:29).', key:'Кун фаякун, 6 периодов, единство неба и земли', src:'Сура 2:117, 21:30, 7:54, 15:26-29'},
                    },
                    compare:'Все мифологии объединяет: первичный хаос/бездна → упорядочивание → создание человека. Различие: религии авраамической традиции утверждают creatio ex nihilo (творение из ничего), тогда как большинство мифологий описывают творение из уже существующей материи. Интересно: шумерский «Энума Элиш» (1700 до н.э.) предшествует Книге Бытия — и обе используют образ разделения вод. Учёные спорят: влияние или параллельное развитие?',
                    parallel:'Потоп (Ной/Гильгамеш), Тиамат и Левиафан, Мардук и Яхве — библейские образы находят параллели в шумерских мифах. Это либо доказательство заимствования, либо ответы на вечные вопросы, которые люди задают независимо друг от друга.',
                },
                {
                    id:'flood', icon:'🌊', title:'Великий Потоп',
                    desc:'Универсальный миф о гибели и возрождении человечества',
                    data:{
                        greek:      {text:'Девкалион (греческий Ной) — сын Прометея. Зевс решает уничтожить человечество потопом за нечестие. Прометей предупреждает сына. Девкалион строит ящик, 9 дней плывёт, садится на гору Парнас (или Отрис). Выжившие бросают «кости матери» (камни) — из них возникают новые люди.', key:'Девкалион + ящик → Парнас → камни-люди', src:'Пиндар, Аполлодор, Гигин'},
                        norse:      {text:'Берги и Бёстла спасаются от потопа крови, хлынувшего из тела убитого Имира. Остальные ётуны (великаны) тонут в этой крови. Скандинавский потоп — кровь первичного существа, а не вода. Аналогия: хаос уничтожается через смерть первопредка.', key:'Кровь Имира = потоп → гибель ётунов', src:'Старшая Эдда, Прорицание Вёльвы'},
                        egyptian:   {text:'Богиня Хатхор (воплощение Сехмет) была послана Ра уничтожить людей за неверие. Она начала истреблять человечество. Ра передумал: окрасил пиво красным цветом (имитация крови). Сехмет опьянела и остановилась. Это не потоп, но миф о Наказании и Спасении человечества.', key:'Сехмет-разрушительница → пиво → спасение', src:'«Книга небесной коровы» (Гробница Тутанхамона)'},
                        mesopotamia:{text:'ЭПОС О ГИЛЬГАМЕШЕ (таблица XI, ~2100 до н.э.) — самая ранняя версия потопа. Бог Энлиль решает уничтожить людей за шум. Бог Эа предупреждает Утнапиштима. Тот строит куб (60×60×60 локтей), берёт «семя всех живых существ». 6 дней потоп. Птицы ищут землю (ворон, голубь, ласточка). Корабль садится на гору Нисир.', key:'Утнапиштим + куб → Нисир → птицы', src:'Эпос о Гильгамеше, таблица XI (~2100 до н.э.)'},
                        hindu:      {text:'Ману (первочеловек, как Адам и Ной одновременно) спасает маленькую рыбку. Та вырастает и говорит: будет потоп. Ману строит корабль. Рыба (воплощение Вишну — Матсья-аватара) ведёт корабль за свой рог. Корабль садится на гору Гималаи. Ману становится прародителем нового человечества.', key:'Ману + рыба-Вишну → Гималаи → новое человечество', src:'Шатапатха-брахмана, Махабхарата'},
                        celtic:     {text:'Кельтской традиции не известен глобальный потоп. Однако Ирландская мифология описывает гибель первых людей — спутников Кесэр — в потопе. Финтан мак Бохра пережил потоп, превратившись в лосося, орла и ястреба. Тема трансформации, а не спасения в ковчеге.', key:'Финтан → трансформация в животных → выживание', src:'Книга Захватов Ирландии (Лебор Габала Эренн)'},
                        slavic:     {text:'Славянские мифы о потопе сохранились фрагментарно. В некоторых версиях — бог посылает потоп на злых людей, а правведный Ной (уже христианская наслойка) спасается. Архаичные версии: Земля скрывается под водой, утка ныряет и достаёт ил — начало Земли (дуалистический миф).', key:'Утка-ныряльщица → ил → новая земля', src:'Народные предания, богомильские апокрифы'},
                        japanese:   {text:'В японской мифологии нет глобального потопа. Есть миф о Ямасати — бог-рыбак опускается в морское царство. Сюжет о воде скорее связан с морем как источником жизни, нежели разрушения. Богиня Бэндзайтэн — владычица воды — несёт благо, а не гибель.', key:'Ямасати + морское царство — позитивный контакт с водой', src:'Кодзики, книга 1'},
                        bible:      {text:'Бытие 6–9: Ной — единственный праведник. Бог решает уничтожить человечество за грех. Ной строит ковчег 300×50×30 локтей. Берёт по паре каждого животного. 40 дней потопа + 150 дней воды. Птицы (ворон, голубь) ищут сушу. Гора Арарат. Завет (радуга) — Бог обещает больше не уничтожать мир водой.', key:'Ной + ковчег + 40 дней → Арарат → завет-радуга', src:'Бытие 6–9, Коран 11:25-48'},
                        quran:      {text:'Коран (суры 7, 10, 11, 23, 26, 71): Нух (Ной) — пророк, призывавший свой народ 950 лет. Аллах повелевает построить корабль. Сын Нуха отказывается войти и тонет. «Не было между ними никого, кто уверовал, кроме немногих» (11:40). Нух просит спасти сына — Аллах отказывает: неверующий не входит в семью пророка.', key:'Нух + 950 лет + тонущий сын + спасение немногих', src:'Суры 7:59, 10:71, 11:25-48, 71'},
                    },
                    compare:'Потоп — самый универсальный миф человечества. Независимые потопные предания обнаружены у 200+ народов на всех континентах. Шумерский «Атрахасис» (~1700 до н.э.) предшествует библейскому Ною на 1000 лет и имеет те же детали: ковчег, птицы, гора, жертвоприношение после потопа. Вопрос: было ли реальное катастрофическое наводнение в Месопотамии (~5500 до н.э. — затопление Чёрного моря)? Или это архетипический образ очищения и нового начала?',
                    parallel:'Самое поразительное: в шумерском эпосе Утнапиштим посылает ворона, ласточку и голубя — точно так же, как Ной в Бытии. Это не совпадение. Либо библейский текст заимствован из шумерской традиции, либо оба восходят к общему источнику. Исследователи спорят уже 150 лет.',
                },
                {
                    id:'afterlife', icon:'⚰️', title:'Загробная жизнь',
                    desc:'Куда уходит душа после смерти — взгляды разных традиций',
                    data:{
                        greek:      {text:'Аид — подземный мир, разделённый на части. Элизиум (острова блаженных) — для героев и праведников. Тартар — бездна для нечестивцев. Поля Асфодела — для обычных душ. Река Лета — забвение. Харон перевозит души. Судьи: Минос, Радамант, Эак. Орфей спускался в Аид за Эвридикой.', key:'Аид, Элизиум, Тартар, река Лета', src:'Гомер, Одиссея XI; Платон, Федр'},
                        norse:      {text:'Вальхалла — дворец Одина для воинов, павших в битве. 9 миров. Хель — царство мёртвых для тех, кто умер от болезни и старости. Нифльхейм — ледяная бездна. Вальгринды встречают павших воинов. На Рагнарёк мёртвые воины выйдут сражаться. Мост Биврёст ведёт к богам.', key:'Вальхалла (воины) / Хель (остальные) / Рагнарёк', src:'Старшая Эдда, Речи Высокого'},
                        egyptian:   {text:'После смерти душа (Ба) путешествует в Дуат (подземный мир). Сердце взвешивается на весах Маат (богиня справедливости) против пера Маат. Если сердце легче — рай (Поля Тростника, Иару). Если тяжелее — чудовище Амат пожирает душу. Анубис (с головой шакала) сопровождает мёртвых. «Книга Мёртвых» — путеводитель.', key:'Дуат → весы Маат → Поля Тростника или Амат', src:'Книга Мёртвых (1550–50 до н.э.), Тексты Пирамид'},
                        mesopotamia:{text:'Подземный мир — Кур (Иркалла) — мрачное место без различия добра и зла. Все умершие идут туда — воины и цари, злодеи и праведники. «Никто не вернётся оттуда». Это крайний пессимизм: именно он движет Гильгамешем в поисках бессмертия. Единственное исключение — Утнапиштим, спасённый богами.', key:'Кур — одинаково для всех, без воздаяния', src:'Эпос о Гильгамеше, Сошествие Инанны в подземный мир'},
                        hindu:      {text:'Реинкарнация (пунарджанма) — душа (атман) переселяется в новое тело. Карма определяет качество следующего рождения. Сансара — колесо перерождений. Мокша — окончательное освобождение от сансары, слияние атмана с Брахманом. Рай Индры (Сварга) — временное место для хороших людей перед следующим рождением.', key:'Атман → карма → реинкарнация → мокша', src:'Бхагавад-гита 2:19-27, Упанишады'},
                        celtic:     {text:'Тир-на-Ног («Земля юности») — вечный остров на западе, куда уходят герои. Нет смерти, нет болезней. Кухулин переходит туда. Друиды верили в переселение душ (Цезарь упоминает это). Смерть — не конец, а переход в другой мир или другое тело. Каldn и Cauldron — котёл возрождения мёртвых воинов.', key:'Тир-на-Ног + переселение душ + котёл возрождения', src:'Книга Захватов, Mabinogion, Цезарь «О Галльской войне»'},
                        slavic:     {text:'Навь — мир мёртвых, противоположный миру живых (Явь). Вий — владыка подземного мира. Мёртвые превращаются в навей, берегинь, упырей. Предки-покровители защищают живых потомков. Поминание усопших (тризна, Радуница) — важнейший обряд. Чур (дух предка) охраняет границы рода.', key:'Навь + Явь + мёртвые предки-защитники + Вий', src:'Народные верования, летописи, Афанасьев'},
                        japanese:   {text:'Ёми — подземный мир смерти. Идзанами умерла и ушла в Ёми. Идзанаги спустился за ней, увидел её разложившееся тело и бежал. Ёми — место нечистоты, ужаса. Буддийское влияние добавило рай Дзёдо (Чистую землю) и ад Дзигоку. Синтоизм: смерть — нечистота (кэгарэ), требующая очищения.', key:'Ёми (нечистота) + Чистая земля (буддизм) + предки', src:'Кодзики I, буддийские сутры'},
                        bible:      {text:'Шеол (ВЗ) — мрачное место всех умерших, без чёткого воздаяния. Воскресение (Иов 19:25-27, Ис 26:19, Дан 12:2) — надежда на телесное восстановление. НЗ: Небеса (Царство Небесное) для спасённых. Геенна — место наказания нечестивых. Апокалипсис: Новое небо и новая земля. Промежуточное состояние — рай / гадес.', key:'Шеол → воскресение → небеса/геенна → Новый Иерусалим', src:'Бытие 25:8; Ин 14:2-3; Откр 21–22'},
                        quran:      {text:'Барзах — промежуточное состояние после смерти (до Судного дня). Джанна (рай) — вечный сад с реками, плодами, покоем для верующих. Джаханнам — ад с огнём для неверующих. Судный день (Яум аль-Кийама): все воскресают, каждому вручается «книга деяний». Весы (мизан): добрые дела против злых. Мост Сират — тонкий, как лезвие.', key:'Барзах → Судный день → Джанна или Джаханнам', src:'Суры 2:154, 39:42, 56:10-40, 78:21-30'},
                    },
                    compare:'Концепция воздаяния после смерти (рай/ад) появляется в Египте (~2400 до н.э.), персидском зороастризме (~1000 до н.э.) и входит в иудаизм лишь в поздний период. Новый Завет и Коран придали ей центральное место. Реинкарнация (Индия, Греция, кельты) — альтернативная парадигма. Мрачный подземный мир без воздаяния (Месопотамия, ранний Аид) — пессимистическая традиция, от которой люди постепенно отказывались.',
                    parallel:'Платон в «Государстве» (Миф об Эре) описывает суд над душами, рай и ад — за 400 лет до Иисуса. Некоторые исследователи считают, что раннее христианство испытало влияние платонизма в описании загробного мира.',
                },
                {
                    id:'hero', icon:'⚔️', title:'Герой и Спаситель',
                    desc:'Архетип богочеловека, принесшего себя в жертву ради людей',
                    data:{
                        greek:      {text:'Геракл (12 подвигов, искупление) — полубог, сын Зевса и смертной. Страдания → очищение → обожествление. Прометей — похитил огонь у богов, дал людям знание, вечно страдает. Дионис — бог, умирающий и воскресающий (разорван титанами, воскрешён). Орфей — нисходит в ад за возлюбленной.', key:'Смертный отец/небесная мать → страдания → победа', src:'Гесиод, Пиндар, Аполлодор'},
                        norse:      {text:'Один (Вотан) — повесился на Мировом дереве Иггдрасиль 9 дней и ночей, пронзённый копьём, без еды и воды — чтобы получить руны (мудрость). Самопожертвование для обретения знания. Бальдр — прекраснейший из богов, убит омелой, воскреснет после Рагнарёка. Тор жертвует собой в битве со змеем.', key:'Один на дереве = самопожертвование ради мудрости', src:'Старшая Эдда, Речи Высокого 138-139'},
                        egyptian:   {text:'Осирис — бог плодородия и загробного мира. Убит братом Сетом, расчленён. Исида (сестра-жена) собирает части тела, воскрешает его. Гор (сын Осириса) побеждает Сета. Смерть и воскресение Осириса — сезонный цикл природы. Каждый фараон — живой Гор, умерший фараон — Осирис.', key:'Осирис убит → воскрешён Исидой → Гор мстит', src:'Тексты Пирамид; Плутарх «Об Исиде и Осирисе»'},
                        mesopotamia:{text:'Думузи (Таммуз) — бог растительности, муж Инанны/Иштар. Инанна спустилась в подземный мир, её задержали. Чтобы выйти, она отдала Думузи. Он проводит 6 месяцев в подземном мире — смена сезонов. Его страдания оплакивают. Параллель: умирающий и воскресающий бог природы.', key:'Думузи/Таммуз — умирающий бог природы', src:'«Сошествие Инанны», «Сон Думузи» (~2100 до н.э.)'},
                        hindu:      {text:'Вишну-аватары: Бог сходит на землю в разных воплощениях для спасения мира. Рама — 7-й аватар: герой, изгнанный в лес, побеждает демонов, спасает жену Ситу. Кришна — 8-й аватар: сражается с демоном Кансой, открывает истину Арджуне. Калки — будущий аватар, придёт уничтожить зло в конце эпохи.', key:'Аватары Вишну = нисхождение Бога для спасения мира', src:'Рамаяна, Махабхарата, Бхагавата-пурана'},
                        celtic:     {text:'Кухулин — ирландский герой, сын бога Луга и смертной. «Ирландский Геракл»: сверхъестественная сила, неукротимость в битве. Умирает привязанным к столбу — мертвый, но стоящий. Кинг Артур (бриттский цикл) — возможно, кельтский прообраз: раненый уходит на Аваллон и вернётся.', key:'Кухулин + Артур = умирающий-возвращающийся герой', src:'Ulster Cycle, Mabinogion, Historia Regum Britanniae'},
                        slavic:     {text:'Иван-Царевич — архетипический герой, проходящий испытания, спускающийся в иной мир, победитель Кощея (смерти). Добрыня Никитич, Илья Муромец — богатыри, защищающие Русь от сил хаоса. Перун победил змея Велеса — космогоническая битва света и тьмы, устанавливающая порядок мира.', key:'Иван + нисхождение + победа над смертью', src:'Народные сказки, Добрыня, Слово о полку Игореве'},
                        japanese:   {text:'Ямато Такэру — герой, сын императора, победитель великанов и демонов. Трагически одинок, умирает вдали от дома — превращается в белую птицу. Сусаноо — бог бурь, изгнан с небес, убивает восьмиголового змея Ямата-но Ороти. Герой в японской традиции — жертва и победитель одновременно.', key:'Сусаноо + змей; Ямато Такэру → белая птица', src:'Кодзики II–III, Нихонги'},
                        bible:      {text:'Иисус Христос — центральная фигура: Сын Бога, воплотившийся в человеке. Крест — добровольное искупительное жертвоприношение за грехи человечества. Воскресение на 3-й день — победа над смертью. Вознесение. Второе пришествие. Паттерн: небесное происхождение → воплощение → страдание → смерть → воскресение.', key:'Бог → человек → смерть → воскресение → вознесение', src:'Мф 16:16; Ин 3:16; 1 Кор 15; Флп 2:6-11'},
                        quran:      {text:'В исламе нет концепции искупления. Иса (Иисус) — великий пророк и посланник, рождённый от девы Марьям, творивший чудеса. Но он не был распят (4:157) — это «представилось» людям. Аллах вознёс его живым. Мухаммад — Последний Пророк (Хатам ан-Набийин), «Печать пророков». Прообраз героя — пророк, несущий Слово вопреки враждебности.', key:'Иса — пророк без распятия; Мухаммад — последний посланник', src:'Сура 4:157, 3:45-55, 33:40'},
                    },
                    compare:'Паттерн «умирающего и воскресающего бога» (Осирис, Думузи, Бальдр, Дионис) существовал за тысячи лет до христианства. Это факт. Был ли он «прообразом» Христа или независимым архетипом — главный вопрос сравнительного религиоведения. Христианские апологеты II века (Юстин Философ) сами признавали сходство, но объясняли его «подражанием дьявола». Современные учёные (Кэмпбелл, Элиаде) видят в этом универсальный мифологический архетип.',
                    parallel:'Джозеф Кэмпбелл в «Тысячеликом герое» (1949) описал «мономиф»: зов → отправление → испытания → победа → возвращение с даром. Этот путь прослеживается в историях Прометея, Будды, Моисея, Иисуса, Мухаммада (исра и мирадж), Геракла, Кухулина.',
                },
            ],
        };

        function MythologyModule({ apiKey }) {
            const [selTheme, setSelTheme] = useState(MYTH_DATA.themes[0]);
            const [selCulture, setSelCulture] = useState(null);
            const [tab, setTab] = useState('compare'); // compare | detail | parallel
            const [aiText, setAiText] = useState('');
            const [aiLoad, setAiLoad] = useState(false);

            const ALL_KEYS = ['greek','norse','egyptian','mesopotamia','hindu','celtic','slavic','japanese','bible','quran'];

            const askAI = async (q) => {
                setAiLoad(true); setAiText('');
                const r = await fetchZvenoAIAnalysis(q, 'Сравнительная мифология и религиоведение', apiKey);
                setAiText(r); setAiLoad(false);
            };

            const CULTURE_META = {
                greek:      {label:'🏛️ Греческая',  bg:'#fefce8', border:'#fde047', txt:'#713f12'},
                norse:      {label:'⚡ Скандинавская',bg:'#f0f9ff', border:'#7dd3fc', txt:'#075985'},
                egyptian:   {label:'𓂀 Египетская',  bg:'#fff7ed', border:'#fdba74', txt:'#7c2d12'},
                mesopotamia:{label:'𒀭 Месопотамская',bg:'#fdf4ff', border:'#e879f9', txt:'#701a75'},
                hindu:      {label:'🕉️ Ведическая',  bg:'#fff1f2', border:'#fb7185', txt:'#881337'},
                celtic:     {label:'🍀 Кельтская',   bg:'#f0fdf4', border:'#4ade80', txt:'#14532d'},
                slavic:     {label:'⚡ Славянская',  bg:'#eff6ff', border:'#93c5fd', txt:'#1e3a5f'},
                japanese:   {label:'⛩️ Японская',    bg:'#fdf2f8', border:'#f0abfc', txt:'#500724'},
                bible:      {label:'✝️ Библия',       bg:'#fffbeb', border:'#fde68a', txt:'#92400e'},
                quran:      {label:'☪️ Коран',         bg:'#ecfdf5', border:'#6ee7b7', txt:'#065f46'},
            };

            return (
                <div className="fade-in-up space-y-6 pb-20 md:pb-6">
                    {/* Заголовок */}
                    <div className="bg-[#1c1b1d] text-white rounded-3xl p-6 md:p-10">
                        <h2 className="text-2xl md:text-4xl font-serif font-bold mb-3">⚡ Мифология и Религии</h2>
                        <p className="text-stone-400 text-sm md:text-lg">Сравнительный анализ 8 мифологий + Библия + Коран · {MYTH_DATA.themes.length} темы · Для студентов-религиоведов</p>
                        <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
                            {[['Культур','10','Греция, Египет, Скандинавия...'],['Тем','4','Потоп, Герой, Творение...'],['Параллелей','50+','Между мифами и религией'],['Лет истории','5000+','Древнейшие до наших дней']].map(([l,v,n])=>(
                                <div key={l} className="bg-white/5 rounded-2xl p-3 text-center">
                                    <div className="text-amber-400 font-bold text-sm">{v}</div>
                                    <div className="text-white font-bold text-xs mt-1">{n}</div>
                                    <div className="text-stone-500 text-[10px] uppercase tracking-widest mt-0.5">{l}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Темы */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {MYTH_DATA.themes.map(t=>(
                            <button key={t.id} onClick={()=>{setSelTheme(t);setSelCulture(null);setAiText('');}}
                                className={`p-4 rounded-2xl border-2 text-left transition-all hover:shadow-md ${selTheme.id===t.id?'border-amber-500 bg-amber-50 shadow-md':'border-stone-200 bg-white hover:border-stone-300'}`}>
                                <span className="text-3xl block mb-2">{t.icon}</span>
                                <p className="font-serif font-bold text-stone-900 text-sm">{t.title}</p>
                                <p className="text-[10px] text-stone-400 mt-1">{t.desc}</p>
                            </button>
                        ))}
                    </div>

                    {/* Культуры выбор */}
                    <div className="flex flex-wrap gap-2">
                        {ALL_KEYS.map(k=>(
                            <button key={k} onClick={()=>setSelCulture(selCulture===k?null:k)}
                                style={selCulture===k ? {background:CULTURE_META[k].bg, borderColor:CULTURE_META[k].border, color:CULTURE_META[k].txt, borderWidth:2} : {}}
                                className={`px-3 py-1.5 rounded-xl text-xs font-bold border-2 transition-all ${selCulture===k?'':'border-stone-200 bg-white text-stone-600 hover:border-stone-400'}`}>
                                {CULTURE_META[k].label}
                            </button>
                        ))}
                    </div>

                    {/* Вкладки */}
                    <div className="flex gap-2 bg-stone-100 p-1.5 rounded-2xl">
                        {[['compare','🗺️ Сравнительная таблица'],['parallel','🔗 Параллели и связи'],['ai','🤖 AI Анализ']].map(([k,l])=>(
                            <button key={k} onClick={()=>setTab(k)}
                                className={`flex-1 py-2 px-3 rounded-xl text-xs md:text-sm font-bold transition-all ${tab===k?'bg-white shadow text-stone-900':'text-stone-500 hover:text-stone-700'}`}>
                                {l}
                            </button>
                        ))}
                    </div>

                    {/* ТАБЛИЦА СРАВНЕНИЙ */}
                    {tab==='compare' && (
                        <div className="space-y-4">
                            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                                <h3 className="font-serif font-bold text-xl text-amber-900 mb-2">{selTheme.icon} {selTheme.title}</h3>
                                <p className="text-stone-600">{selTheme.desc}</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {ALL_KEYS.filter(k => !selCulture || k===selCulture).map(k => {
                                    const d = selTheme.data[k];
                                    if (!d) return null;
                                    const m = CULTURE_META[k];
                                    return (
                                        <div key={k} className="bg-white rounded-2xl border-2 overflow-hidden"
                                            style={{borderColor: m.border}}>
                                            <div className="px-4 py-3 flex items-center justify-between"
                                                style={{background:m.bg, borderBottom:`1px solid ${m.border}`}}>
                                                <span className="font-bold text-sm" style={{color:m.txt}}>{m.label}</span>
                                                <span className="text-[10px] text-stone-400 italic">{d.src}</span>
                                            </div>
                                            <div className="p-4">
                                                <p className="text-stone-700 text-sm leading-relaxed mb-3">{d.text}</p>
                                                <div className="p-2 rounded-xl text-xs font-bold" style={{background:m.bg, color:m.txt}}>
                                                    🔑 {d.key}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            {/* Академический вывод */}
                            <div className="bg-stone-900 text-white rounded-2xl p-6">
                                <p className="text-amber-400 text-xs font-bold uppercase tracking-widest mb-3">📚 Академический сравнительный анализ</p>
                                <p className="text-stone-200 leading-relaxed">{selTheme.compare}</p>
                            </div>

                            {/* ИЛЛЮСТРАЦИИ — сканы и репродукции из мировых библиотек */}
                            {MYTH_ILLUSTRATIONS[selTheme.id] && (
                                <div>
                                    <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3">
                                        🖼️ Иллюстрации — репродукции из мировых библиотек и музеев
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {MYTH_ILLUSTRATIONS[selTheme.id].map((ill, idx) => (
                                            <div key={idx} className="bg-white border border-stone-200 rounded-2xl overflow-hidden group hover:shadow-lg transition-all">
                                                <div className="h-52 bg-stone-100 overflow-hidden">
                                                    <img src={ill.src} alt={ill.cap}
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                                        onError={e => { e.target.parentNode.style.display='none'; }}
                                                        loading="lazy"/>
                                                </div>
                                                <div className="p-4">
                                                    <p className="text-sm text-stone-700 leading-snug font-serif mb-2">{ill.cap}</p>
                                                    <p className="text-[10px] text-stone-400 font-bold uppercase tracking-wide">
                                                        📚 {ill.lib}
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ПАРАЛЛЕЛИ */}
                    {tab==='parallel' && (
                        <div className="space-y-4">
                            <div className="bg-white border border-stone-200 rounded-2xl p-6">
                                <h3 className="font-serif font-bold text-xl mb-3">{selTheme.icon} {selTheme.title} — Ключевые параллели</h3>
                                <div className="prose prose-stone max-w-none">
                                    <p className="text-stone-700 leading-relaxed text-base">{selTheme.parallel}</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {[
                                    {title:'Мифология → Религия', desc:'Как языческие мифы повлияли на формирование мировых религий', q:`Объясни академически: как древние мифологии (шумерская, египетская, греческая) повлияли на формирование иудейско-христианско-исламской традиции? Конкретные примеры заимствований или параллелей в теме: ${selTheme.title}`, icon:'🌊'},
                                    {title:'Архетипы Юнга', desc:'Коллективное бессознательное и мифологические образы', q:`Проанализируй тему "${selTheme.title}" с точки зрения аналитической психологии Юнга: архетипы Тени, Анимы, Самости, Героя. Как эти образы проявляются в разных мифологиях и религиях?`, icon:'🧠'},
                                    {title:'Структурный анализ', desc:'Метод Леви-Стросса: бинарные оппозиции в мифах', q:`Применив метод структурного анализа Леви-Стросса к теме "${selTheme.title}" в разных мифологиях: найди бинарные оппозиции (жизнь/смерть, хаос/порядок, сакральное/профанное). Как структура мифа отражает устройство общества?`, icon:'⚖️'},
                                ].map(c=>(
                                    <div key={c.title} className="bg-white border border-stone-200 rounded-2xl p-5 space-y-3">
                                        <span className="text-3xl">{c.icon}</span>
                                        <h4 className="font-serif font-bold">{c.title}</h4>
                                        <p className="text-sm text-stone-500">{c.desc}</p>
                                        <button onClick={()=>{setTab('ai');askAI(c.q);}}
                                            className="w-full py-2.5 bg-stone-900 text-white rounded-xl text-xs font-bold hover:bg-stone-700 transition-all">
                                            ✨ AI Анализ →
                                        </button>
                                    </div>
                                ))}
                            </div>
                            {/* Хронология */}
                            <div className="bg-white border border-stone-200 rounded-2xl p-6">
                                <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-4">📅 Хронология текстов о теме «{selTheme.title}»</p>
                                <div className="space-y-2">
                                    {[
                                        ['~3100 до н.э.','Египет','Тексты Пирамид — первые письменные религиозные тексты мира'],
                                        ['~2600 до н.э.','Шумер','Эпос о Гильгамеше — потоп, смерть, поиск бессмертия'],
                                        ['~1500 до н.э.','Индия','Ригведа — гимны, космогония, природа богов'],
                                        ['~950 до н.э.','Израиль','Написание Торы (Яхвист) — Бытие, Исход'],
                                        ['~750 до н.э.','Греция','Гесиод «Теогония», Гомер «Илиада»'],
                                        ['~600 до н.э.','Иран','Авеста — зороастрийские гимны Заратустры'],
                                        ['~500 до н.э.','Индия','Упанишады, Бхагавад-гита'],
                                        ['~100 до н.э.','Иудея','Свитки Мёртвого моря, апокалиптика'],
                                        ['~ 30–70 н.э.','Иудея/Рим','Евангелия Нового Завета'],
                                        ['~ 610–632 н.э.','Аравия','Откровение Корана Мухаммаду ﷺ'],
                                        ['~ 700–800 н.э.','Скандинавия','Исландские саги, Эдды'],
                                        ['712 н.э.','Япония','Кодзики — первая японская хроника мифов'],
                                    ].map(([date, place, desc])=>(
                                        <div key={date} className="flex gap-3 items-start">
                                            <span className="text-amber-600 font-bold text-xs flex-shrink-0 w-28">{date}</span>
                                            <span className="text-stone-400 text-xs flex-shrink-0 w-20">{place}</span>
                                            <span className="text-stone-700 text-sm">{desc}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AI АНАЛИЗ */}
                    {tab==='ai' && (
                        <div className="space-y-4">
                            <div className="bg-white border border-stone-200 rounded-2xl p-5 space-y-3">
                                <p className="text-xs font-bold uppercase tracking-widest text-stone-400">🤖 Вопросы для глубокого анализа — тема: {selTheme.title}</p>
                                <div className="flex flex-wrap gap-2">
                                    {[
                                        `Сравни миф о ${selTheme.title} в шумерской и библейской традиции. Что общего? Что означало заимствование?`,
                                        `Как тема "${selTheme.title}" отражает религиозное мировоззрение своей эпохи? Сравни 3 культуры.`,
                                        `Что говорит ${selTheme.title} о природе человека с точки зрения каждой религии?`,
                                        `Как современная наука (антропология, психология) объясняет универсальность мифа о ${selTheme.title}?`,
                                        `Были ли авторы Библии знакомы с ${selTheme.title} шумерской мифологии? Докажи или опровергни.`,
                                        `Сравни отношение ислама к ${selTheme.title} с христианством и язычеством.`,
                                    ].map(q=>(
                                        <button key={q} onClick={()=>askAI(q)}
                                            className="text-xs bg-stone-100 hover:bg-amber-50 border border-stone-200 hover:border-amber-300 rounded-xl px-3 py-2 text-stone-700 transition-all text-left">
                                            {q}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <input id="myth-q" placeholder="Свой вопрос о сравнительной мифологии..."
                                        className="flex-1 p-3 border border-stone-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-amber-500"
                                        onKeyDown={e=>e.key==='Enter'&&askAI(document.getElementById('myth-q').value)}/>
                                    <button onClick={()=>askAI(document.getElementById('myth-q').value)} disabled={aiLoad}
                                        className="px-4 py-3 bg-amber-600 text-white rounded-xl font-bold disabled:opacity-50">
                                        {aiLoad?'...':'✨'}
                                    </button>
                                </div>
                            </div>
                            {aiLoad && <div className="flex items-center gap-2 text-stone-400 italic p-4"><Icons.Loader c="w-4 h-4 text-amber-500"/> Нейросеть анализирует мифологию...</div>}
                            {aiText && <div className="ai-content p-6 bg-white border border-stone-200 rounded-2xl shadow-sm" dangerouslySetInnerHTML={{__html:aiText}}/>}
                        </div>
                    )}
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════
        // МОДУЛЬ: ПОКЛОНЕНИЕ — Практики богослужения в мировых религиях
        // ════════════════════════════════════════════════════════════════════
        var WORSHIP_DATA = [
            {
                id:'islam', emoji:'☪️', name:'Ислам', place:'Мечеть (Масджид)', color:'#065f46', bg:'#ecfdf5', border:'#6ee7b7',
                img:'https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?w=900&q=85',
                imgCap:'Намаз в мечети. Верующие выстраиваются рядами, обратившись в сторону Мекки.',
                histImg:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Sultan_Ahmed_Mosque_interior.jpg/800px-Sultan_Ahmed_Mosque_interior.jpg',
                histCap:'Интерьер Голубой мечети (Стамбул, XVII в.). Михраб (ниша Киблы), минбар (кафедра).',
                keyPrinciple:'Таухид — абсолютное единство Бога. Поклонение только Аллаху, без посредников.',
                steps:[
