<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия: Сравнительное Религиоведение</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .font-sans { font-family: 'Open Sans', sans-serif; }
        
        /* Кастомный скроллбар для красоты */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ИКОНКИ ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Icons = {
            Book: ({c}) => <IconBase className={c}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>,
            Compare: ({c}) => <IconBase className={c}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><polyline points="16 9 18 11 20 9"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/><polyline points="4 15 6 17 8 15"/></IconBase>,
            Dash: ({c}) => <IconBase className={c}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>,
            Cap: ({c}) => <IconBase className={c}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>,
            Help: ({c}) => <IconBase className={c}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Info: ({c}) => <IconBase className={c}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconBase>,
            Next: ({c}) => <IconBase className={c}><polyline points="9 18 15 12 9 6"/></IconBase>,
            Prev: ({c}) => <IconBase className={c}><polyline points="15 18 9 12 15 6"/></IconBase>,
            Moon: ({c}) => <IconBase className={c}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>
        };

        // --- ДЕМО-БАЗА НА СЛУЧАЙ ОТКЛЮЧЕНИЯ ИНТЕРНЕТА ---
        const DEFAULT_DB = {
            texts: {
                bible: { 
                    "Бытие": { "1": { "1": "В начале сотворил Бог небо и землю." } }
                },
                quran: { 
                    "1. Аль-Фатиха": { "1": "Во имя Аллаха, Милостивого, Милосердного!" }
                }
            }
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---

        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading'); // loading, success, error

            // ЗАГРУЗКА РЕАЛЬНЫХ ТЕКСТОВ ИЗ ПУБЛИЧНЫХ API (ГАРАНТИЯ ПОЛНЫХ ТЕКСТОВ)
            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        // 1. Загрузка полной Библии (Синодальный перевод из открытого репозитория)
                        const bibleRes = await fetch('https://raw.githubusercontent.com/thiagobodruk/bible/master/json/ru_synodal.json');
                        const bibleRaw = await bibleRes.json();
                        
                        const bibleMap = {};
                        bibleRaw.forEach(book => {
                            bibleMap[book.name] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[book.name][cIdx + 1] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[book.name][cIdx + 1][vIdx + 1] = verse;
                                });
                            });
                        });

                        // 2. Загрузка полного Корана (Перевод Кулиева через публичный API)
                        const quranRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                        const quranRaw = await quranRes.json();
                        
                        const quranMap = {};
                        quranRaw.data.surahs.forEach(surah => {
                            const title = `${surah.number}. ${surah.englishName}`;
                            quranMap[title] = {};
                            surah.ayahs.forEach(ayah => {
                                quranMap[title][ayah.numberInSurah] = ayah.text;
                            });
                        });

                        // Сохраняем собранные мега-массивы в память
                        setDb({ texts: { bible: bibleMap, quran: quranMap } });
                        setDataStatus('success');
                    } catch (e) {
                        console.error("Ошибка загрузки публичных API:", e);
                        setDataStatus('error');
                    }
                    setLoading(false);
                };

                loadFullTexts();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {/* Боковое меню */}
                    <aside className="w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-8 border-b border-stone-800/60 flex flex-col justify-center h-32">
                            <h1 className="text-stone-100 font-serif text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar px-3">
                            <div className="px-4 mt-2 mb-2">
                                <span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Основное</span>
                            </div>
                            <NavItem icon={Icons.Dash} label="Главная панель" active={view==='dashboard'} onClick={()=>setView('dashboard')} />
                            <NavItem icon={Icons.Cap} label="Пошаговое чтение" active={view==='steps'} onClick={()=>setView('steps')} />
                            
                            <div className="px-4 mt-8 mb-2">
                                <span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Библиотека текстов</span>
                            </div>
                            <NavItem icon={Icons.Compare} label="Параллельное чтение" active={view==='reader'} onClick={()=>setView('reader')} />
                            <NavItem icon={Icons.Book} label="Полный текст Библии" active={view==='bible'} onClick={()=>setView('bible')} />
                            <NavItem icon={Icons.Moon} label="Полный текст Корана" active={view==='quran'} onClick={()=>setView('quran')} />
                        </nav>
                        
                        {/* Статус загрузки внизу меню */}
                        <div className="p-4 border-t border-stone-800/60 bg-[#161618]">
                            <div className="flex items-center">
                                {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-[10px] font-bold uppercase tracking-wider text-amber-500">Загрузка API...</span></>}
                                {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-[10px] font-bold uppercase tracking-wider text-emerald-500">Базы загружены</span></>}
                                {!loading && dataStatus === 'error' && <><div className="w-2 h-2 rounded-full bg-rose-500 mr-3"></div><span className="text-[10px] font-bold uppercase tracking-wider text-rose-500">Ошибка сети</span></>}
                            </div>
                        </div>
                    </aside>

                    {/* Контентная часть */}
                    <main className="flex-1 ml-72 p-6 md:p-10 min-h-screen bg-[#f5f4f0]">
                        <div className="max-w-6xl mx-auto h-full">
                            {view === 'dashboard' && <Dashboard setView={setView} loading={loading} dataStatus={dataStatus} />}
                            {view === 'steps' && <GuidedReadingModule texts={db.texts} />}
                            {view === 'reader' && <ParallelReaderModule texts={db.texts} />}
                            {view === 'bible' && <SingleReaderModule type="bible" texts={db.texts.bible} />}
                            {view === 'quran' && <SingleReaderModule type="quran" texts={db.texts.quran} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- КОМПОНЕНТЫ НАВИГАЦИИ ---
        function NavItem({ icon: Icon, label, active, onClick }) {
            return (
                <button 
                    onClick={onClick} 
                    className={`w-full flex items-center px-4 py-3 rounded-xl font-bold text-sm transition-all duration-200 group
                    ${active 
                        ? 'bg-amber-600/10 text-amber-500 shadow-sm' 
                        : 'text-stone-400 hover:bg-stone-800 hover:text-stone-200'}`}
                >
                    <Icon c={`w-5 h-5 mr-4 flex-shrink-0 transition-colors ${active ? 'text-amber-500' : 'text-stone-600 group-hover:text-stone-400'}`} /> 
                    <span className="truncate">{label}</span>
                </button>
            );
        }

        function Dashboard({ setView, loading, dataStatus }) {
            return (
                <div className="bg-[#1c1b1d] text-stone-100 p-12 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                    <div className="relative z-10">
                        <h2 className="text-4xl font-serif font-bold mb-4 text-white">Инженерная среда обучения</h2>
                        <p className="text-stone-400 text-lg mb-8 max-w-2xl leading-relaxed">
                            Приложение напрямую подключено к публичным API. Вы имеете доступ к 100% полному тексту Библии (Синодальный перевод) и Корана. Шагайте по главам или читайте параллельно.
                        </p>
                        <div className="flex flex-wrap gap-4 mb-6">
                            <button onClick={()=>setView('steps')} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-amber-900/20 transition-all flex items-center">
                                Начать Пошаговое Чтение <Icons.Next c="w-4 h-4 ml-2"/>
                            </button>
                            <button onClick={()=>setView('reader')} className="bg-stone-700 hover:bg-stone-600 text-white px-8 py-4 rounded-xl font-bold transition-all">
                                Параллельное чтение
                            </button>
                        </div>
                    </div>
                    <Icons.Compare c="absolute -right-10 -bottom-20 w-[400px] h-[400px] text-stone-800 opacity-30 pointer-events-none" />
                </div>
            );
        }

        // --- МОДУЛЬ "ПОШАГОВОЕ ЧТЕНИЕ" (Исправленные "Шаги") ---
        function GuidedReadingModule({ texts }) {
            const [mode, setMode] = useState('bible'); // 'bible' или 'quran'
            
            // Навигационное состояние
            const books = Object.keys(texts[mode] || {});
            const [bookIdx, setBookIdx] = useState(0);
            
            const currentBook = books[bookIdx];
            const chapters = currentBook ? Object.keys(texts[mode][currentBook]) : [];
            const [chapIdx, setChapIdx] = useState(0);

            const currentChapter = chapters[chapIdx];
            const content = currentBook && currentChapter ? texts[mode][currentBook][currentChapter] : {};

            // Сброс индексов при смене режима (Библия -> Коран)
            useEffect(() => {
                setBookIdx(0);
                setChapIdx(0);
            }, [mode]);

            // Логика перехода вперед
            const handleNext = () => {
                if (chapIdx < chapters.length - 1) {
                    setChapIdx(chapIdx + 1); // Следующая глава
                } else if (bookIdx < books.length - 1) {
                    setBookIdx(bookIdx + 1); // Следующая книга
                    setChapIdx(0);
                }
            };

            // Логика перехода назад
            const handlePrev = () => {
                if (chapIdx > 0) {
                    setChapIdx(chapIdx - 1);
                } else if (bookIdx > 0) {
                    setBookIdx(bookIdx - 1);
                    const prevBookChapters = Object.keys(texts[mode][books[bookIdx - 1]]);
                    setChapIdx(prevBookChapters.length - 1); // Последняя глава предыдущей книги
                }
            };

            const isBible = mode === 'bible';
            const themeBg = isBible ? "bg-[#fdfbf7]" : "bg-[#f4faf7]";
            const themeText = isBible ? "text-stone-800" : "text-emerald-900";
            const themeAccent = isBible ? "text-amber-600" : "text-emerald-600";

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    {/* Переключатель режима */}
                    <div className="bg-white border-b p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-stone-200">
                        <div className="flex bg-stone-100 p-1 rounded-xl">
                            <button onClick={()=>setMode('bible')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${isBible ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Библия</button>
                            <button onClick={()=>setMode('quran')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${!isBible ? 'bg-white shadow-sm text-emerald-700' : 'text-stone-500 hover:text-stone-700'}`}>Коран</button>
                        </div>
                        <div className="text-sm font-bold text-stone-400">
                            Книга {bookIdx + 1} из {books.length}
                        </div>
                    </div>

                    {/* Область чтения */}
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${themeBg} ${themeText}`}>
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-3xl font-bold mb-8 pb-6 border-b border-stone-200/50 text-center">
                                {currentBook} {isBible ? `, Глава ${currentChapter}` : ''}
                            </h2>
                            
                            {Object.entries(content).length > 0 ? (
                                Object.entries(content).map(([v, t]) => (
                                    <p key={v} className="mb-6 text-xl">
                                        <sup className={`text-xs font-sans font-bold mr-3 ${themeAccent}`}>{v}</sup>
                                        {t}
                                    </p>
                                ))
                            ) : (
                                <p className="text-center text-stone-400 italic">Текст загружается...</p>
                            )}
                        </div>
                    </div>

                    {/* Навигационные кнопки (Шаги) */}
                    <div className="bg-white border-t border-stone-200 p-6 flex justify-between items-center">
                        <button 
                            onClick={handlePrev} 
                            disabled={bookIdx === 0 && chapIdx === 0}
                            className="flex items-center px-6 py-3 bg-stone-50 text-stone-600 rounded-xl font-bold disabled:opacity-30 hover:bg-stone-100 transition-all border border-stone-200"
                        >
                            <Icons.Prev c="w-4 h-4 mr-2"/> Предыдущая глава
                        </button>
                        
                        <div className="hidden md:block text-xs font-bold uppercase tracking-widest text-stone-400">
                            {currentBook}
                        </div>

                        <button 
                            onClick={handleNext} 
                            disabled={bookIdx === books.length - 1 && chapIdx === chapters.length - 1}
                            className="flex items-center px-8 py-3 bg-[#1c1b1d] text-white rounded-xl font-bold disabled:opacity-30 hover:bg-stone-800 transition-all shadow-md"
                        >
                            Следующая глава <Icons.Next c="w-4 h-4 ml-2"/>
                        </button>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ПОЛНОГО ЧТЕНИЯ (Индивидуально) ---
        function SingleReaderModule({ type, texts }) {
            const isBible = type === 'bible';
            const booksOrSurahs = Object.keys(texts || {});
            const [selectedBook, setSelectedBook] = useState(booksOrSurahs[0] || "");
            
            const chapters = isBible && selectedBook && texts[selectedBook] ? Object.keys(texts[selectedBook]) : [];
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");

            // При первой загрузке или приходе данных - устанавливаем первую книгу
            useEffect(() => {
                if (booksOrSurahs.length > 0 && !selectedBook) {
                    setSelectedBook(booksOrSurahs[0]);
                }
            }, [texts, selectedBook]);

            // При смене книги в Библии - ставим первую главу
            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) {
                    setSelectedChapter(chapters[0]);
                }
            }, [selectedBook, texts, selectedChapter]);

            const content = isBible 
                ? (texts[selectedBook]?.[selectedChapter] || {}) 
                : (texts[selectedBook] || {});

            const themeClasses = isBible 
                ? "bg-[#fdfbf7] text-stone-800" 
                : "bg-[#f4faf7] text-emerald-900";

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">
                                    {isBible ? 'Книга Библии' : 'Сура Корана'}
                                </label>
                                <select 
                                    value={selectedBook} 
                                    onChange={(e) => {
                                        setSelectedBook(e.target.value);
                                        if (isBible) setSelectedChapter("1"); // Жесткий сброс на 1 главу
                                    }} 
                                    className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}
                                >
                                    {booksOrSurahs.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select 
                                        value={selectedChapter} 
                                        onChange={e=>setSelectedChapter(e.target.value)} 
                                        className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer"
                                    >
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${themeClasses}`}>
                        <div className="max-w-3xl mx-auto">
                            <h3 className={`font-sans font-bold text-sm uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).length > 0 ? (
                                Object.entries(content).map(([v, t]) => (
                                    <p key={v} className="mb-6 text-xl">
                                        <sup className={`text-xs font-sans font-bold mr-4 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        {t}
                                    </p>
                                ))
                            ) : (
                                <p className="text-stone-400 italic text-center">Данные загружаются...</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ПАРАЛЛЕЛЬНОГО ЧТЕНИЯ ---
        function ParallelReaderModule({ texts }) {
            const bBooks = Object.keys(texts.bible || {});
            const [bBook, setBBook] = useState(bBooks[0] || "");
            const bChaps = bBook && texts.bible[bBook] ? Object.keys(texts.bible[bBook]) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");

            const qSurahs = Object.keys(texts.quran || {});
            const [qSurah, setQSurah] = useState(qSurahs[0] || "");

            useEffect(() => { 
                if(bBooks.length > 0 && !bBook) setBBook(bBooks[0]); 
                if(qSurahs.length > 0 && !qSurah) setQSurah(qSurahs[0]); 
            }, [texts]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-2 divide-x border-stone-200 shadow-sm z-10">
                        <div className="pr-4 space-y-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Корпус Библии</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 ring-amber-500 outline-none cursor-pointer">
                                    {bBooks.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 ring-amber-500 outline-none cursor-pointer">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="pl-4 space-y-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Корпус Корана</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 focus:ring-2 ring-emerald-500 outline-none text-emerald-900 cursor-pointer">
                                {qSurahs.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(texts.bible[bBook]?.[bChap] || {}).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(texts.quran[qSurah] || {}).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Рендер
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
