            'соломон':  ['сулейман', 'мудрец', 'царь'],
            'сулейман': ['соломон', 'мудрец', 'царь'],
        };

        // Допустимые падежные окончания русских слов (чтобы не ловить "иса" в "Исаак")
        var RU_CASE_ENDINGS = new Set([
            '', 'а', 'е', 'ё', 'и', 'й', 'о', 'у', 'ы', 'ю', 'я',
            'ов', 'ев', 'ей', 'ой', 'ою', 'ам', 'ах', 'ею', 'ью', 'ию',
            'ого', 'ому', 'ому', 'ами', 'ях', 'ием', 'ий', 'ию',
            'ый', 'ые', 'ым', 'ом', 'ую', 'яя', 'не', 'ни', 'ну',
        ]);

        function expandQuery(q) {
            const qL = q.toLowerCase().trim();
            const all = new Set();

            // Шаг 1: Все падежные формы самого запроса
            if (WORD_FORMS_MAP[qL]) {
                WORD_FORMS_MAP[qL].forEach(f => all.add(f));
            } else {
                all.add(qL);
                // Проверяем: может быть пользователь ввёл уже склонённую форму
                // Например, "Исе" → находим базовую форму "иса" и добавляем все её формы
                for (const [base, forms] of Object.entries(WORD_FORMS_MAP)) {
                    if (forms.includes(qL) && base !== qL) {
                        forms.forEach(f => all.add(f));
                        break;
                    }
                }
            }

            // Шаг 2: Синонимы из таблицы + их падежные формы
            if (SEARCH_SYNONYMS[qL]) {
                SEARCH_SYNONYMS[qL].forEach(syn => {
                    if (WORD_FORMS_MAP[syn]) {
                        WORD_FORMS_MAP[syn].forEach(f => all.add(f));
                    } else {
                        all.add(syn);
                    }
                });
            }
            // Если запрос — синоним другого ключа, тоже ищем его формы
            for (const [key, syns] of Object.entries(SEARCH_SYNONYMS)) {
                if (syns.includes(qL)) {
                    if (WORD_FORMS_MAP[key]) {
                        WORD_FORMS_MAP[key].forEach(f => all.add(f));
                    } else {
                        all.add(key);
                    }
                }
            }

            return Array.from(all);
        }

        function matchesAny(text, terms) {
            if (!text || typeof text !== 'string') return { matched: false, term: null };
            const tL = text.toLowerCase();

            for (const term of terms) {
                let pos = 0;
                while (pos <= tL.length - term.length) {
                    const idx = tL.indexOf(term, pos);
                    if (idx === -1) break;

                    // 1. Предыдущий символ не должен быть кириллической буквой
                    //    (термин должен начинать слово)
                    const prevChar = idx > 0 ? tL[idx - 1] : '';
                    if (/[\u0400-\u04FF]/.test(prevChar)) {
                        pos = idx + 1;
                        continue;
                    }

                    // 2. После термина находим всё слово до первого не-кириллического символа
                    const afterStart = idx + term.length;
                    let wordEnd = afterStart;
                    while (wordEnd < tL.length && /[\u0400-\u04FF]/.test(tL[wordEnd])) {
                        wordEnd++;
                    }
                    const suffix = tL.substring(afterStart, wordEnd);

                    // 3. Суффикс должен быть допустимым падежным окончанием
                    if (RU_CASE_ENDINGS.has(suffix)) {
                        return { matched: true, term };
                    }

                    pos = idx + 1;
                }
            }
            return { matched: false, term: null };
        }

        // --- ГЛОБАЛЬНЫЙ ПОИСК ---
        function SearchModule({ db }) {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState({});
            const [searching, setSearching] = useState(false);
            const [hasSearched, setHasSearched] = useState(false);
            const [expandedTerms, setExpandedTerms] = useState([]);

            const PAIRS = [
                ['bible',        'quran'],
                ['buddhism',     'hinduism'],
                ['taoism',       'zoroastrism'],
                ['confucianism', 'sikhism'],
                ['shinto',       null],
            ];

            const REL_META = {
                bible:        { label:'✝️ Библия',        color:'#92400e', bg:'#fffbeb', border:'#fde68a',   badge:'#fef3c7' },
                quran:        { label:'☪️ Коран',           color:'#065f46', bg:'#ecfdf5', border:'#6ee7b7',   badge:'#d1fae5' },
                buddhism:     { label:'☸️ Дхаммапада',     color:'#713f12', bg:'#fefce8', border:'#fde047',   badge:'#fef9c3' },
                hinduism:     { label:'🕉️ Бхагавад-гита',  color:'#7c2d12', bg:'#fff7ed', border:'#fdba74',   badge:'#ffedd5' },
                taoism:       { label:'☯️ Дао Дэ Цзин',    color:'#1c1917', bg:'#f5f5f4', border:'#d6d3d1',   badge:'#e7e5e4' },
                zoroastrism:  { label:'🔥 Авеста',          color:'#7f1d1d', bg:'#fff1f2', border:'#fca5a5',   badge:'#fee2e2' },
                confucianism: { label:'🏮 Лунь Юй',         color:'#881337', bg:'#fff1f3', border:'#fda4af',   badge:'#ffe4e6' },
                sikhism:      { label:'🪯 Гуру Грантх',     color:'#4a044e', bg:'#faf5ff', border:'#d8b4fe',   badge:'#ede9fe' },
                shinto:       { label:'⛩️ Кодзики',         color:'#500724', bg:'#fdf2f8', border:'#f0abfc',   badge:'#fae8ff' },
            };

            const doSearch = () => {
                if (!query || query.trim().length < 2) return;
                const terms = expandQuery(query);
                setExpandedTerms(terms);
                setSearching(true); setHasSearched(true);
                setTimeout(() => {
                    const res = {};
                    // Библия
                    res.bible = [];
                    (db.order.bible || []).forEach(book => {
                        const chapters = db.texts.bible[book]; if (!chapters) return;
                        Object.keys(chapters).forEach(chap => {
                            const verses = chapters[chap]; if (!verses) return;
                            Object.entries(verses).forEach(([vNum, text]) => {
                                const m = matchesAny(text, terms);
                                if (m.matched) res.bible.push({ book, chap, vNum, text, term: m.term });
                            });
                        });
                    });
                    res.bible = res.bible.slice(0, 150);

                    // Коран
                    res.quran = [];
                    (db.order.quran || []).forEach(surah => {
                        const ayahs = db.texts.quran[surah]?.['1']; if (!ayahs) return;
                        Object.entries(ayahs).forEach(([aNum, text]) => {
                            const m = matchesAny(text, terms);
                            if (m.matched) res.quran.push({ surah, aNum, text, term: m.term });
                        });
                    });
                    res.quran = res.quran.slice(0, 150);

                    // Остальные религии
                    ['buddhism','hinduism','taoism','zoroastrism','confucianism','sikhism','shinto'].forEach(relId => {
                        res[relId] = [];
                        try {
                            const relData = RELIGION_TEXTS[relId];
                            if (relData && relData.sections) {
                                relData.sections.forEach(sec => {
                                    Object.entries(sec.verses || {}).forEach(([vn, vt]) => {
                                        const m = matchesAny(vt, terms);
                                        if (m.matched) res[relId].push({ ref: sec.title + ', ст.' + vn, text: vt, term: m.term });
                                    });
                                });
                            }
                        } catch(e) {}
                        res[relId] = res[relId].slice(0, 100);
                    });

                    setResults(res);
                    setSearching(false);
                }, 30);
            };

            const highlight = (text, terms) => {
                if (!text || !terms || !terms.length) return text;
                try {
                    // Строим паттерн с учётом словесных границ (кириллика)
                    // Каждый термин должен начинаться на границе слова
                    // и заканчиваться паддежным окончанием (0-3 символа) + граница
                    const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
                    // Паттерн: начало слова (не кириллица или начало строки) + термин + необязательное окончание
                    const endings = '(?:[аеёийоуыюяьАЕЁИЙОУЫЮЯЬ][а-яёА-ЯЁ]{0,2})?';
                    const pattern = '(?<![а-яёА-ЯЁ])(' + escaped.join('|') + endings + ')(?![а-яёА-ЯЁ])';
                    const parts = text.split(new RegExp(pattern, 'gi'));
                    const termSet = new Set(terms.map(t => t.toLowerCase()));
                    return parts.map((p, i) => {
                        if (!p) return null;
                        const pL = p.toLowerCase();
                        const isMatch = terms.some(t => pL.startsWith(t.toLowerCase()) && RU_CASE_ENDINGS.has(pL.slice(t.length)));
                        return isMatch
                            ? <mark key={i} style={{background:'#fde68a', color:'#92400e', fontWeight:700, padding:'0 2px', borderRadius:3}}>{p}</mark>
                            : p;
                    }).filter(Boolean);
                } catch { return text; }
            };

            const total = Object.values(results).reduce((s, a) => s + (a?.length||0), 0);
            const foundCount = Object.values(results).filter(a => a?.length > 0).length;

            // Рендер колонки одной религии
            const renderCol = (key) => {
                if (!key) return <div key="empty" style={{flex:1}}/>;
                const arr = results[key] || [];
                const meta = REL_META[key];
                const hasResults = arr.length > 0;
                return (
                    <div key={key} style={{flex:1, display:'flex', flexDirection:'column', minWidth:0,
                                           background:hasResults ? meta.bg : '#fafaf9',
                                           border:'1px solid ' + (hasResults ? meta.border : '#e7e5e4'),
                                           borderRadius:16, overflow:'hidden'}}>
                        {/* Заголовок колонки */}
                        <div style={{padding:'10px 14px', borderBottom:'1px solid ' + (hasResults ? meta.border : '#e7e5e4'),
                                     display:'flex', alignItems:'center', justifyContent:'space-between',
                                     background: hasResults ? meta.badge : '#f5f5f4', flexShrink:0}}>
                            <span style={{fontFamily:'sans-serif', fontWeight:700, fontSize:12,
                                          textTransform:'uppercase', letterSpacing:'0.08em',
                                          color: hasResults ? meta.color : '#a8a29e'}}>
                                {meta.label}
                            </span>
                            {hasSearched && (
                                <span style={{fontFamily:'sans-serif', fontSize:11, fontWeight:700,
                                              color: hasResults ? meta.color : '#a8a29e',
                                              background: hasResults ? meta.bg : '#e7e5e4',
                                              padding:'2px 8px', borderRadius:20,
                                              border:'1px solid ' + (hasResults ? meta.border : '#d6d3d1')}}>
                                    {hasResults ? 'НАЙДЕНО: ' + arr.length : 'НЕТ'}
                                </span>
                            )}
                        </div>
                        {/* Результаты */}
                        <div style={{flex:1, overflowY:'auto', padding: hasResults ? '10px 12px' : '24px 12px',
                                     display:'flex', flexDirection:'column', gap:8}}>
                            {!hasSearched ? null : !hasResults ? (
                                <div style={{textAlign:'center', color:'#a8a29e', fontSize:12, padding:'12px 0'}}>
                                    Совпадений не найдено
                                </div>
                            ) : arr.map((r, i) => (
                                <div key={i} style={{padding:'8px 10px', background:'rgba(255,255,255,0.7)',
                                                     border:'1px solid ' + meta.border, borderRadius:10}}>
                                    <div style={{fontFamily:'sans-serif', fontSize:10, fontWeight:700,
                                                 textTransform:'uppercase', letterSpacing:'0.07em',
                                                 color:'#78716c', marginBottom:5}}>
                                        {key==='bible'
                                            ? r.book + ', Гл ' + r.chap + ' · Ст ' + r.vNum
                                            : key==='quran'
                                                ? r.surah + ' · Аят ' + r.aNum
                                                : r.ref}
                                    </div>
                                    <div style={{fontFamily:'Georgia,serif', fontSize:13, lineHeight:1.65,
                                                 color: meta.color}}>
                                        {highlight(r.text, expandedTerms)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div style={{background:'#fff', borderRadius:24, border:'1px solid #e7e5e4',
                             boxShadow:'0 1px 4px rgba(0,0,0,.06)',
                             height:'calc(100vh - 6rem)', display:'flex', flexDirection:'column', overflow:'hidden'}}>

                    {/* ШАПКА */}
                    <div style={{flexShrink:0, padding:'16px 24px', borderBottom:'1px solid #e7e5e4',
                                 background:'#f9f8f6', display:'flex', flexDirection:'column', gap:12}}>
                        <h2 style={{fontFamily:'Georgia,serif', fontWeight:700, fontSize:22, color:'#1c1917',
                                    margin:0, display:'flex', alignItems:'center', gap:8}}>
                            <span style={{color:'#d97706'}}>🔍</span> Глобальный поиск по текстам
                        </h2>

                        {/* Поисковая строка */}
                        <div style={{display:'flex', gap:8}}>
                            <input
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && doSearch()}
                                placeholder="Слово или имя: Иисус, Аллах, любовь, душа, путь..."
                                style={{flex:1, padding:'12px 16px', border:'1.5px solid #d6d3d1',
                                        borderRadius:14, fontFamily:'sans-serif', fontSize:14,
                                        outline:'none', background:'#fff', color:'#1c1917'}}
                            />
                            <button onClick={doSearch} disabled={searching || query.trim().length < 2}
                                style={{padding:'12px 28px', background: searching ? '#78716c' : '#1c1917',
                                        color:'#fff', border:'none', borderRadius:14,
                                        fontFamily:'sans-serif', fontWeight:700, fontSize:14,
                                        cursor: query.trim().length < 2 ? 'not-allowed' : 'pointer',
                                        opacity: query.trim().length < 2 ? 0.5 : 1, transition:'all .15s'}}>
                                {searching ? '⟳ Поиск...' : 'Найти'}
                            </button>
                        </div>

                        {/* Статус */}
                        {hasSearched && !searching && (
                            <div style={{display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
                                <span style={{fontFamily:'sans-serif', fontSize:12, fontWeight:700,
                                              color: total > 0 ? '#059669' : '#dc2626'}}>
                                    {total > 0
                                        ? '✅ Найдено ' + total + ' совпадений в ' + foundCount + ' из 9 источников'
                                        : '❌ Ничего не найдено'}
                                </span>
                                {expandedTerms.length > 1 && (
                                    <span style={{fontFamily:'sans-serif', fontSize:11, color:'#78716c'}}>
                                        Искали: {expandedTerms.slice(0,8).map((t,i) => (
                                            <span key={i} style={{background:'#fef3c7', color:'#92400e',
                                                padding:'1px 5px', borderRadius:4, margin:'0 2px',
                                                fontWeight:700}}>{t}</span>
                                        ))}
                                    </span>
                                )}
                            </div>
                        )}
                    </div>

                    {/* РЕЗУЛЬТАТЫ — двухколоночная сетка */}
                    <div style={{flex:1, overflowY:'auto', padding:'14px 16px', background:'#f5f4f0'}}>
                        {!hasSearched ? (
                            <div style={{textAlign:'center', padding:'60px 0', color:'#a8a29e'}}>
                                <div style={{fontSize:48, marginBottom:12}}>🌍</div>
                                <div style={{fontFamily:'Georgia,serif', fontSize:20, color:'#78716c', marginBottom:8}}>
                                    Поиск по всем священным текстам
                                </div>
                                <div style={{fontSize:13}}>
                                    Библия · Коран · Дхаммапада · Бхагавад-гита · Дао Дэ Цзин · Авеста · Лунь Юй · Гуру Грантх · Кодзики
                                </div>
                                <div style={{marginTop:16, fontSize:12, color:'#d97706', fontWeight:700}}>
                                    🔗 Умный поиск: «Иисус» найдёт «Иса» в Коране, «Бог» — «Аллах», «Господь», «Брахман» и др.
                                </div>
                            </div>
                        ) : (
                            <div style={{display:'flex', flexDirection:'column', gap:12}}>
                                {PAIRS.map((pair, pi) => (
                                    <div key={pi} style={{display:'flex', gap:12, alignItems:'stretch', minHeight:200}}>
                                        {renderCol(pair[0])}
                                        {renderCol(pair[1])}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Параллельное чтение
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-stone-200 shadow-sm z-10 gap-4 md:gap-0">
                        <div className="md:pr-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        </script>

        <script type="text/babel">

        // =====================================================================
        // МОДУЛЬ 1: ПОШАГОВОЕ ИЗУЧЕНИЕ СО СРАВНЕНИЕМ
        // =====================================================================
        const LESSONS = [
            {
                id: 1, title: "Сотворение мира", icon: "✨",
                theme: "Как появился мир? Откуда всё началось?",
                bible: {

                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col" style={{maxHeight:'88vh'}}>
                        <div className="px-6 py-4 flex items-start justify-between border-b border-amber-100 bg-amber-50 rounded-t-3xl flex-shrink-0">
                            <div className="flex-1 pr-4">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-amber-700 mb-1">✨ ZVENO AI · {verseModal.ref}</p>
                                <p className="font-serif text-sm text-stone-700 leading-snug">{verseModal.text.slice(0,120)}{verseModal.text.length>120?'…':''}</p>
                            </div>
                            <button onClick={()=>setVerseModal(null)} className="flex-shrink-0 w-8 h-8 rounded-full bg-white border border-stone-200 flex items-center justify-center text-stone-400 hover:text-red-500 font-bold text-sm ml-2">✕</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6" style={{minHeight:0}}>
                            {verseModal.loading ? (
                                <div className="flex flex-col items-center justify-center py-12 gap-3">
                                    <Icons.Loader c="w-8 h-8 text-amber-500"/>
                                    <p className="font-bold text-stone-600">Анализирую стих...</p>
                                    <p className="text-sm text-stone-400">200+ моделей</p>
                                </div>
                            ) : <div className="ai-content" dangerouslySetInnerHTML={{__html: verseModal.html}}/>}
                        </div>
                        <div className="px-6 py-3 border-t border-stone-100 bg-stone-50 flex justify-between items-center rounded-b-3xl flex-shrink-0">
                            <span className="text-[10px] text-stone-400 font-bold uppercase tracking-widest">Nikolai Rogozin</span>
                            <button onClick={()=>setVerseModal(null)} className="px-5 py-2 bg-stone-900 hover:bg-stone-700 text-white rounded-xl text-xs font-bold transition-all">Закрыть</button>
                        </div>
                    </div>
                </div>
            );

            // ── ОБЩИЙ ЗАГОЛОВОК С КНОПКОЙ НАЗАД ─────────────────────────
            const Header = ({title, sub, color='amber'}) => (
                <div className="flex items-center gap-3 mb-4">
                    <button onClick={()=>{setMode('menu');setAiAnswer('');setVerseModal(null);}}
                        className="p-2 rounded-xl bg-white border border-stone-200 hover:bg-stone-100 transition-all">
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                    </button>
                    <div>
                        <h2 className={`font-serif font-bold text-xl ${color==='amber'?'text-amber-900':color==='emerald'?'text-emerald-900':'text-stone-900'}`}>{title}</h2>
                        <p className="text-xs text-stone-400 font-bold uppercase tracking-widest">{sub}</p>
                    </div>
                </div>
            );

            // ── AI ВОПРОС БЛОК ────────────────────────────────────────────
            const AIBlock = ({placeholder}) => (
                <div className="bg-white border border-stone-200 rounded-2xl p-5 space-y-3">
                    <p className="text-xs font-bold uppercase tracking-widest text-stone-400">🤖 Спросить AI о этом тексте</p>
                    <div className="flex gap-2">
                        <input value={aiQuestion} onChange={e=>setAiQuestion(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&askAI(aiQuestion)}
                            placeholder={placeholder||'Ваш вопрос...'}
                            className="flex-1 p-3 border border-stone-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-amber-500"/>
                        <button onClick={()=>askAI(aiQuestion)} disabled={aiLoading}
                            className="px-4 py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-xl font-bold text-sm disabled:opacity-50">
                            {aiLoading?<Icons.Loader c="w-4 h-4"/>:'✨'}
                        </button>
                    </div>
                    {aiLoading && <div className="flex items-center gap-2 text-stone-400 italic text-sm"><Icons.Loader c="w-4 h-4 text-amber-500"/>Анализирую...</div>}
                    {aiAnswer && <div className="ai-content p-4 bg-stone-50 rounded-xl border border-stone-200 text-sm" dangerouslySetInnerHTML={{__html:aiAnswer}}/>}
                </div>
            );

            // ── ОБЩИЙ РЕНДЕР СТИХОВ С КНОПКОЙ AI ─────────────────────────
            const VerseList = ({verses, color, chapLabel}) => {
                const isAmber = color==='amber';
                const entries = Object.entries(verses).sort((a,b)=>+a[0]-+b[0]);
                if (!entries.length) return <div className="text-center text-stone-400 py-12 font-serif">Тексты загружаются... Проверьте подключение к интернету.</div>;
                return (
                    <div className={`rounded-2xl border ${isAmber?'border-amber-100 bg-amber-50/30':'border-emerald-100 bg-emerald-50/30'} overflow-hidden`}>
                        {chapLabel && <div className={`px-5 py-3 border-b font-sans font-bold text-xs uppercase tracking-widest ${isAmber?'border-amber-200 text-amber-700 bg-amber-50':'border-emerald-200 text-emerald-700 bg-emerald-50'}`}>{chapLabel}</div>}
                        <div className="p-4 md:p-6 font-serif space-y-4">
                            {entries.map(([vn, vt])=>(
                                <div key={vn} className={`flex gap-3 group p-2 -mx-2 rounded-xl hover:${isAmber?'bg-amber-50':'bg-emerald-50'} transition-all`}>
                                    <sup className={`text-xs font-sans font-bold mt-1.5 flex-shrink-0 w-6 text-right ${isAmber?'text-amber-500':'text-emerald-500'}`}>{vn}</sup>
                                    <span className="flex-1 text-lg leading-relaxed text-stone-800">{vt}</span>
                                    <button onClick={()=>analyzeVerse(vt, `${chapLabel||''}, стих ${vn}`)}
                                        className={`flex-shrink-0 self-start mt-1 px-2 py-1 rounded-lg text-xs font-bold transition-all opacity-0 group-hover:opacity-100 ${isAmber?'bg-amber-100 hover:bg-amber-300 border border-amber-200 text-amber-700':'bg-emerald-100 hover:bg-emerald-300 border border-emerald-200 text-emerald-700'}`}>
                                        ✨ AI
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // ── РЕЖИМ: ЧИТАЕМ БИБЛИЮ ──────────────────────────────────────
            if (mode === 'bible_book') return (
                <div className="fade-in-up space-y-4 pb-20 md:pb-6">
                    <VerseModal/>
                    <Header title={`${bBook}`} sub={`Библия · Синодальный перевод`} color="amber"/>
                    {/* Навигация по главам */}
                    <div className="bg-white border border-stone-200 rounded-2xl p-4 flex flex-wrap gap-2 items-center">
                        <span className="text-xs font-bold text-stone-400 uppercase tracking-widest mr-2">Глава:</span>
                        <div className="flex flex-wrap gap-1.5 flex-1">
                            {bChaps.map(c=>(
                                <button key={c} onClick={()=>setBChap(c)}
                                    className={`w-9 h-9 rounded-xl text-xs font-bold transition-all ${bChap===c?'bg-amber-600 text-white shadow-sm':'bg-stone-100 hover:bg-amber-100 text-stone-600'}`}>
                                    {c}
                                </button>
                            ))}
                        </div>
                        <select value={bBook} onChange={e=>{setBBook(e.target.value);setBChap('1');}}
                            className="ml-auto p-2 border border-stone-200 rounded-xl text-xs font-bold bg-stone-50 outline-none">
                            {bibleBooks.map(b=><option key={b} value={b}>{b}</option>)}
                        </select>
                    </div>
                    {/* Стихи */}
                    <VerseList verses={bVerses} color="amber" chapLabel={`${bBook}, глава ${bChap}`}/>
                    {/* Навигация назад/вперёд по главам */}
                    <div className="flex justify-between gap-3">
                        <button disabled={bChap==='1'} onClick={()=>setBChap(String(+bChap-1))}
                            className="flex-1 py-3 bg-white border border-stone-200 rounded-xl font-bold text-sm text-stone-600 hover:bg-stone-50 disabled:opacity-30 transition-all">
                            ← Глава {+bChap-1}
                        </button>
                        <button disabled={!bChaps.length||bChap===bChaps[bChaps.length-1]} onClick={()=>setBChap(String(+bChap+1))}
                            className="flex-1 py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-xl font-bold text-sm disabled:opacity-30 transition-all">
                            Глава {+bChap+1} →
                        </button>
                    </div>
                    <AIBlock placeholder={`Что означает ${bBook} ${bChap}? Контекст, история...`}/>
                </div>
            );

            // ── РЕЖИМ: ЧИТАЕМ КОРАН ───────────────────────────────────────
            if (mode === 'quran_surah') return (
                <div className="fade-in-up space-y-4 pb-20 md:pb-6">
                    <VerseModal/>
                    <Header title={qSurah} sub="Коран · Перевод Кулиева" color="emerald"/>
                    {/* Выбор суры */}
                    <div className="bg-white border border-stone-200 rounded-2xl p-4 flex gap-3 items-center">
                        <span className="text-xs font-bold text-stone-400 uppercase tracking-widest">Сура:</span>
                        <select value={qSurah} onChange={e=>setQSurah(e.target.value)}
                            className="flex-1 p-2.5 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none focus:ring-2 focus:ring-emerald-500">
                            {quranSurahs.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                    </div>
                    {/* Стихи */}
                    <VerseList verses={qVerses} color="emerald" chapLabel={qSurah}/>
                    {/* Навигация по сурам */}
                    <div className="flex justify-between gap-3">
                        {(() => {
                            const idx = quranSurahs.indexOf(qSurah);
                            return (<>
                                <button disabled={idx<=0} onClick={()=>setQSurah(quranSurahs[idx-1])}
                                    className="flex-1 py-3 bg-white border border-stone-200 rounded-xl font-bold text-sm text-stone-600 hover:bg-stone-50 disabled:opacity-30 transition-all">
                                    ← Предыдущая
                                </button>
                                <button disabled={idx>=quranSurahs.length-1} onClick={()=>setQSurah(quranSurahs[idx+1])}
                                    className="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-sm disabled:opacity-30 transition-all">
                                    Следующая →
                                </button>
                            </>);
                        })()}
                    </div>
                    <AIBlock placeholder={`Что означает ${qSurah}? Причина ниспослания...`}/>
                </div>
            );

            // ── РЕЖИМ: ПАРАЛЛЕЛЬНОЕ ЧТЕНИЕ С AI ─────────────────────────
            if (mode === 'parallel') return (
                <div className="fade-in-up space-y-4 pb-20 md:pb-6">
                    <VerseModal/>
                    <Header title="Параллельное чтение" sub="Библия и Коран рядом" color="stone"/>
                    {/* Выбор текстов */}
                    <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-2">
                            <select value={bBook} onChange={e=>{setBBook(e.target.value);setBChap('1');}}
                                className="w-full p-2.5 border border-amber-300 rounded-xl text-xs font-bold bg-amber-50 outline-none">
                                {bibleBooks.map(b=><option key={b} value={b}>{b}</option>)}
                            </select>
                            <select value={bChap} onChange={e=>setBChap(e.target.value)}
                                className="w-full p-2.5 border border-amber-300 rounded-xl text-xs font-bold bg-amber-50 outline-none">
                                {bChaps.map(c=><option key={c} value={c}>Гл. {c}</option>)}
                            </select>
                        </div>
                        <div>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)}
                                className="w-full p-2.5 border border-emerald-300 rounded-xl text-xs font-bold bg-emerald-50 outline-none">
                                {quranSurahs.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    {/* Параллельный текст */}
                    <div className="grid md:grid-cols-2 gap-4">
                        <VerseList verses={bVerses} color="amber" chapLabel={`${bBook} ${bChap}`}/>
                        <VerseList verses={qVerses} color="emerald" chapLabel={qSurah}/>
                    </div>
                    <AIBlock placeholder={`Сравни ${bBook} ${bChap} с ${qSurah} — общие темы, различия...`}/>
                </div>
            );

            // ── РЕЖИМ: ТЕМАТИЧЕСКИЕ УРОКИ (оригинальный функционал) ─────
            const BCard = ({data}) => (
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 space-y-4">
                    <span className="text-xs font-bold uppercase tracking-widest text-amber-700 bg-amber-100 px-3 py-1 rounded-full">📖 Библия · {data.ref}</span>
                    <blockquote className="font-serif text-lg leading-relaxed text-stone-800 border-l-4 border-amber-400 pl-4 italic">"{data.text}"</blockquote>
                    <div className="bg-white rounded-xl p-4 border border-amber-100">
                        <p className="text-xs font-bold uppercase tracking-widest text-amber-600 mb-2">💡 Простым языком</p>
                        <p className="text-stone-700 leading-relaxed">{data.plain}</p>
                    </div>
                    <div className="bg-amber-100/50 rounded-xl p-4">
                        <p className="text-xs font-bold uppercase tracking-widest text-amber-800 mb-2">🔤 Ключевое слово</p>
                        <p className="text-stone-700 text-sm leading-relaxed">{data.keyWord}</p>
                    </div>
                </div>
            );
            const QCard = ({data}) => (
                <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 space-y-4">
                    <span className="text-xs font-bold uppercase tracking-widest text-emerald-700 bg-emerald-100 px-3 py-1 rounded-full">🌙 Коран · {data.ref}</span>
                    <blockquote className="font-serif text-lg leading-relaxed text-emerald-900 border-l-4 border-emerald-400 pl-4 italic">"{data.text}"</blockquote>
                    <div className="bg-white rounded-xl p-4 border border-emerald-100">
                        <p className="text-xs font-bold uppercase tracking-widest text-emerald-600 mb-2">💡 Простым языком</p>
                        <p className="text-stone-700 leading-relaxed">{data.plain}</p>
                    </div>
                    <div className="bg-emerald-100/50 rounded-xl p-4">
                        <p className="text-xs font-bold uppercase tracking-widest text-emerald-800 mb-2">🔤 Ключевое слово</p>
                        <p className="text-stone-700 text-sm leading-relaxed">{data.keyWord}</p>
                    </div>
                </div>
            );

            return (
                <div className="fade-in-up space-y-6 pb-20 md:pb-6">
                    <VerseModal/>
                    <Header title={`${lesson.icon} ${lesson.title}`} sub={lesson.theme} color="stone"/>
                    {/* Прогресс */}
                    <div className="bg-white rounded-2xl border border-stone-200 p-4 flex items-center gap-4">
                        <div className="flex-1">
                            <div className="flex justify-between text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">
                                <span>Урок {step+1} из {LESSONS.length}</span>
                                <span>{Math.round(((step+1)/LESSONS.length)*100)}%</span>
                            </div>
                            <div className="w-full bg-stone-100 rounded-full h-2">
                                <div className="bg-gradient-to-r from-amber-500 to-emerald-500 h-2 rounded-full transition-all" style={{width:`${((step+1)/LESSONS.length)*100}%`}}/>
                            </div>
                        </div>
                        <div className="flex gap-1.5">
                            {LESSONS.map((l,i)=>(
                                <button key={i} onClick={()=>{setStep(i);setTab('compare');setAiAnswer('');}}
                                    className={`w-8 h-8 rounded-xl text-xs font-bold transition-all ${i===step?'bg-amber-600 text-white shadow-md scale-110':i<step?'bg-emerald-100 text-emerald-700':'bg-stone-100 text-stone-400'}`}>
                                    {l.icon}
                                </button>
                            ))}
                        </div>
                    </div>
                    {/* Вкладки */}
                    <div className="flex gap-1.5 bg-stone-100 p-1.5 rounded-2xl">
                        {[['compare','⚖️ Сравнение'],['bible','📖 Библия'],['quran','🌙 Коран'],['practice','🤖 AI']].map(([k,l])=>(
                            <button key={k} onClick={()=>setTab(k)}
                                className={`flex-1 py-2.5 px-2 rounded-xl text-xs md:text-sm font-bold transition-all ${tab===k?'bg-white shadow-sm text-stone-900':'text-stone-500 hover:text-stone-700'}`}>
                                {l}
                            </button>
                        ))}
                    </div>
                    {/* Контент */}
                    {tab==='compare' && (
                        <div className="space-y-6">
                            <div className="grid md:grid-cols-2 gap-6">
                                <BCard data={lesson.bible}/><QCard data={lesson.quran}/>
                            </div>
                            <div className="bg-white border-2 border-stone-900 rounded-2xl p-6">
                                <p className="text-xs font-bold uppercase tracking-widest text-stone-500 mb-3">⚖️ Академическое сравнение</p>
                                <p className="text-stone-800 leading-relaxed">{lesson.compare}</p>
                            </div>
                        </div>
                    )}
                    {tab==='bible' && <BCard data={lesson.bible}/>}
                    {tab==='quran' && <QCard data={lesson.quran}/>}
                    {tab==='practice' && (
                        <div className="bg-white border border-stone-200 rounded-2xl p-6 space-y-4">
                            <p className="text-xs font-bold uppercase tracking-widest text-stone-400">🤖 Спросить AI об этой теме</p>
                            <div className="flex flex-wrap gap-2 mb-2">
                                {[`Почему Коран и Библия по-разному описывают ${lesson.title.toLowerCase()}?`,
                                  `Что думают богословы о теме "${lesson.title}"?`,
                                  `Как эта тема повлияла на историю?`].map(q=>(
                                    <button key={q} onClick={()=>{setAiQuestion(q);askAI(q);}}
                                        className="text-xs bg-stone-100 hover:bg-amber-50 border border-stone-200 hover:border-amber-300 rounded-xl px-3 py-2 text-stone-700 text-left transition-all">
                                        {q}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-3">
                                <input value={aiQuestion} onChange={e=>setAiQuestion(e.target.value)}
                                    onKeyDown={e=>e.key==='Enter'&&askAI(aiQuestion)}
                                    placeholder="Ваш вопрос о теме урока..."
                                    className="flex-1 p-3 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 text-sm"/>
                                <button onClick={()=>askAI(aiQuestion)} disabled={aiLoading}
                                    className="bg-amber-600 hover:bg-amber-500 text-white px-5 py-3 rounded-xl font-bold text-sm disabled:opacity-50">
                                    {aiLoading?'...':'Спросить'}
                                </button>
                            </div>
                            {aiLoading && <div className="flex items-center gap-3 text-stone-500 italic p-4"><Icons.Loader c="w-5 h-5 text-amber-500"/>Нейросеть думает...</div>}
                            {aiAnswer && <div className="ai-content p-4 bg-stone-50 rounded-xl border border-stone-200" dangerouslySetInnerHTML={{__html:aiAnswer}}/>}
                        </div>
                    )}
                    <div className="flex justify-between pt-2 gap-3">
                        <button onClick={()=>{setStep(Math.max(0,step-1));setTab('compare');setAiAnswer('');}} disabled={step===0}
                            className="flex-1 py-3 rounded-xl font-bold text-stone-600 bg-stone-100 hover:bg-stone-200 disabled:opacity-30 transition-all text-sm">
                            ← Предыдущий
                        </button>
                        <button onClick={()=>{setStep(Math.min(LESSONS.length-1,step+1));setTab('compare');setAiAnswer('');}} disabled={step===LESSONS.length-1}
                            className="flex-1 py-3 rounded-xl font-bold text-white bg-amber-600 hover:bg-amber-500 disabled:opacity-30 transition-all text-sm">
                            Следующий →
                        </button>
                    </div>
                </div>
            );
        }
        </script>

        <script type="text/babel">
        // =====================================================================
        // МОДУЛЬ 2: МАНУСКРИПТЫ И ОРИГИНАЛЫ
        // =====================================================================
        // ════════════════════════════════════════════════════════════════════
        // РАСШИРЕННАЯ БАЗА МАНУСКРИПТОВ — 25 рукописей мирового значения
        // Источники: British Library, Vatican Library, Bodleian, BnF и др.
        // ════════════════════════════════════════════════════════════════════
        const MANUSCRIPTS = [
            // ─── БИБЛЕЙСКИЕ РУКОПИСИ ────────────────────────────────────────
            {
                id:'codex-sinaiticus', cat:'bible', title:'Кодекс Синайский', short:'Синайский кодекс',
                date:'~ 330–360 н.э.', lang:'Греческий (койне)', place:'Монастырь Св. Екатерины, Синай',
                location:'Британский музей, Лондон', signal:'★★★★★',
                imgUrl:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Codex_Sinaiticus_Matthew_6_22-7_21.JPG/800px-Codex_Sinaiticus_Matthew_6_22-7_21.JPG',
                imgFb:'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800&q=80',
                original:'ΠΑΤΕΡ ΗΜΩΝ Ο ΕΝ ΤΟΙΣ ΟΥΡΑΝΟΙΣ · ΑΓΙΑΣΘΗΤΩ ΤΟ ΟΝΟΜΑ ΣΟΥ · ΕΛΘΕΤΩ Η ΒΑΣΙΛΕΙΑ ΣΟΥ',
                translation:'Отче наш, сущий на небесах, да святится имя Твоё, да придёт Царствие Твоё (Мф 6:9–10)',
                script:'Унциальное (маюскульное) греческое письмо без пробелов — скриптио континуа',
                desc:'Древнейшая почти полная Библия. Написана 4 писцами на 347 листах тонкого пергамента (велень). Открыт Константином Тишендорфом в 1844–1859 гг. Рукопись содержит Ветхий и Новый Завет полностью, а также Послание Варнавы и Пастырь Ерма — апокрифы, не вошедшие в канон.',
                url:'https://codexsinaiticus.org',
                facts:['Написан 4 писцами (~350 г.н.э.)', '23 000 исправлений разных эпох', 'Хранится в 4 местах: Лондон, Лейпциг, Петербург, Синай', 'Полностью оцифрован — codexsinaiticus.org', 'Содержит апокрифы: Варнаву и Ерма', 'Размер листа 38 × 34 см, 4 колонки на странице'],
                significance:'Основа критических изданий Нового Завета. Устраняет сотни ошибок поздних копий.'
            },
            {
                id:'codex-vaticanus', cat:'bible', title:'Кодекс Ватиканский', short:'Codex Vaticanus',

                extra: { religion: 'sikhism', emoji: '🪯', title: 'Сикхизм — Путь ученика', content: `**Основатель: Гуру Нанак** (1469–1539) — родился в Пенджабе (Индия) в индуистской семье. В 30 лет получил Откровение: «Нет ни индусов, ни мусульман» — есть только люди Бога.\n\n**Десять Гуру** — духовная линия преемников (1469–1708). Последний живой Гуру — Гобинд Сингх передал Гурство священной книге.\n\n**Гуру Грантх Сахиб** — вечный и единственный живой Гуру сикхов. Священная книга из 1430 страниц, содержащая гимны всех десяти Гуру + гимны мусульманских и индусских святых (включая Кабира и Фарид).\n\n**«Эк Онкар»** (ੴ) — «Бог Един». Первые два слова Гуру Грантх Сахиб. Основа веры: один безличный Бог, не имеющий образа.\n\n**Три столпа сикхизма:**\n- **Нам Джапна** — медитация на имя Бога (Вахегуру)\n- **Кират Карна** — честный труд\n- **Ванд Чхакна** — делиться с другими (ланgar — бесплатная еда для всех)\n\n**Пять К (Пять Какаров):**\n- Кеш — нестриженые волосы\n- Кара — стальной браслет\n- Канга — деревянный гребень\n- Качха — особые короткие штаны\n- Кирпан — ритуальный меч\n\n**Лангар:** В каждом гурдваре кормят всех желающих бесплатно. Золотой Храм в Амритсаре кормит 100 000 человек в день.\n\n**Нет каст, нет дискриминации.** Сикхизм — одна из наиболее эгалитарных религий мира.` },
