                text: "«Корова» — самая длинная сура Корана, ниспосланная в мединский период. Является фундаментом исламского права (шариата). Сура отражает переходный момент: община мусульман отделяется от иудеев и язычников.",

        const getLineByLineComment = (isBible, book, chap, verse, text) => {
            if (isBible && book === "Бытие" && chap === "1" && verse === "1") return "В древнееврейском оригинале используется слово 'Бара' (творить из ничего), применяемое исключительно к действиям Бога. 'Элохим' (Бог) стоит во множественном числе — лингвистический реликт ханаанского пантеона, переосмысленный в монотеизм.";
            if (isBible && book === "От Иоанна" && chap === "1" && verse === "1") return "Концепция 'Логоса' (Слова). Иоанн использует популярный в античной эллинистической философии термин, чтобы объяснить божественную природу Христа как предвечного разума.";
            if (!isBible && book.includes("Аль-Фатиха") && verse === "1") return "Формула 'Басмала'. Встречается перед каждой сурой Корана (кроме 9-й). Подчеркивает два главных атрибута Аллаха: Ар-Рахман (Милостивый ко всем) и Ар-Рахим (Милосердный к верующим).";
            return `Академический разбор стиха ${verse}: Данный фрагмент («${text.substring(0, 20)}...») исследуется экзегетами как отражение социально-культурных норм и теологических концепций авторов эпохи написания текста.`;
        };

        const DEFAULT_DB = {
            order: { bible: ["Бытие"], quran: ["1. Аль-Фатиха"] },
            texts: { bible: { "Бытие": { "1": { "1": "Загрузка..." } } }, quran: { "1. Аль-Фатиха": { "1": { "1": "Загрузка..." } } } }
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');
            const [statusText, setStatusText] = useState('Подготовка...');
            
            // Настройки API Ключа для ZVENO AI / TTS
            const [apiKey, setApiKey] = useState(localStorage.getItem('zveno_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('zveno_api_key', key);
                setShowSettings(false);
            };

            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        setStatusText("Загрузка текста Библии...");
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        if (!bibleRes.ok) throw new Error("Network error Bible");
                        const bibleRaw = await bibleRes.json();
                        const bibleMap = {};
                        const bibleOrder = []; 
                        
                        bibleRaw.forEach(book => {
                            const ruName = BIBLE_BOOKS_RU[book.name] || book.name;
                            bibleOrder.push(ruName);
                            bibleMap[ruName] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[ruName][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[ruName][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        setStatusText("Загрузка текста Корана...");
                        const quranMap = {};
                        const quranOrder = []; 
                        SURAH_NAMES_RU.forEach((ruName, index) => {
                            const title = `${index + 1}. ${ruName}`;
                            quranOrder.push(title);
                            quranMap[title] = { "1": {} }; 
                        });

                        try {
                            const quranRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/quran-api@1/editions/rus-elmir-kuliev.json');
                            if (!quranRes.ok) throw new Error("Primary Quran CDN failed");
                            const quranRaw = await quranRes.json();
                            quranRaw.quran.forEach(item => {
                                const title = quranOrder[item.chapter - 1];
                                if (title) quranMap[title]["1"][String(item.verse)] = item.text;
                            });
                        } catch (primaryError) {
                            const fallbackRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                            const fallbackRaw = await fallbackRes.json();
                            fallbackRaw.data.surahs.forEach(surah => {
                                const title = quranOrder[surah.number - 1];
                                if (title) {
                                    surah.ayahs.forEach(ayah => { quranMap[title]["1"][String(ayah.numberInSurah)] = ayah.text; });
                                }
                            });
                        }

                        setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                        setDataStatus('success');
                        setStatusText("Базы загружены (100%)");
                    } catch (e) {
                        setDataStatus('error');
                        setStatusText("Ошибка загрузки.");
                    }
                    setLoading(false);
                };
                loadFullTexts();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {/* Модальное окно настроек API */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 fade-in-up">
                                <div className="flex items-center mb-6">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mr-4">
                                        <Icons.Key c="w-6 h-6" />
                                    </div>

        // --- ПРОДВИНУТЫЙ АУДИО ДВИЖОК (С поддержкой API ZVENO AI / Fallback на Web Speech API) ---
        function AudioPlayer({ versesObj, theme, apiKey }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('AI_ZVENO_PREMIUM');
            const [isPlaying, setIsPlaying] = useState(false);
            const [status, setStatus] = useState('ready'); // ready, playing, error
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri')) return -1;
                        return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const generateTextToRead = () => {
                return Object.entries(versesObj)
                    .sort((a,b)=>Number(a[0])-Number(b[0]))
                    .map(([v, t]) => {
                        let text = t.replace(/ — /g, ", ").replace(/ - /g, ", ");
                        if (!/[.!?]$/.test(text)) text += ".";
                        return text;
                    })
                    .join(" ");
            };

            const playWithNativeTTS = (textChunk) => {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(textChunk);
                const voice = voices.find(v => v.name === selectedVoice);
                if (voice) utterance.voice = voice;
                utterance.lang = 'ru-RU';
                utterance.rate = 0.85; 
                utterance.pitch = 0.95; 
                
                utterance.onend = () => setIsPlaying(false);
                utterance.onerror = () => { setIsPlaying(false); setStatus('error'); };

                window.speechSynthesis.speak(utterance);
            };

            const handlePlay = async () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    setStatus('ready');
                    return;
                }
                
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                const fullText = generateTextToRead();

                // Попытка использовать AI API (Zveno / Custom)
                if (apiKey && selectedVoice === 'AI_ZVENO_PREMIUM') {
                    try {
                        setStatus('loading_ai');
                        // Эмуляция запроса к ZVENO AI / OpenAI TTS API. 
                        // В реальной среде замените 'https://api.zveno.ai/v1/audio/speech' на валидный endpoint.
                        const response = await fetch('https://api.openai.com/v1/audio/speech', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: "tts-1",
                                input: fullText.substring(0, 4000), // Лимит символов
                                voice: theme === 'bible' ? 'onyx' : 'echo' // Художественные мужские голоса
                            })
                        });

                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        
                        const blob = await response.blob();
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        audio.onended = () => setIsPlaying(false);
                        audio.play();
                        setStatus('playing');

                    } catch (error) {
                        console.warn("Ошибка AI API (неверный ключ или CORS). Переключение на встроенный движок...", error);
                        // Fallback: Если API не сработало (например, из-за песочницы), используем встроенный голос
                        setSelectedVoice(voices[0]?.name || '');
                        playWithNativeTTS(fullText);
                    }
                } else {
                    // Использование встроенного (родного) TTS браузера
                    playWithNativeTTS(fullText);
                }
            };

            const accentColor = theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100';
            const bgColor = theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200';

            return (
                <div className={`flex items-center p-2 rounded-xl border ${bgColor} shadow-sm`}>
                    <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                    <select value={selectedVoice} onChange={e => setSelectedVoice(e.target.value)} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                        <option value="AI_ZVENO_PREMIUM" className="font-bold">✨ ZVENO AI (Художественный)</option>
                        <optgroup label="Системные голоса (Fallback)">
                            {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                        </optgroup>
                    </select>
                    <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${accentColor}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                        {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                    </button>
                </div>
            );
        }

        // --- МОДУЛЬ ЧТЕНИЯ С ПОСТРОЧНЫМИ КОММЕНТАРИЯМИ ---
        function SingleReaderModule({ type, db, apiKey }) {
            const isBible = type === 'bible';
            const order = isBible ? db.order.bible : db.order.quran;
            
            const [selectedBook, setSelectedBook] = useState(order[0] || "");
            const chaptersObj = isBible && selectedBook ? db.texts.bible[selectedBook] : {};
            const chapters = Object.keys(chaptersObj).sort((a,b)=>Number(a)-Number(b));
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");
            const [openComments, setOpenComments] = useState({});

            useEffect(() => {
                if (order.length > 0 && !selectedBook) setSelectedBook(order[0]);
                setOpenComments({}); 
            }, [order, selectedBook]);

            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) setSelectedChapter(chapters[0]);
                setOpenComments({}); 
            }, [selectedBook, chapters, isBible, selectedChapter]);

            const content = isBible ? (chaptersObj[selectedChapter] || {}) : (db.texts.quran[selectedBook]?.["1"] || {});
            const academicComment = ACADEMIC_COMMENTS[selectedBook] || ACADEMIC_COMMENTS["default"];

            const toggleComment = (verseId) => setOpenComments(prev => ({ ...prev, [verseId]: !prev[verseId] }));

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 md:p-6 flex flex-col xl:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">{isBible ? 'Книга Библии' : 'Сура Корана'}</label>
                                <select value={selectedBook} onChange={(e) => { setSelectedBook(e.target.value); if (isBible) setSelectedChapter("1"); }} className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer transition-all ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}>
                                    {order.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select value={selectedChapter} onChange={e=>setSelectedChapter(e.target.value)} className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer transition-all">
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4 items-center w-full xl:w-auto justify-end">
                            <AudioPlayer versesObj={content} theme={isBible ? 'bible' : 'quran'} apiKey={apiKey} />
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fcfbf9] text-stone-800" : "bg-[#f5fbf8] text-emerald-950"}`}>
                        <div className="max-w-3xl mx-auto">
                            
                            <div className={`mb-12 p-8 rounded-3xl border shadow-sm fade-in-up ${isBible ? 'bg-amber-50/50 border-amber-200' : 'bg-emerald-50/50 border-emerald-200'}`}>
                                <h4 className={`font-sans font-bold text-sm uppercase tracking-widest mb-4 flex items-center ${isBible ? 'text-amber-800' : 'text-emerald-800'}`}>
                                    <Icons.Book c="w-5 h-5 mr-3"/> Общий контекст {isBible ? 'книги' : 'суры'}
                                </h4>
                                {academicComment.imageUrl && (
                                    <div className="my-6">
                                        <div className="w-full h-56 md:h-72 rounded-xl overflow-hidden relative shadow-sm border border-stone-200/50 bg-stone-100">
                                            <img src={academicComment.imageUrl} alt="Иллюстрация" className="object-cover w-full h-full" />
                                        </div>
                                        <p className={`text-[11px] mt-3 text-center uppercase tracking-widest font-bold font-sans ${isBible ? 'text-amber-700' : 'text-emerald-700'}`}>{academicComment.caption}</p>
                                    </div>
                                )}
                                <p className={`font-sans text-sm md:text-base leading-relaxed ${isBible ? 'text-amber-900' : 'text-emerald-900'}`}>{academicComment.text}</p>
                            </div>

                            <h3 className={`font-sans font-bold text-xl uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-12 transition-all">
                                    <div className="flex items-start">
                                        <sup className={`text-xs font-sans font-bold mt-2 mr-4 flex-shrink-0 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        <span className="flex-1 text-xl">{t}</span>
                                    </div>
                                    <div className="opacity-0 group-hover:opacity-100 absolute right-0 top-1 flex flex-col gap-2 transition-opacity">
                                        <button onClick={() => copyToClipboard(t)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm ${isBible ? 'text-amber-600/50 hover:text-amber-600' : 'text-emerald-600/50 hover:text-emerald-600'}`} title="Копировать"><Icons.Copy c="w-4 h-4"/></button>
                                        <button onClick={() => toggleComment(v)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm ${isBible ? 'text-amber-600' : 'text-emerald-600'}`} title="Комментарий"><Icons.MessageSquare c="w-4 h-4"/></button>
                                    </div>
                                    {openComments[v] && (
                                        <div className={`mt-4 ml-8 p-5 rounded-2xl text-sm font-sans border-l-4 shadow-sm fade-in-up ${isBible ? 'bg-amber-50 border-amber-400 text-amber-900' : 'bg-emerald-50 border-emerald-400 text-emerald-900'}`}>
                                            <div className="flex items-center mb-2"><Icons.Info c={`w-4 h-4 mr-2 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}/><span className="font-bold uppercase tracking-widest text-[10px]">Анализ стиха {v}</span></div>
                                            <p className="leading-relaxed">{getLineByLineComment(isBible, selectedBook, selectedChapter, v, t)}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ПАРАЛЛЕЛЬНОЕ ЧТЕНИЕ ---
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-stone-200 shadow-sm z-10 gap-4 md:gap-0">
                        <div className="md:pr-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ГЛОБАЛЬНЫЙ ПОИСК ---
        function SearchModule({ db }) {
            const [query, setQuery] = useState("");
            const [results, setResults] = useState({ bible: [], quran: [] });
            const [searching, setSearching] = useState(false);
            const [hasSearched, setHasSearched] = useState(false);

            const handleSearch = () => {
                if (!query || query.length < 3) return;
                setSearching(true); setHasSearched(true);
                setTimeout(() => {
                    const qLower = query.toLowerCase();
                    const bRes = [], qRes = [];
                    db.order.bible.forEach(book => {
                        Object.keys(db.texts.bible[book]).forEach(chap => {
                            Object.entries(db.texts.bible[book][chap]).forEach(([vNum, text]) => {
                                if (text.toLowerCase().includes(qLower)) bRes.push({ book, chap, vNum, text });
                            });
                        });
                    });
                    db.order.quran.forEach(surah => {
                        Object.entries(db.texts.quran[surah]["1"] || {}).forEach(([aNum, text]) => {
                            if (text.toLowerCase().includes(qLower)) qRes.push({ surah, aNum, text });
                        });
                    });
                    setResults({ bible: bRes.slice(0, 150), quran: qRes.slice(0, 150) });
                    setSearching(false);
                }, 100); 
            };

            const highlight = (text, word) => {
                if (!word) return text;
                const parts = text.split(new RegExp(`(${word})`, 'gi'));
                return parts.map((part, i) => part.toLowerCase() === word.toLowerCase() ? <span key={i} className="bg-amber-200 text-amber-900 font-bold px-1 rounded">{part}</span> : part);
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="p-8 border-b border-stone-200 bg-stone-50">
                        <h2 className="text-2xl font-serif font-bold text-stone-900 mb-4 flex items-center"><Icons.Search c="w-6 h-6 mr-3 text-amber-600"/> Глобальный поиск по текстам</h2>
                        <div className="flex gap-4">
                            <input type="text" value={query} onChange={(e)=>setQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} placeholder="Введите слово (Свет, Молитва)..." className="flex-1 p-4 rounded-xl border border-stone-300 font-sans outline-none" />
                            <button onClick={handleSearch} disabled={searching || query.length < 3} className="bg-[#1c1b1d] text-white px-8 rounded-xl font-bold disabled:opacity-50">{searching ? "Поиск..." : "Найти"}</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 flex flex-col md:flex-row gap-8 divide-y md:divide-y-0 md:divide-x divide-stone-200">
                        <div className="flex-1 md:pr-8">
                            <h3 className="font-bold text-amber-700 uppercase tracking-widest text-xs mb-6 border-b pb-2 flex justify-between">Библия {hasSearched && <span className="text-stone-400">Найдено: {results.bible.length}</span>}</h3>
                            {results.bible.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#fdfbf7] border border-amber-100 rounded-xl"><span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.book}, Гл {r.chap} : Ст {r.vNum}</span><p className="font-serif leading-relaxed text-stone-800">{highlight(r.text, query)}</p></div>
                            ))}
                        </div>
                        <div className="flex-1 md:pl-8">
                            <h3 className="font-bold text-emerald-700 uppercase tracking-widest text-xs mb-6 border-b pb-2 flex justify-between">Коран {hasSearched && <span className="text-stone-400">Найдено: {results.quran.length}</span>}</h3>
                            {results.quran.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#f4faf7] border border-emerald-100 rounded-xl"><span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.surah} : Аят {r.aNum}</span><p className="font-serif leading-relaxed text-emerald-900">{highlight(r.text, query)}</p></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
