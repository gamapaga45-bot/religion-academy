<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия: Сравнительное Религиоведение</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .font-sans { font-family: 'Open Sans', sans-serif; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ИКОНКИ ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Icons = {
            Book: ({c}) => <IconBase className={c}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>,
            Compare: ({c}) => <IconBase className={c}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><polyline points="16 9 18 11 20 9"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/><polyline points="4 15 6 17 8 15"/></IconBase>,
            Dash: ({c}) => <IconBase className={c}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>,
            Cap: ({c}) => <IconBase className={c}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>,
            Help: ({c}) => <IconBase className={c}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Search: ({c}) => <IconBase className={c}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>,
            Next: ({c}) => <IconBase className={c}><polyline points="9 18 15 12 9 6"/></IconBase>,
            Prev: ({c}) => <IconBase className={c}><polyline points="15 18 9 12 15 6"/></IconBase>,
            Moon: ({c}) => <IconBase className={c}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>
        };

        // --- ПЕРЕВОД НАЗВАНИЙ СУР (114) ДЛЯ 100% РУСИФИКАЦИИ ---
        const SURAH_NAMES_RU = [
            "Аль-Фатиха", "Аль-Бакара", "Аль Имран", "Ан-Ниса", "Аль-Маида", "Аль-Ан'ам", "Аль-А'раф", "Аль-Анфаль", "Ат-Тауба", "Йунус",
            "Худ", "Йусуф", "Ар-Ра'д", "Ибрахим", "Аль-Хиджр", "Ан-Нахль", "Аль-Исра", "Аль-Кахф", "Марьям", "Та Ха",
            "Аль-Анбия", "Аль-Хаджж", "Аль-Му'минун", "Ан-Нур", "Аль-Фуркан", "Аш-Шу'ара", "Ан-Намль", "Аль-Касас", "Аль-Анкабут", "Ар-Рум",
            "Лукман", "Ас-Сажда", "Аль-Ахзаб", "Саба", "Фатыр", "Йа Син", "Ас-Саффат", "Сад", "Аз-Зумар", "Гафир",
            "Фуссилят", "Аш-Шура", "Аз-Зухруф", "Ад-Духан", "Аль-Джасия", "Аль-Ахкаф", "Мухаммад", "Аль-Фатх", "Аль-Худжурат", "Каф",
            "Аз-Зарият", "Ат-Тур", "Ан-Наджм", "Аль-Камар", "Ар-Рахман", "Аль-Ваки'а", "Аль-Хадид", "Аль-Муджадила", "Аль-Хашр", "Аль-Мумтахана",
            "Ас-Сафф", "Аль-Джуму'а", "Аль-Мунафикун", "Ат-Тагабун", "Ат-Талак", "Ат-Тахрим", "Аль-Мульк", "Аль-Калам", "Аль-Хакка", "Аль-Ма'аридж",
            "Нух", "Аль-Джинн", "Аль-Муззаммиль", "Аль-Муддассир", "Аль-Кыяма", "Аль-Инсан", "Аль-Мурсалят", "Ан-Наба", "Ан-Нази'ат", "Абаса",
            "Ат-Таквир", "Аль-Инфитар", "Аль-Мутаффифин", "Аль-Иншикак", "Аль-Бурудж", "Ат-Тарик", "Аль-А'ля", "Аль-Гашия", "Аль-Фаджр", "Аль-Баляд",
            "Аш-Шамс", "Аль-Лайл", "Ад-Духа", "Аш-Шарх", "Ат-Тин", "Аль-Аляк", "Аль-Кадр", "Аль-Баййина", "Аз-Залзала", "Аль-Адият",
            "Аль-Кари'а", "Ат-Такасур", "Аль-Аср", "Аль-Хумаза", "Аль-Филь", "Курайш", "Аль-Ма'ун", "Аль-Каусар", "Аль-Кафирун", "Ан-Наср",
            "Аль-Масад", "Аль-Ихляс", "Аль-Фалак", "Ан-Нас"
        ];

        // --- ДЕМО-БАЗА ---
        const DEFAULT_DB = {
            order: { bible: ["Бытие"], quran: ["1. Аль-Фатиха"] },
            texts: {
                bible: { "Бытие": { "1": { "1": "В начале сотворил Бог небо и землю." } } },
                quran: { "1. Аль-Фатиха": { "1": "Во имя Аллаха, Милостивого, Милосердного!" } }
            }
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');
            const [statusText, setStatusText] = useState('Подготовка...');

            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        setStatusText("Загрузка полного текста Библии...");
                        // Используем надежный CDN (jsdelivr) вместо raw.github
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        const bibleRaw = await bibleRes.json();
                        
                        const bibleMap = {};
                        const bibleOrder = []; // Сохраняем канонический порядок (Фикс обрезки!)
                        
                        bibleRaw.forEach(book => {
                            bibleOrder.push(book.name);
                            bibleMap[book.name] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[book.name][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[book.name][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        setStatusText("Загрузка полного текста Корана...");
                        const quranRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                        const quranRaw = await quranRes.json();
                        
                        const quranMap = {};
                        const quranOrder = []; // Канонический порядок
                        
                        quranRaw.data.surahs.forEach((surah, index) => {
                            // ИСПОЛЬЗУЕМ РУССКИЙ ПЕРЕВОД ВМЕСТО АНГЛИЙСКОЙ ТРАНСЛИТЕРАЦИИ
                            const ruName = SURAH_NAMES_RU[index] || surah.englishName;
                            const title = `${surah.number}. ${ruName}`;
                            quranOrder.push(title);
                            
                            quranMap[title] = {};
                            surah.ayahs.forEach(ayah => {
                                quranMap[title][String(ayah.numberInSurah)] = ayah.text;
                            });
                        });

                        setStatusText("Структурирование данных...");
                        setDb({ 
                            order: { bible: bibleOrder, quran: quranOrder },
                            texts: { bible: bibleMap, quran: quranMap } 
                        });
                        setDataStatus('success');
                        setStatusText("Базы загружены (100%)");
                    } catch (e) {
                        console.error("Ошибка:", e);
                        setDataStatus('error');
                        setStatusText("Ошибка сети. Включен Демо-режим.");
                    }
                    setLoading(false);
                };

                loadFullTexts();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {/* Боковое меню */}
                    <aside className="w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-8 border-b border-stone-800/60 flex flex-col justify-center h-32">
                            <h1 className="text-stone-100 font-serif text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar px-3">
                            <div className="px-4 mt-2 mb-2">
                                <span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Основное</span>
                            </div>
                            <NavItem icon={Icons.Dash} label="Главная панель" active={view==='dashboard'} onClick={()=>setView('dashboard')} />
                            <NavItem icon={Icons.Cap} label="Пошаговое чтение" active={view==='steps'} onClick={()=>setView('steps')} />
                            <NavItem icon={Icons.Search} label="Глобальный поиск" active={view==='search'} onClick={()=>setView('search')} />
                            
                            <div className="px-4 mt-8 mb-2">
                                <span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Библиотека текстов</span>
                            </div>
                            <NavItem icon={Icons.Compare} label="Параллельное чтение" active={view==='reader'} onClick={()=>setView('reader')} />
                            <NavItem icon={Icons.Book} label="Полный текст Библии" active={view==='bible'} onClick={()=>setView('bible')} />
                            <NavItem icon={Icons.Moon} label="Полный текст Корана" active={view==='quran'} onClick={()=>setView('quran')} />
                        </nav>
                        
                        {/* Подробный статус загрузки */}
                        <div className="p-4 border-t border-stone-800/60 bg-[#161618]">
                            <div className="flex items-center">
                                {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">{statusText}</span></>}
                                {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-[10px] font-bold tracking-wider text-emerald-500">{statusText}</span></>}
                                {!loading && dataStatus === 'error' && <><div className="w-2 h-2 rounded-full bg-rose-500 mr-3"></div><span className="text-[10px] font-bold tracking-wider text-rose-500">{statusText}</span></>}
                            </div>
                        </div>
                    </aside>

                    {/* Контент */}
                    <main className="flex-1 ml-72 p-6 md:p-10 min-h-screen bg-[#f5f4f0]">
                        <div className="max-w-6xl mx-auto h-full">
                            {view === 'dashboard' && <Dashboard setView={setView} loading={loading} dataStatus={dataStatus} text={statusText} />}
                            {view === 'steps' && <GuidedReadingModule db={db} />}
                            {view === 'search' && <SearchModule db={db} />}
                            {view === 'reader' && <ParallelReaderModule db={db} />}
                            {view === 'bible' && <SingleReaderModule type="bible" db={db} />}
                            {view === 'quran' && <SingleReaderModule type="quran" db={db} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- КОМПОНЕНТЫ ---
        function NavItem({ icon: Icon, label, active, onClick }) {
            return (
                <button 
                    onClick={onClick} 
                    className={`w-full flex items-center px-4 py-3 rounded-xl font-bold text-sm transition-all duration-200 group
                    ${active ? 'bg-amber-600/10 text-amber-500 shadow-sm' : 'text-stone-400 hover:bg-stone-800 hover:text-stone-200'}`}
                >
                    <Icon c={`w-5 h-5 mr-4 flex-shrink-0 transition-colors ${active ? 'text-amber-500' : 'text-stone-600 group-hover:text-stone-400'}`} /> 
                    <span className="truncate">{label}</span>
                </button>
            );
        }

        function Dashboard({ setView, loading, dataStatus, text }) {
            return (
                <div className="bg-[#1c1b1d] text-stone-100 p-12 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                    <div className="relative z-10">
                        <h2 className="text-4xl font-serif font-bold mb-4 text-white">Инженерная среда обучения</h2>
                        <p className="text-stone-400 text-lg mb-8 max-w-2xl leading-relaxed">
                            Приложение полностью русифицировано и решает проблему обрезки списков. Загружено 66 книг Библии и 114 сур Корана. Добавлен новый инструмент <strong>Глобального поиска</strong>.
                        </p>
                        <div className="flex flex-wrap gap-4 mb-6">
                            <button onClick={()=>setView('search')} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-amber-900/20 transition-all flex items-center">
                                Начать Поиск <Icons.Search c="w-4 h-4 ml-3"/>
                            </button>
                            <button onClick={()=>setView('reader')} className="bg-stone-700 hover:bg-stone-600 text-white px-8 py-4 rounded-xl font-bold transition-all">
                                Параллельное чтение
                            </button>
                        </div>
                        
                        <div className="inline-flex items-center px-5 py-3 rounded-xl bg-stone-800/50 text-sm font-bold border border-stone-700">
                            {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-stone-400">{text}</span></>}
                            {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-emerald-400">{text}</span></>}
                        </div>
                    </div>
                    <Icons.Compare c="absolute -right-10 -bottom-20 w-[400px] h-[400px] text-stone-800 opacity-30 pointer-events-none" />
                </div>
            );
        }

        // --- МОДУЛЬ "ГЛОБАЛЬНЫЙ ПОИСК" (НОВЫЙ ФУНКЦИОНАЛ) ---
        function SearchModule({ db }) {
            const [query, setQuery] = useState("");
            const [results, setResults] = useState({ bible: [], quran: [] });
            const [searching, setSearching] = useState(false);

            const handleSearch = () => {
                if (!query || query.length < 3) return;
                setSearching(true);
                
                setTimeout(() => {
                    const qLower = query.toLowerCase();
                    const bRes = [];
                    const qRes = [];

                    // Поиск в Библии
                    db.order.bible.forEach(book => {
                        const chapters = Object.keys(db.texts.bible[book]);
                        chapters.forEach(chap => {
                            const verses = Object.entries(db.texts.bible[book][chap]);
                            verses.forEach(([vNum, text]) => {
                                if (text.toLowerCase().includes(qLower)) {
                                    bRes.push({ book, chap, vNum, text });
                                }
                            });
                        });
                    });

                    // Поиск в Коране
                    db.order.quran.forEach(surah => {
                        const ayahs = Object.entries(db.texts.quran[surah]);
                        ayahs.forEach(([aNum, text]) => {
                            if (text.toLowerCase().includes(qLower)) {
                                qRes.push({ surah, aNum, text });
                            }
                        });
                    });

                    setResults({ 
                        bible: bRes.slice(0, 100), // Ограничиваем до 100 результатов, чтобы не зависало
                        quran: qRes.slice(0, 100) 
                    });
                    setSearching(false);
                }, 100); // Небольшая задержка для рендера анимации загрузки
            };

            const highlight = (text, word) => {
                const parts = text.split(new RegExp(`(${word})`, 'gi'));
                return parts.map((part, i) => 
                    part.toLowerCase() === word.toLowerCase() ? <span key={i} className="bg-amber-200 text-amber-900 font-bold px-1 rounded">{part}</span> : part
                );
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="p-8 border-b border-stone-200 bg-stone-50">
                        <h2 className="text-2xl font-serif font-bold text-stone-900 mb-4 flex items-center">
                            <Icons.Search c="w-6 h-6 mr-3 text-amber-600"/> Глобальный поиск по текстам
                        </h2>
                        <div className="flex gap-4">
                            <input 
                                type="text" 
                                value={query} 
                                onChange={(e)=>setQuery(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                placeholder="Введите слово или фразу (например: Авраам, Свет, Любовь)..."
                                className="flex-1 p-4 rounded-xl border border-stone-300 font-sans focus:ring-2 focus:ring-amber-500 outline-none"
                            />
                            <button 
                                onClick={handleSearch}
                                disabled={searching || query.length < 3}
                                className="bg-[#1c1b1d] text-white px-8 rounded-xl font-bold disabled:opacity-50 hover:bg-stone-800 transition-colors"
                            >
                                {searching ? "Поиск..." : "Найти"}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-8 flex flex-col md:flex-row gap-8 divide-y md:divide-y-0 md:divide-x divide-stone-200">
                        <div className="flex-1 md:pr-8">
                            <h3 className="font-bold text-amber-700 uppercase tracking-widest text-xs mb-6 border-b pb-2">Результаты в Библии ({results.bible.length})</h3>
                            {results.bible.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#fdfbf7] border border-amber-100 rounded-xl">
                                    <span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.book}, Гл {r.chap} : Ст {r.vNum}</span>
                                    <p className="font-serif leading-relaxed text-stone-800">{highlight(r.text, query)}</p>
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 md:pl-8">
                            <h3 className="font-bold text-emerald-700 uppercase tracking-widest text-xs mb-6 border-b pb-2">Результаты в Коране ({results.quran.length})</h3>
                            {results.quran.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#f4faf7] border border-emerald-100 rounded-xl">
                                    <span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.surah} : Аят {r.aNum}</span>
                                    <p className="font-serif leading-relaxed text-emerald-900">{highlight(r.text, query)}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ "ПОШАГОВОЕ ЧТЕНИЕ" ---
        function GuidedReadingModule({ db }) {
            const [mode, setMode] = useState('bible'); 
            
            const books = db.order[mode];
            const [bookIdx, setBookIdx] = useState(0);
            
            const currentBook = books[bookIdx];
            const chaptersObj = currentBook ? db.texts[mode][currentBook] : {};
            // Надежный сбор глав через Object.keys с сортировкой
            const chapters = Object.keys(chaptersObj).sort((a,b)=> Number(a) - Number(b)); 
            const [chapIdx, setChapIdx] = useState(0);

            const currentChapter = chapters[chapIdx];
            const content = currentChapter ? chaptersObj[currentChapter] : {};

            useEffect(() => {
                setBookIdx(0);
                setChapIdx(0);
            }, [mode]);

            const handleNext = () => {
                if (chapIdx < chapters.length - 1) {
                    setChapIdx(chapIdx + 1); 
                } else if (bookIdx < books.length - 1) {
                    setBookIdx(bookIdx + 1); 
                    setChapIdx(0);
                }
            };

            const handlePrev = () => {
                if (chapIdx > 0) {
                    setChapIdx(chapIdx - 1);
                } else if (bookIdx > 0) {
                    setBookIdx(bookIdx - 1);
                    const prevBookChapters = Object.keys(db.texts[mode][books[bookIdx - 1]]);
                    setChapIdx(prevBookChapters.length - 1); 
                }
            };

            const isBible = mode === 'bible';
            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-stone-200">
                        <div className="flex bg-stone-100 p-1 rounded-xl">
                            <button onClick={()=>setMode('bible')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${isBible ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500'}`}>Библия</button>
                            <button onClick={()=>setMode('quran')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${!isBible ? 'bg-white shadow-sm text-emerald-700' : 'text-stone-500'}`}>Коран</button>
                        </div>
                        <div className="text-sm font-bold text-stone-400">
                            {isBible ? "Книга" : "Сура"} {bookIdx + 1} из {books.length}
                        </div>
                    </div>

                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fdfbf7] text-stone-800" : "bg-[#f4faf7] text-emerald-900"}`}>
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-3xl font-bold mb-8 pb-6 border-b border-stone-200/50 text-center">
                                {currentBook} {isBible ? `, Глава ${currentChapter}` : ''}
                            </h2>
                            {Object.entries(content).length > 0 ? (
                                Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                    <p key={v} className="mb-6 text-xl">
                                        <sup className={`text-xs font-sans font-bold mr-3 ${isBible ? "text-amber-600" : "text-emerald-600"}`}>{v}</sup>
                                        {t}
                                    </p>
                                ))
                            ) : (<p className="text-center text-stone-400 italic">Пусто...</p>)}
                        </div>
                    </div>

                    <div className="bg-white border-t border-stone-200 p-6 flex justify-between items-center">
                        <button onClick={handlePrev} disabled={bookIdx === 0 && chapIdx === 0} className="flex items-center px-6 py-3 bg-stone-50 text-stone-600 rounded-xl font-bold disabled:opacity-30 border border-stone-200"><Icons.Prev c="w-4 h-4 mr-2"/> Назад</button>
                        <div className="hidden md:block text-xs font-bold uppercase tracking-widest text-stone-400">{currentBook}</div>
                        <button onClick={handleNext} disabled={bookIdx === books.length - 1 && chapIdx === chapters.length - 1} className="flex items-center px-8 py-3 bg-[#1c1b1d] text-white rounded-xl font-bold disabled:opacity-30">Вперед <Icons.Next c="w-4 h-4 ml-2"/></button>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ПОЛНОГО ЧТЕНИЯ ---
        function SingleReaderModule({ type, db }) {
            const isBible = type === 'bible';
            const order = isBible ? db.order.bible : db.order.quran;
            
            const [selectedBook, setSelectedBook] = useState(order[0] || "");
            const chaptersObj = isBible && selectedBook ? db.texts.bible[selectedBook] : {};
            const chapters = Object.keys(chaptersObj).sort((a,b)=>Number(a)-Number(b));
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");

            useEffect(() => {
                if (order.length > 0 && !selectedBook) setSelectedBook(order[0]);
            }, [order]);

            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) setSelectedChapter(chapters[0]);
            }, [selectedBook]);

            const content = isBible ? (chaptersObj[selectedChapter] || {}) : (db.texts.quran[selectedBook] || {});

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">{isBible ? 'Книга Библии' : 'Сура Корана'}</label>
                                <select value={selectedBook} onChange={(e) => { setSelectedBook(e.target.value); if (isBible) setSelectedChapter("1"); }} className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}>
                                    {order.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select value={selectedChapter} onChange={e=>setSelectedChapter(e.target.value)} className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer">
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fdfbf7] text-stone-800" : "bg-[#f4faf7] text-emerald-900"}`}>
                        <div className="max-w-3xl mx-auto">
                            <h3 className={`font-sans font-bold text-sm uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            {Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <p key={v} className="mb-6 text-xl">
                                    <sup className={`text-xs font-sans font-bold mr-4 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>{t}
                                </p>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ПАРАЛЛЕЛЬНОГО ЧТЕНИЯ ---
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-2 divide-x border-stone-200 shadow-sm z-10">
                        <div className="pr-4 space-y-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="pl-4 space-y-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Рендер
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
