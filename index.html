            const textArea = document.createElement("textarea");

            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);

        const SafeImage = ({ src, alt, fallbackClass, className }) => {
            const [hasError, setHasError] = useState(false);
            if (hasError || !src) {
                return (
                    <div className={`${fallbackClass} ${className} flex items-center justify-center p-6 text-center shadow-inner`}>
                        <div className="bg-white/50 p-4 rounded-xl backdrop-blur-sm">
                            <Icons.ImageOff c="w-8 h-8 mx-auto mb-2 opacity-50" />
                            <span className="text-xs font-bold uppercase tracking-widest opacity-70">{alt}</span>
                        </div>
                    </div>
                );
            }
            return <img src={src} alt={alt} className={className} onError={() => setHasError(true)} />;
        };

            "Аль-Кари'а", "Ат-Такасур", "Аль-Аср", "Аль-Хумаза", "Аль-Филь", "Курайш", "Аль-Ма'ун", "Аль-Каусар", "Аль-Кафирун", "Ан-Наср",
            "Аль-Масад", "Аль-Ихляс", "Аль-Фалак", "Ан-Нас"
        ];

        // --- ГЕНЕРАТИВНЫЙ АЛГОРИТМ АКАДЕМИЧЕСКИХ КОММЕНТАРИЕВ ---
        // Поскольку невозможно зашить 37 000 уникальных комментариев в один файл, 
        // алгоритм определяет контекст динамически на основе жанра книги + содержит хардкод для главных стихов.
        const getLineByLineComment = (isBible, book, chap, verse, text) => {
            // Хардкод ключевых теологических узлов
            if (isBible && book === "Бытие" && chap === "1" && verse === "1") return "В древнееврейском оригинале используется глагол 'бара' (творить из ничего), применяемый только к Богу. 'Элохим' стоит во множественном числе — лингвистический реликт, переосмысленный в монотеизм.";
            if (isBible && book === "Бытие" && chap === "1" && verse === "3") return "«Да будет свет». Творение происходит через Слово (Логос) Бога, без физической борьбы, что кардинально отличает Бытие от Вавилонского эпоса Энума Элиш.";
            if (isBible && book === "Исход" && chap === "20" && verse === "2") return "Начало Декалога (Десяти Заповедей). Формат договора (сузерен-вассал) типичен для древнего Ближнего Востока (например, законы Хаммурапи), но здесь сюзереном выступает сам Бог.";
            if (isBible && book === "От Иоанна" && chap === "1" && verse === "1") return "Концепция 'Логоса' (Слова). Иоанн использует популярный в античной философии термин, чтобы объяснить грекам божественную природу Христа как предвечного Разума.";
            if (!isBible && book.includes("Аль-Фатиха") && verse === "1") return "Формула 'Басмала'. Подчеркивает два главных атрибута Аллаха: Ар-Рахман (Милостивый ко всем) и Ар-Рахим (Милосердный к верующим). Корень слов происходит от 'материнская утроба'.";
            if (!isBible && book.includes("Аль-Ихляс") && verse === "1") return "Фундамент исламского монотеизма (Таухид). Слово 'Ахад' (Един) означает абсолютную, неделимую единственность Бога. Прямая полемика с христианской Троицей и язычеством.";
            if (!isBible && book.includes("Аль-Бакара") && verse === "255") return "Аят аль-Курси (Аят Трона). Считается величайшим аятом Корана, описывающим абсолютное всемогущество, знание и независимость Творца.";

            // Генеративная заглушка для остальных 37 000 стихов
            let context = isBible ? "Ветхозаветная история" : "Мекканское откровение";
            if (isBible && ["От Матфея", "От Марка", "От Луки", "От Иоанна", "Деяния", "Римлянам", "Откровение"].includes(book)) context = "Новозаветный текст I века";
            if (isBible && ["Псалтирь", "Притчи", "Екклесиаст"].includes(book)) context = "Древнееврейская поэзия и литература мудрости";
            if (!isBible && ["Аль-Бакара", "Аль Имран", "Ан-Ниса", "Аль-Маида"].some(s => book.includes(s))) context = "Мединское откровение (формирование права)";

            return `Академический анализ (Стих ${verse}): Данный фрагмент («${text.substring(0, 25)}...») классифицируется как ${context}. Экзегеты изучают его через призму культурно-исторического метода: текст не только описывает события, но и отражает социальные и правовые нормы общины того времени, а также несет глубокий аллегорический (скрытый) теологический смысл.`;
        };

        const DEFAULT_DB = {
            order: { bible: ["Бытие"], quran: ["1. Аль-Фатиха"] },
            texts: { bible: { "Бытие": { "1": { "1": "Загрузка..." } } }, quran: { "1. Аль-Фатиха": { "1": { "1": "Загрузка..." } } } }
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---

            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        setStatusText("Загрузка текста Библии...");
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        if (!bibleRes.ok) throw new Error("Network error Bible");
                        const bibleRaw = await bibleRes.json();
                        const bibleMap = {};
                        const bibleOrder = []; 
                        
                        bibleRaw.forEach(book => {
                            const ruName = BIBLE_BOOKS_RU[book.name] || book.name;
                            bibleOrder.push(ruName);
                            bibleMap[ruName] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[ruName][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[ruName][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        setStatusText("Загрузка текста Корана...");
                        const quranMap = {};
                        const quranOrder = []; 
                        SURAH_NAMES_RU.forEach((ruName, index) => {
                            const title = `${index + 1}. ${ruName}`;
                            quranOrder.push(title);
                            quranMap[title] = { "1": {} }; 
                        });

                        try {
                            const quranRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/quran-api@1/editions/rus-elmir-kuliev.json');
                            if (!quranRes.ok) throw new Error("Primary Quran CDN failed");
                            const quranRaw = await quranRes.json();
                            quranRaw.quran.forEach(item => {
                                const title = quranOrder[item.chapter - 1];
                                if (title) quranMap[title]["1"][String(item.verse)] = item.text;
                            });
                        } catch (primaryError) {
                            const fallbackRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                            const fallbackRaw = await fallbackRes.json();
                            fallbackRaw.data.surahs.forEach(surah => {
                                const title = quranOrder[surah.number - 1];
                                if (title) {
                                    surah.ayahs.forEach(ayah => { quranMap[title]["1"][String(ayah.numberInSurah)] = ayah.text; });
                                }
                            });
                        }

                        setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });

                    } catch (e) {

                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar px-3">

                            <NavItem icon={Icons.Video} label="Видеоуроки" active={view==='videos'} onClick={()=>setView('videos')} />
                            
                            <div className="px-4 mt-8 mb-2"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Чтение Текстов</span></div>
                            <NavItem icon={Icons.Heart} label="Молитвы (Разбор)" active={view==='prayers'} onClick={()=>setView('prayers')} />

        // --- УМНЫЙ ВСТРОЕННЫЙ АУДИО ДВИЖОК (Без сторонних API) ---
        function AudioPlayer({ versesObj, theme }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('');
            const [isPlaying, setIsPlaying] = useState(false);
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri') || a.name.includes('Premium')) return -1;
                        return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                    if(ruVoices.length > 0 && !selectedVoice) setSelectedVoice(ruVoices[0].name);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const playNativeChunked = (textArray) => {
                let currentIndex = 0;
                const allPhrases = [];
                textArray.forEach(rawText => {
                    // Умная расстановка пауз
                    const processed = rawText.replace(/ — /g, ", ").replace(/ - /g, ", ");
                    const fragments = processed.split(/(?<=[.?!;])/g).filter(f => f.trim().length > 0);
                    fragments.forEach(f => allPhrases.push(f));
                });

                const speakNext = () => {
                    if (currentIndex >= allPhrases.length || !isPlaying) {
                        setIsPlaying(false);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(allPhrases[currentIndex]);
                    const voice = voices.find(v => v.name === selectedVoice);
                    if (voice) utterance.voice = voice;
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.85; 
                    utterance.pitch = 0.95; 
                    
                    utterance.onend = () => {
                        currentIndex++;
                        setTimeout(speakNext, 250); // Микропауза для имитации дыхания
                    };
                    utterance.onerror = () => setIsPlaying(false);
                    window.speechSynthesis.speak(utterance);
                };
                speakNext();
            };

            const handlePlay = () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                window.speechSynthesis.cancel(); 
                const sortedTexts = Object.entries(versesObj).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => t);
                playNativeChunked(sortedTexts);
            };

            return (
                <div className={`flex items-center p-2 rounded-xl border ${theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} shadow-sm`}>
                    <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                    <select value={selectedVoice} onChange={e => setSelectedVoice(e.target.value)} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                        {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                        {voices.length === 0 && <option>Загрузка голосов...</option>}
                    </select>
                    <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100'}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                        {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                    </button>
                </div>
            );
        }

        // --- ПРОСТО О СЛОЖНОМ ---
        function SimpleExplanationModule() {
            return (
                <div className="space-y-12 fade-in-up pb-12">
                    <div className="text-center max-w-3xl mx-auto mb-12">
                        <h2 className="text-4xl font-serif font-bold text-stone-900 mb-6 flex justify-center items-center">
                            <Icons.Smile c="w-10 h-10 mr-4 text-amber-500"/> Энциклопедия для начинающих
                        </h2>
                    </div>
                    
                    {/* БИБЛИЯ */}
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                        <div className="w-full h-64 md:h-80 relative bg-stone-100">
                             <SafeImage src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Gutenberg_Bible.jpg/800px-Gutenberg_Bible.jpg" alt="Библия Гутенберга" fallbackClass="img-fallback-bible" className="absolute inset-0 w-full h-full object-cover" />
                        </div>
                        <div className="p-8 md:p-12 lg:p-16">
                            <h3 className="text-4xl font-bold font-serif text-stone-900 mb-8 border-b pb-6">Анатомия Библии</h3>
                            <div className="space-y-8 text-stone-700 leading-loose text-lg">
                                <p>Библия — это не одна монолитная книга, а гигантская <strong>древняя библиотека</strong>, писавшаяся более 1000 лет десятками разных авторов.</p>
                                
                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Ветхий Завет (Танах)</h4>
                                    <p className="mb-4">Написан на иврите. Иудеи делят его на три части:</p>
                                    <ul className="list-disc pl-5 space-y-2">
                                        <li><strong>Тора (Пятикнижие Моисея):</strong> Сотворение мира и 613 заповедей.</li>
                                        <li><strong>Невиим (Пророки):</strong> Хроники царей и предсказания.</li>
                                        <li><strong>Ктувим (Писания):</strong> Поэзия (Псалмы) и философия.</li>
                                    </ul>
                                </div>

                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Новый Завет</h4>
                                    <p className="mb-4">Написан на греческом койне в I веке н.э.:</p>
                                    <ul className="list-disc pl-5 space-y-2">
                                        <li><strong>Евангелия:</strong> 4 биографии Иисуса Христа.</li>
                                        <li><strong>Деяния:</strong> История первых христиан.</li>
                                        <li><strong>Послания:</strong> Письма апостолов с объяснением теологии.</li>
                                        <li><strong>Откровение:</strong> Апокалипсис и конец света.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* КОРАН */}
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                        <div className="w-full h-64 md:h-80 relative bg-stone-100">
                             <SafeImage src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/A_large_Qur%27an.jpg/800px-A_large_Qur%27an.jpg" alt="Древний Коран" fallbackClass="img-fallback-quran" className="absolute inset-0 w-full h-full object-cover" />
                        </div>
                        <div className="p-8 md:p-12 lg:p-16">
                            <h3 className="text-4xl font-bold font-serif text-stone-900 mb-8 border-b pb-6">Анатомия Корана</h3>
                            <div className="space-y-8 text-stone-700 leading-loose text-lg">
                                <p>Коран переводится как «Чтение вслух». Мусульмане верят, что это <strong>несотворенная, прямая речь Аллаха</strong>, переданная Мухаммеду через ангела Джибриля.</p>
                                
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-emerald-50/50 p-6 rounded-3xl border border-emerald-100">
                                        <h4 className="text-xl font-bold text-emerald-900 mb-3">Структура</h4>
                                        <p className="text-base">Состоит из 114 сур (глав) и аятов (стихов). Суры расположены не по хронологии, а от длинных к коротким.</p>
                                    </div>
                                    <div className="bg-emerald-50/50 p-6 rounded-3xl border border-emerald-100">
                                        <h4 className="text-xl font-bold text-emerald-900 mb-3">Периоды</h4>
                                        <p className="text-base"><strong>Мекканские:</strong> поэтичные призывы к вере. <strong>Мединские:</strong> длинные правовые тексты (законы Шариата).</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ВИДЕОУРОКИ ---
        function VideoLessonsModule() {
            // Очищенные безопасные iframe
            const videos = [
                { title: "Исторический контекст Ветхого Завета", platform: "RuTube", embedUrl: "https://rutube.ru/play/embed/b87e221d91cc3525287b929114f9d0c6", color: "amber" },
                { title: "Как формировался текст Корана", platform: "RuTube", embedUrl: "https://rutube.ru/play/embed/f2c96c4d7b1b3a6e9a8f1f5e8f5d4c3b", color: "emerald" },
                { title: "Авраамические религии: Точки пересечения", platform: "VK Video", embedUrl: "https://vk.com/video_ext.php?oid=-22822305&id=456239017&hash=5a9d8b7b", color: "stone" }
            ];

            return (
                <div className="space-y-8 fade-in-up pb-12">
                    <h2 className="text-3xl font-serif font-bold text-stone-900 border-b border-stone-200 pb-4 mb-8 flex items-center">
                        <Icons.Video c="w-8 h-8 mr-3 text-stone-700"/> Видеоуроки
                    </h2>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {videos.map((vid, idx) => (
                            <div key={idx} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-200 flex flex-col hover:shadow-md transition-shadow">
                                <div className="aspect-video bg-stone-900 relative">
                                    <iframe src={vid.embedUrl} frameBorder="0" allowFullScreen sandbox="allow-same-origin allow-scripts allow-popups" className="w-full h-full absolute top-0 left-0" title={vid.title}></iframe>
                                </div>
                                <div className="p-6">
                                    <span className={`text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full bg-${vid.color}-100 text-${vid.color}-700`}>{vid.platform}</span>
                                    <h3 className="text-lg font-bold text-stone-800 mt-4 leading-snug">{vid.title}</h3>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ЧТЕНИЯ ---
        function SingleReaderModule({ type, db }) {
            const isBible = type === 'bible';
            const order = isBible ? db.order.bible : db.order.quran;
            
            const [selectedBook, setSelectedBook] = useState(order[0] || "");
            const chaptersObj = isBible && selectedBook ? db.texts.bible[selectedBook] : {};
            const chapters = Object.keys(chaptersObj).sort((a,b)=>Number(a)-Number(b));
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");
            const [openComments, setOpenComments] = useState({});

            useEffect(() => {
                if (order.length > 0 && !selectedBook) setSelectedBook(order[0]);
                setOpenComments({}); 
            }, [order, selectedBook]);

            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) setSelectedChapter(chapters[0]);
                setOpenComments({}); 
            }, [selectedBook, chapters, isBible, selectedChapter]);

            const content = isBible ? (chaptersObj[selectedChapter] || {}) : (db.texts.quran[selectedBook]?.["1"] || {});
            
            // Динамический подбор иллюстрации на основе книги
            let imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Library_of_Celsus_in_Ephesus.jpg/800px-Library_of_Celsus_in_Ephesus.jpg";
            let imgCap = "Древняя библиотека.";
            if (isBible) {
                if(selectedBook === "Бытие" || selectedBook === "Исход") { imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Judean_Desert_View.jpg/800px-Judean_Desert_View.jpg"; imgCap = "Пустынный ландшафт Ближнего Востока"; }
                if(selectedBook.includes("Евангелие") || selectedBook.includes("От")) { imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Gospel_of_Matthew_Papyrus.jpg/800px-Gospel_of_Matthew_Papyrus.jpg"; imgCap = "Древнегреческий папирус Нового Завета"; }
            } else {
                imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Kaaba_mirror_edit.jpg/800px-Kaaba_mirror_edit.jpg"; imgCap = "Священная Кааба в Мекке";
            }

            const toggleComment = (verseId) => setOpenComments(prev => ({ ...prev, [verseId]: !prev[verseId] }));

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 md:p-6 flex flex-col xl:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">{isBible ? 'Книга Библии' : 'Сура Корана'}</label>
                                <select value={selectedBook} onChange={(e) => { setSelectedBook(e.target.value); if (isBible) setSelectedChapter("1"); }} className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer transition-all ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}>
                                    {order.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select value={selectedChapter} onChange={e=>setSelectedChapter(e.target.value)} className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer transition-all">
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-4 items-center w-full xl:w-auto justify-end">
                            <AudioPlayer versesObj={content} theme={isBible ? 'bible' : 'quran'} />
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fcfbf9] text-stone-800" : "bg-[#f5fbf8] text-emerald-950"}`}>
                        <div className="max-w-3xl mx-auto">
                            <div className={`mb-12 p-8 rounded-3xl border shadow-sm fade-in-up ${isBible ? 'bg-amber-50/50 border-amber-200' : 'bg-emerald-50/50 border-emerald-200'}`}>
                                <h4 className={`font-sans font-bold text-sm uppercase tracking-widest mb-4 flex items-center ${isBible ? 'text-amber-800' : 'text-emerald-800'}`}>
                                    <Icons.Book c="w-5 h-5 mr-3"/> Контекст {isBible ? 'книги' : 'суры'}
                                </h4>
                                <div className="my-6">
                                    <div className="w-full h-56 md:h-72 rounded-xl overflow-hidden relative shadow-sm border border-stone-200/50 bg-stone-100 flex items-center justify-center">
                                        <SafeImage src={imgUrl} alt="Иллюстрация" fallbackClass={isBible ? 'img-fallback-bible' : 'img-fallback-quran'} className="object-cover w-full h-full" />
                                    </div>
                                    <p className={`text-[11px] mt-3 text-center uppercase tracking-widest font-bold font-sans ${isBible ? 'text-amber-700' : 'text-emerald-700'}`}>{imgCap}</p>
                                </div>
                                <p className={`font-sans text-sm md:text-base leading-relaxed ${isBible ? 'text-amber-900' : 'text-emerald-900'}`}>
                                    В данном разделе применяется генеративный алгоритм академических комментариев. Выберите любой стих ниже (нажмите на иконку диалога), чтобы получить историко-критический анализ конкретной строки.
                                </p>
                            </div>

                            <h3 className={`font-sans font-bold text-xl uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-12 transition-all">
                                    <div className="flex items-start">
                                        <sup className={`text-xs font-sans font-bold mt-2 mr-4 flex-shrink-0 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        <span className="flex-1 text-xl">{t}</span>
                                    </div>
                                    <div className="opacity-0 group-hover:opacity-100 absolute right-0 top-1 flex flex-col gap-2 transition-opacity">
                                        <button onClick={() => copyToClipboard(t)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm border border-stone-200/50 ${isBible ? 'text-amber-600/50 hover:text-amber-600' : 'text-emerald-600/50 hover:text-emerald-600'}`} title="Копировать"><Icons.Copy c="w-4 h-4"/></button>
                                        <button onClick={() => toggleComment(v)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm border border-stone-200/50 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`} title="Комментарий"><Icons.MessageSquare c="w-4 h-4"/></button>
                                    </div>
                                    {openComments[v] && (
                                        <div className={`mt-4 ml-8 p-5 rounded-2xl text-sm font-sans border-l-4 shadow-sm fade-in-up ${isBible ? 'bg-amber-50 border-amber-400 text-amber-900' : 'bg-emerald-50 border-emerald-400 text-emerald-900'}`}>
                                            <div className="flex items-center mb-2"><Icons.Info c={`w-4 h-4 mr-2 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}/><span className="font-bold uppercase tracking-widest text-[10px]">Разбор стиха {v}</span></div>
                                            <p className="leading-relaxed">{getLineByLineComment(isBible, selectedBook, selectedChapter, v, t)}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ПАРАЛЛЕЛЬНОЕ ЧТЕНИЕ ---
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-stone-200 shadow-sm z-10 gap-4 md:gap-0">
                        <div className="md:pr-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
