        async function fetchZvenoAIAnalysis(textToAnalyze, context, apiKey) {
            if (!apiKey) return marked.parse("⚙️ **Для AI-анализа укажите API ключ ZVENO AI в настройках** (иконка шестерёнки ⚙️ в левом боковом меню).\n\nZveno AI — российский OpenAI-совместимый шлюз к 200+ моделям. Ключ получите на [zveno.ai](https://zveno.ai).");

                const response = await fetch('https://api.zveno.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-4o",
                        models: ["openai/gpt-4o", "anthropic/claude-sonnet-4-20250514", "google/gemini-2.5-pro"],
                        messages: [

                                role: "system", 
                                content: "Ты — профессор-религиовед с учёными степенями в области семитологии и сравнительного богословия. Проведи глубокий, нейтральный академический анализ предоставленного религиозного текста. Обязательно включи: 1) Основной смысл и богословский посыл, 2) Этимологию ключевых слов (иврит/греческий/арабский), 3) Исторический и культурный контекст написания, 4) Связи с другими текстами и традициями. Отвечай на русском языке. Форматируй ответ с помощью Markdown."
                            },
                            {
                                role: "user", 
                                content: `Проанализируй следующий текст:\n\n"${textToAnalyze}"\n\nКонтекст: ${context}.`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1200
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    if (response.status === 401) return marked.parse("❌ **Ошибка авторизации (401):** Неверный API ключ ZVENO AI. Проверьте ключ в настройках.");
                    if (response.status === 402) return marked.parse("💳 **Ошибка биллинга (402):** Недостаточно средств на балансе ZVENO AI. Пополните счёт на [zveno.ai](https://zveno.ai).");
                    if (response.status === 429) return marked.parse("⏳ **Превышен лимит запросов (429).** Подождите несколько секунд и попробуйте снова.");
                    throw new Error(`API Error ${response.status}: ${errData.error?.message || 'Unknown error'}`);
                }

                const data = await response.json();
                const text = data.choices?.[0]?.message?.content;
                if (!text) throw new Error("Пустой ответ от API");
                return marked.parse(text);
            } catch (err) {
                console.error("Zveno AI error:", err);
                return marked.parse(`❌ **Ошибка соединения с ZVENO AI.**\n\nПроверьте:\n- Правильность API ключа в настройках\n- Подключение к интернету\n\n*Детали: ${err.message}*`);
            }
        }

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('zveno_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);

            const saveApiSettings = () => {
                const key = document.getElementById('api-key-input').value;
                setApiKey(key);
                localStorage.setItem('zveno_api_key', key);
                setShowSettings(false);
            };

            // Загрузка полных текстов Библии и Корана с надежных CDN
            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        // 1. Библия
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        const bibleRaw = await bibleRes.json();
                        const bibleMap = {};
                        const bibleOrder = []; 
                        bibleRaw.forEach(book => {
                            const ruName = BIBLE_BOOKS_RU[book.name] || book.name;
                            bibleOrder.push(ruName);
                            bibleMap[ruName] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[ruName][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[ruName][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        // 2. Коран (пробуем два независимых CDN для 100% гарантии)
                        const quranMap = {};
                        const quranOrder = []; 
                        SURAH_NAMES_RU.forEach((ruName, index) => {
                            const title = `${index + 1}. ${ruName}`;
                            quranOrder.push(title);
                            quranMap[title] = { "1": {} }; 
                        });

                        try {
                            const quranRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/quran-api@1/editions/rus-elmir-kuliev.json');
                            const quranRaw = await quranRes.json();
                            quranRaw.quran.forEach(item => {
                                const title = quranOrder[item.chapter - 1];
                                if (title) quranMap[title]["1"][String(item.verse)] = item.text;
                            });
                        } catch (e) {
                            const fallbackRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                            const fallbackRaw = await fallbackRes.json();
                            fallbackRaw.data.surahs.forEach(surah => {
                                const title = quranOrder[surah.number - 1];
                                if (title) { surah.ayahs.forEach(ayah => { quranMap[title]["1"][String(ayah.numberInSurah)] = ayah.text; }); }
                            });
                        }

                        setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                        setDataStatus('success');
                    } catch (e) {
                        console.warn("CDN загрузка не удалась, используем запасные тексты:", e);
                        // Используем локальные JSON + встроенные запасные тексты
                        try {
                            const [bibleLocal, quranLocal] = await Promise.all([
                                fetch('./data/bible.json').then(r => r.json()),
                                fetch('./data/quran.json').then(r => r.json())
                            ]);
                            
                            const bibleMap = bibleLocal.content || {};
                            const bibleOrder = bibleLocal.books || Object.keys(bibleMap);
                            
                            // Применяем запасные тексты поверх заглушек
                            Object.keys(FALLBACK_BIBLE).forEach(book => {
                                if (!bibleMap[book]) bibleMap[book] = {};
                                Object.keys(FALLBACK_BIBLE[book]).forEach(ch => {
                                    bibleMap[book][ch] = { ...bibleMap[book][ch], ...FALLBACK_BIBLE[book][ch] };
                                });
                            });

                            const quranContent = quranLocal.content || {};
                            const quranOrder = quranLocal.surahs || Object.keys(quranContent);
                            const quranMap = {};
                            quranOrder.forEach(title => {
                                quranMap[title] = { "1": quranContent[title] || {} };
                            });
                            // Применяем запасные тексты Корана
                            Object.keys(FALLBACK_QURAN).forEach(surah => {
                                const key = quranOrder.find(k => k.includes(surah.split('.')[1]?.trim())) || surah;
                                if (quranMap[key]) quranMap[key]["1"] = { ...quranMap[key]["1"], ...FALLBACK_QURAN[surah] };
                            });

                            setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                            setDataStatus('error'); // Показываем что загрузили локально
                        } catch (e2) {
                            console.error("Даже локальные файлы не загрузились:", e2);
                            setDataStatus('error');
                        }
                    }
                    setLoading(false);
                };
                loadFullTexts();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {/* МОДАЛКА НАСТРОЕК API */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 fade-in-up">
                                <div className="flex items-center mb-6">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mr-4"><Icons.Key c="w-6 h-6" /></div>
                                    <h3 className="text-2xl font-bold font-serif text-stone-900">Настройки ZVENO AI</h3>
                                </div>
                                <div className="bg-amber-50 p-4 rounded-xl mb-6">
                                    <p className="text-stone-700 text-sm mb-3 font-bold">Zveno AI — OpenAI-совместимый шлюз к 200+ моделям. Оплата в рублях, без VPN.</p>
                                    <p className="text-stone-600 text-sm mb-2">С API ключом вы получите:</p>
                                    <ul className="text-sm text-stone-600 list-disc pl-5 space-y-1">
                                        <li>✨ Глубокий AI-анализ любого стиха (GPT-4o / Claude)</li>
                                        <li>🔊 Высококачественное аудио TTS (HD-голоса)</li>
                                        <li>⚡ Автоматический failover между моделями</li>
                                    </ul>
                                    <a href="https://zveno.ai" target="_blank" rel="noopener" className="inline-block mt-3 text-xs text-amber-700 font-bold underline">Получить ключ на zveno.ai →</a>
                                </div>
                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-widest mb-2">API Ключ ZVENO AI</label>
                                <input type="password" placeholder="sk-zveno-..." defaultValue={apiKey} id="api-key-input" className="w-full p-4 border border-stone-300 rounded-xl mb-6 focus:ring-2 focus:ring-amber-500 outline-none font-mono text-sm" />
                                
                                <div className="flex gap-4 justify-end">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-3 rounded-xl font-bold text-stone-500 hover:bg-stone-100">Отмена</button>
                                    <button onClick={saveApiSettings} className="px-6 py-3 rounded-xl font-bold bg-[#1c1b1d] text-white hover:bg-stone-800">Сохранить</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className="w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-8 border-b border-stone-800/60 flex flex-col justify-center h-32 relative">
                            <h1 className="text-stone-100 font-serif text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                            <button onClick={() => setShowSettings(true)} className="absolute right-6 top-1/2 -translate-y-1/2 text-stone-600 hover:text-white transition-colors" title="Настройки API"><Icons.Settings c="w-5 h-5"/></button>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar px-3">
                            <div className="px-4 mt-2 mb-2"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Теория и Анализ</span></div>
                            <NavItem icon={Icons.Dash} label="Главная панель" active={view==='dashboard'} onClick={()=>setView('dashboard')} />
                            <NavItem icon={Icons.Smile} label="Просто о сложном (Полная)" active={view==='simple'} onClick={()=>setView('simple')} />
                            <NavItem icon={Icons.Search} label="Глобальный поиск" active={view==='search'} onClick={()=>setView('search')} />
                            
                            <div className="px-4 mt-8 mb-2"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Чтение Текстов</span></div>
                            <NavItem icon={Icons.Compare} label="Параллельное чтение" active={view==='reader'} onClick={()=>setView('reader')} />
                            <NavItem icon={Icons.Book} label="Библия (AI Комментарии)" active={view==='bible'} onClick={()=>setView('bible')} />
                            <NavItem icon={Icons.Moon} label="Коран (AI Комментарии)" active={view==='quran'} onClick={()=>setView('quran')} />
                        </nav>
                        
                        <div className="p-4 border-t border-stone-800/60 bg-[#161618]">
                            <div className="flex items-center">
                                {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">Синхронизация...</span></>}
                                {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-[10px] font-bold tracking-wider text-emerald-500">Базы загружены (100%)</span></>}
                                {!loading && dataStatus === 'error' && <><div className="w-2 h-2 rounded-full bg-amber-500 mr-3"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">Офлайн режим (локальные данные)</span></>}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 ml-72 p-6 md:p-10 min-h-screen bg-[#f5f4f0]">
                        <div className="max-w-6xl mx-auto h-full">
                            {view === 'dashboard' && <Dashboard setView={setView} apiKey={apiKey} setShowSettings={setShowSettings} />}
                            {view === 'simple' && <DeepExplanationModule />}
                            {view === 'search' && <SearchModule db={db} />}
                            {view === 'reader' && <ParallelReaderModule db={db} />}
                            {view === 'bible' && <SingleReaderModule type="bible" db={db} apiKey={apiKey} />}
                            {view === 'quran' && <SingleReaderModule type="quran" db={db} apiKey={apiKey} />}
                        </div>
                    </main>
                </div>
            );
        }

        function NavItem({ icon: Icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-4 py-3 rounded-xl font-bold text-sm transition-all duration-200 group ${active ? 'bg-amber-600/10 text-amber-500 shadow-sm' : 'text-stone-400 hover:bg-stone-800 hover:text-stone-200'}`}>
                    <Icon c={`w-5 h-5 mr-4 flex-shrink-0 transition-colors ${active ? 'text-amber-500' : 'text-stone-600 group-hover:text-stone-400'}`} /> 
                    <span className="truncate">{label}</span>
                </button>
            );
        }

        // --- УМНЫЙ АУДИО ДВИЖОК ---
        function AudioPlayer({ versesObj, theme, apiKey }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('AI_ZVENO');
            const [isPlaying, setIsPlaying] = useState(false);
            const [apiError, setApiError] = useState('');
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri')) return -1; return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const playNativeChunked = (textArray) => {
                let currentIndex = 0;
                const allPhrases = [];
                textArray.forEach(rawText => {
                    const processed = rawText.replace(/ — /g, ", ").replace(/ - /g, ", ");
                    const fragments = processed.split(/(?<=[.?!;])/g).filter(f => f.trim().length > 0);
                    fragments.forEach(f => allPhrases.push(f));
                });

                const speakNext = () => {
                    if (currentIndex >= allPhrases.length || !isPlaying) {
                        setIsPlaying(false);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(allPhrases[currentIndex]);
                    const voice = voices.find(v => v.name === selectedVoice);
                    if (voice) utterance.voice = voice;
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.85; 
                    utterance.pitch = 0.95; 
                    
                    utterance.onend = () => {
                        currentIndex++;
                        setTimeout(speakNext, 250); 
                    };
                    utterance.onerror = () => setIsPlaying(false);
                    window.speechSynthesis.speak(utterance);
                };
                speakNext();
            };

            const handlePlay = async () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                setApiError('');
                window.speechSynthesis.cancel(); 
                
                const sortedTexts = Object.entries(versesObj).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => t);

                if (apiKey && selectedVoice === 'AI_ZVENO') {
                    try {
                        const fullText = sortedTexts.join(" ");
                        const response = await fetch('https://api.zveno.ai/v1/audio/speech', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                            body: JSON.stringify({ 
                                model: "openai/tts-1-hd", 
                                input: fullText.substring(0, 4000), 
                                voice: theme === 'bible' ? 'onyx' : 'echo',
                                response_format: 'mp3'
                            })
                        });
                        if (!response.ok) {
                            const errText = await response.text().catch(() => '');
                            throw new Error(`API ${response.status}: ${errText.substring(0,100)}`);
                        }
                        const blob = await response.blob();
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        audio.onended = () => setIsPlaying(false);
                        audio.onerror = () => { setIsPlaying(false); setApiError('Ошибка воспроизведения аудио.'); };
                        audio.play();
                    } catch (error) {
                        console.warn("Zveno AI TTS недоступен, переключаемся на встроенный голос:", error);
                        setApiError('TTS недоступен → встроенный голос.');
                        setSelectedVoice(voices[0]?.name || '');
                        playNativeChunked(sortedTexts);
                    }
                } else {
                    playNativeChunked(sortedTexts);
                }
            };

            return (
                <div className="flex flex-col items-end">
                    <div className={`flex items-center p-2 rounded-xl border ${theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} shadow-sm`}>
                        <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                        <select value={selectedVoice} onChange={e => {setSelectedVoice(e.target.value); setApiError('');}} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                            <option value="AI_ZVENO" className="font-bold">✨ ZVENO AI (Нейросеть)</option>
                            <optgroup label="Системные голоса (Встроенные)">
                                {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                            </optgroup>
                        </select>
                        <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100'}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                            {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                        </button>
                    </div>
                    {apiError && <span className="text-[9px] text-rose-500 font-bold uppercase mt-1 px-1">{apiError}</span>}
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ setView, apiKey, setShowSettings }) {
            return (
                <div className="flex flex-col gap-6 fade-in-up">
                    <div className="bg-[#1c1b1d] text-stone-100 p-12 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                        <div className="relative z-10">
                            <h2 className="text-4xl font-serif font-bold mb-4 text-white">Интеграция ZVENO AI 🧠</h2>
                            <p className="text-stone-400 text-lg mb-8 max-w-2xl leading-relaxed">
                                Приложение работает в связке с <strong className="text-amber-500">ZVENO AI</strong> — российским OpenAI-совместимым шлюзом к 200+ моделям (GPT-4o, Claude, Gemini). Оплата в рублях, без VPN. Запрашивайте у ИИ <strong>глубокий анализ любого стиха</strong>. Иллюстрации загружаются с серверов Wikimedia с автоматическим резервным источником.
                            </p>
                            <div className="flex flex-wrap gap-4 mb-6">
                                {!apiKey && (
                                    <button onClick={()=>setShowSettings(true)} className="bg-rose-600 hover:bg-rose-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg transition-all flex items-center">
                                        Подключить ZVENO API <Icons.Key c="w-5 h-5 ml-3" />
                                    </button>
                                )}
                                <button onClick={()=>setView('simple')} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg transition-all flex items-center">
                                    Читать Энциклопедию <Icons.Book c="w-5 h-5 ml-3" />
                                </button>
                                <button onClick={()=>setView('bible')} className="bg-stone-700 hover:bg-stone-600 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center">
                                    Перейти к текстам
                                </button>
                            </div>
                        </div>
                        <Icons.Sparkles c="absolute -right-10 -bottom-20 w-[400px] h-[400px] text-stone-800 opacity-30 pointer-events-none" />
                    </div>
                </div>
            );
        }

        // --- ПОЛНАЯ ЭНЦИКЛОПЕДИЯ (ВОССТАНОВЛЕНА И ЖЕСТКО ВШИТА) ---
        function DeepExplanationModule() {
            return (
                <div className="space-y-12 fade-in-up pb-12">
                    <div className="text-center max-w-3xl mx-auto mb-12">
                        <h2 className="text-4xl font-serif font-bold text-stone-900 mb-6 flex justify-center items-center">
                            <Icons.Smile c="w-10 h-10 mr-4 text-amber-500"/> Полная Энциклопедия
                        </h2>
                        <p className="text-stone-600 text-lg leading-relaxed">
                            Глубокий разбор структуры, истории и теологии главных священных текстов. Иллюстрации загружаются из открытых исторических архивов.
                        </p>
                    </div>
                    
                    {/* БИБЛИЯ */}
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                        <div className="w-full h-64 md:h-96 relative bg-stone-100">
                             <img 
                               src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Gutenberg_Bible%2C_Lenox_Copy%2C_New_York_Public_Library%2C_2009._Pic_01.jpg/1024px-Gutenberg_Bible%2C_Lenox_Copy%2C_New_York_Public_Library%2C_2009._Pic_01.jpg" 
                               alt="Библия Гутенберга"
                               onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1024&q=80"; }}
                               className="absolute inset-0 w-full h-full object-cover" />
                             <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 text-white">
                                 <p className="text-sm font-bold uppercase tracking-widest opacity-80">Исторический архив</p>
                                 <p className="text-xl font-serif">Библия Гутенберга (XV век) — первая печатная книга в Европе.</p>
                             </div>
                        </div>
                        
                        <div className="p-8 md:p-12 lg:p-16">
                            <div className="flex items-center mb-8 pb-6 border-b border-stone-200">
                                <div className="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center mr-6 flex-shrink-0">
                                    <Icons.Book c="w-8 h-8 text-amber-600" />
                                </div>
                                <div>
                                    <h3 className="text-3xl md:text-4xl font-bold font-serif text-stone-900">Анатомия Библии</h3>
                                    <span className="text-amber-600 font-bold uppercase tracking-widest text-xs">Библиотека Заветов</span>
                                </div>
                            </div>
                            
                            <div className="space-y-8 text-stone-700 leading-loose text-lg">
                                <p>Слово «Библия» переводится с греческого как «Книги» (во множественном числе). Это не одно монолитное произведение, а гигантская <strong>древняя библиотека</strong>, писавшаяся более 1000 лет десятками разных авторов: царями, пастухами, священниками, пророками и рыбаками.</p>
                                
                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Часть 1: Ветхий Завет (Танах)</h4>
                                    <p className="mb-6">Написан в основном на древнееврейском языке (иврите) с небольшими фрагментами на арамейском. Иудейская традиция делит этот корпус на три части (Т-Н-Х):</p>
                                    
                                    <div className="space-y-6 pl-4 border-l-4 border-amber-300">
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Т — Тора (Пятикнижие Моисея)</strong> 
                                            Первые 5 книг (Бытие, Исход, Левит, Числа, Второзаконие). Описывают сотворение мира, историю патриархов (Авраама, Исаака, Иакова), грандиозный исход из египетского рабства и дарование Закона (613 заповедей) на горе Синай. Эти законы заложили моральный фундамент западной цивилизации.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Н — Невиим (Пророки)</strong> 
                                            Исторические хроники завоевания Ханаана, эпохи судей, правления царей (Давида, Соломона) и предупреждения пророков о грядущих наказаниях за отступничество от Бога. Пророки выступали как строгая моральная совесть нации.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Х — Ктувим (Писания)</strong> 
                                            Сборник мудрости и поэзии. Сюда входят Псалтирь (молитвенные гимны), Притчи Соломона, философские трактаты Екклесиаста и Иова (о проблеме страдания невинных), а также Песнь Песней.
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Часть 2: Новый Завет</h4>
                                    <p className="mb-6">Написан на древнегреческом языке (койне) в I веке н.э. Является священным исключительно для христиан и состоит из 27 книг:</p>
                                    
                                    <div className="space-y-6 pl-4 border-l-4 border-amber-500">
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Евангелия (Благая весть)</strong> 
                                            Четыре биографии Иисуса Христа от Матфея, Марка, Луки и Иоанна. Описывают Его рождение, чудеса, Нагорную проповедь, распятие и воскресение. Первые три называют "синоптическими", а Евангелие от Иоанна — более философским и теологическим.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Деяния Апостолов и Послания</strong> 
                                            История создания первых христианских церквей и 21 письмо апостолов (в основном Павла). В них объясняется теология: как смерть Христа спасает человечество от греха.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Откровение Иоанна (Апокалипсис)</strong> 
                                            Пророческая книга, полная мистических символов, описывающая конец света, Страшный суд и создание "Нового Иерусалима", где не будет ни плача, ни болезней.
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 bg-amber-100/50 rounded-2xl border border-amber-200 text-amber-950 font-serif shadow-inner">
                                    <strong className="block mb-2 text-amber-700 text-xl">Главный теологический посыл:</strong> 
                                    Вся Библия — это история развития «Заветов» (договоров) между Богом и человечеством. Христиане верят, что Ветхий Завет был подготовкой мира к пришествию Мессии, а Новый Завет — это кульминация Божьего плана спасения через искупительную жертву Иисуса Христа.
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* КОРАН */}
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                        <div className="w-full h-64 md:h-96 relative bg-stone-100">
                             <img 
                               src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/A_large_Qur%27an.jpg/1024px-A_large_Qur%27an.jpg" 
                               alt="Древний Коран"
                               onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1609599006353-e629aaabfeae?w=1024&q=80"; }}
                               className="absolute inset-0 w-full h-full object-cover" />
                             <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 text-white">
                                 <p className="text-sm font-bold uppercase tracking-widest opacity-80">Исламское искусство</p>
                                 <p className="text-xl font-serif">Древний манускрипт Корана с изысканной арабской каллиграфией.</p>
                             </div>
                        </div>
                        
                        <div className="p-8 md:p-12 lg:p-16">
                            <div className="flex items-center mb-8 pb-6 border-b border-stone-200">
                                <div className="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mr-6 flex-shrink-0">
                                    <Icons.Moon c="w-8 h-8 text-emerald-600" />
                                </div>
                                <div>
                                    <h3 className="text-3xl md:text-4xl font-bold font-serif text-stone-900">Анатомия Корана</h3>
                                    <span className="text-emerald-600 font-bold uppercase tracking-widest text-xs">Прямая Речь Творца</span>
                                </div>
                            </div>
                            
                            <div className="space-y-8 text-stone-700 leading-loose text-lg">
                                <p>Коран (от араб. <em>al-qurʾān</em> — «Чтение вслух») — это священная книга ислама. В отличие от Библии, которая воспринимается как боговдохновенный труд разных людей, мусульмане верят, что Коран — это <strong>несотворенная, прямая и дословная речь Бога (Аллаха)</strong>, переданная пророку Мухаммеду через ангела Джибриля (Гавриила) в течение 23 лет (610–632 гг. н.э.).</p>
                                
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-emerald-50/50 p-8 rounded-3xl border border-emerald-100">
                                        <h4 className="text-2xl font-bold font-serif text-emerald-900 mb-4">Суры (Главы)</h4>
                                        <p className="text-base text-stone-600">Коран состоит из 114 сур. Уникальная особенность: они расположены не в хронологическом порядке, а (за исключением первой суры Аль-Фатиха) <strong>от самых длинных к самым коротким</strong>. Поэтому в начале книги обсуждаются сложные законы, а в конце — короткие яркие молитвы.</p>
                                    </div>
                                    <div className="bg-emerald-50/50 p-8 rounded-3xl border border-emerald-100">
                                        <h4 className="text-2xl font-bold font-serif text-emerald-900 mb-4">Аяты (Стихи)</h4>
                                        <p className="text-base text-stone-600">Каждая сура состоит из аятов. Слово «аят» буквально означает «знамение» или «чудо». Мусульмане верят, что сам по себе арабский текст Корана с его идеальной рифмой и ритмом является главным чудом, которое невозможно повторить человеку (концепция Иджаз).</p>
                                    </div>
                                </div>

                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200 mt-8">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-6 text-emerald-800">Два исторических периода</h4>
                                    <p className="mb-6">Жизнь Мухаммеда и текст Корана делятся на два этапа, которые кардинально отличаются по стилю:</p>
                                    
                                    <div className="space-y-6 pl-4 border-l-4 border-emerald-400">
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Мекканские суры (86 сур)</strong> 
                                            Ниспосланы в первые 13 лет в Мекке, когда мусульмане были угнетаемым меньшинством. Эти суры короткие, невероятно поэтичные, с сильным ритмом. Их главная цель — пробудить людей. Темы: Единство Бога (Таухид), критика идолопоклонства, истории древних пророков, живописание Рая и Ада.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Мединские суры (28 сур)</strong> 
                                            Ниспосланы после переселения (Хиджры) в город Медина, где Мухаммед стал главой государства. Эти суры длинные, прозаичные. Они содержат <strong>основы Шариата</strong>: законы брака, развода, наследства, правила ведения войны, поста и отношения с христианами и иудеями («Людьми Писания»).
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-emerald-800">Как понимать Коран? (Тафсир)</h4>
                                    <p className="text-base text-stone-600 mb-4">Коран нельзя толковать произвольно. Исламские ученые используют:</p>
                                    <ul className="list-disc pl-5 text-base text-stone-600 space-y-3">
                                        <li><strong>Асбаб ан-Нузуль:</strong> Наука о «причинах ниспослания». Без знания того, в ответ на какое историческое событие или вопрос был произнесен аят, его легко вырвать из контекста.</li>
                                        <li><strong>Сунна (Хадисы):</strong> Предания о словах и поступках пророка Мухаммеда. Коран дает общие правила (например, "совершайте молитву"), а Сунна детально объясняет, как именно это делать.</li>
                                    </ul>
                                </div>
                                
                                <div className="p-6 bg-emerald-100/50 rounded-2xl border border-emerald-200 text-emerald-950 font-serif shadow-inner">
                                    <strong className="block mb-2 text-emerald-700 text-xl">Главный теологический посыл:</strong> 
                                    Абсолютный и бескомпромиссный монотеизм. Бог Один, Он всемогущ, не рождал и не был рожден. Ислам (покорность) — это возвращение к изначальной чистой вере праотца Авраама (Ибрахима).
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ЧТЕНИЯ С ИНТЕГРАЦИЕЙ ZVENO AI ---
        function SingleReaderModule({ type, db, apiKey }) {
            const isBible = type === 'bible';
            const order = isBible ? db.order.bible : db.order.quran;
            
            const [selectedBook, setSelectedBook] = useState(order[0] || "");
            const chaptersObj = isBible && selectedBook ? db.texts.bible[selectedBook] : {};
            const chapters = Object.keys(chaptersObj).sort((a,b)=>Number(a)-Number(b));
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");
            
            const [openComments, setOpenComments] = useState({});
            // Стейт для хранения ответов AI
            const [aiResponses, setAiResponses] = useState({});
            const [isAiLoading, setIsAiLoading] = useState({});

            useEffect(() => {
                if (order.length > 0 && !selectedBook) setSelectedBook(order[0]);
                setOpenComments({}); setAiResponses({});
            }, [order, selectedBook]);

            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) setSelectedChapter(chapters[0]);
                setOpenComments({}); setAiResponses({});
            }, [selectedBook, chapters, isBible, selectedChapter]);

            const content = isBible ? (chaptersObj[selectedChapter] || {}) : (db.texts.quran[selectedBook]?.["1"] || {});

            let imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Library_of_Celsus_in_Ephesus.jpg/800px-Library_of_Celsus_in_Ephesus.jpg";
            let imgFallback = "https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=800&q=80";
            let imgCap = "Древняя библиотека Эфеса.";
            if (isBible) {
                if(selectedBook === "Бытие" || selectedBook === "Исход") { 
                    imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Judean_Desert_View.jpg/800px-Judean_Desert_View.jpg"; 
                    imgFallback = "https://images.unsplash.com/photo-1548786811-dd6e453ccca7?w=800&q=80";
                    imgCap = "Пустынный ландшафт Иудеи"; 
                }
                if(selectedBook === "Псалтирь" || selectedBook === "Притчи") { 
                    imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Great_Isaiah_Scroll.jpg/800px-Great_Isaiah_Scroll.jpg"; 
                    imgFallback = "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800&q=80";
                    imgCap = "Великий Свиток Исайи (Кумранские рукописи, II в. до н.э.)"; 
                }
                if(selectedBook.includes("От") || selectedBook === "Откровение") { 
                    imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Uncial_0232.jpg/800px-Uncial_0232.jpg"; 
                    imgFallback = "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80";
                    imgCap = "Греческий папирус Нового Завета (III век н.э.)"; 
                }
            } else {
                imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Kaaba_mirror_edit.jpg/800px-Kaaba_mirror_edit.jpg"; 
                imgFallback = "https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?w=800&q=80";
                imgCap = "Священная Кааба в Мекке";
                if(selectedBook.includes("Аль-Фатиха") || selectedBook.includes("Бакара")) {
                    imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/A_large_Qur%27an.jpg/800px-A_large_Qur%27an.jpg";
                    imgFallback = "https://images.unsplash.com/photo-1609599006353-e629aaabfeae?w=800&q=80";
                    imgCap = "Старинный манускрипт Корана с золотой каллиграфией";
                }
            }

            const toggleComment = (verseId) => setOpenComments(prev => ({ ...prev, [verseId]: !prev[verseId] }));

            // ФУНКЦИЯ ВЫЗОВА ZVENO AI
            const handleAiRequest = async (verseId, text) => {
                // Если панель открыта и уже есть ответ — просто закрываем
                if (openComments[verseId] && aiResponses[verseId]) {
                    toggleComment(verseId);
                    return;
                }

                if (!apiKey) {
                    toggleComment(verseId); // открываем панель с подсказкой
                    const hint = marked.parse("⚙️ **Укажите API ключ ZVENO AI** в настройках (иконка шестерёнки в левом меню).\n\nПолучите ключ бесплатно на [zveno.ai](https://zveno.ai).");
                    setAiResponses(prev => ({ ...prev, [verseId]: hint }));
                    return;
                }
                
                toggleComment(verseId);
                if (isAiLoading[verseId]) return; // уже загружается
                
                setIsAiLoading(prev => ({ ...prev, [verseId]: true }));
                setAiResponses(prev => ({ ...prev, [verseId]: '' }));
                
                const contextInfo = isBible ? `Библия, книга «${selectedBook}», глава ${selectedChapter}, стих ${verseId}` : `Коран, сура «${selectedBook}», аят ${verseId}`;
                
                const aiResult = await fetchZvenoAIAnalysis(text, contextInfo, apiKey);
                
                setAiResponses(prev => ({ ...prev, [verseId]: aiResult }));
                setIsAiLoading(prev => ({ ...prev, [verseId]: false }));
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 md:p-6 flex flex-col xl:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">{isBible ? 'Книга Библии' : 'Сура Корана'}</label>
                                <select value={selectedBook} onChange={(e) => { setSelectedBook(e.target.value); if (isBible) setSelectedChapter("1"); }} className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer transition-all ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}>
                                    {order.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select value={selectedChapter} onChange={e=>setSelectedChapter(e.target.value)} className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer transition-all">
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-4 items-center w-full xl:w-auto justify-end">
                            <AudioPlayer versesObj={content} theme={isBible ? 'bible' : 'quran'} apiKey={apiKey} />
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fcfbf9] text-stone-800" : "bg-[#f5fbf8] text-emerald-950"}`}>
                        <div className="max-w-3xl mx-auto">
                            
                            <div className={`mb-12 p-8 rounded-3xl border shadow-sm fade-in-up ${isBible ? 'bg-amber-50/50 border-amber-200' : 'bg-emerald-50/50 border-emerald-200'}`}>
                                <h4 className={`font-sans font-bold text-sm uppercase tracking-widest mb-4 flex items-center ${isBible ? 'text-amber-800' : 'text-emerald-800'}`}>
                                    <Icons.Book c="w-5 h-5 mr-3"/> Академический Контекст
                                </h4>
                                <div className="my-6">
                                    <div className="w-full h-56 md:h-72 rounded-xl overflow-hidden relative shadow-sm border border-stone-200/50 bg-stone-100 flex items-center justify-center">
                                        <img 
                                          src={imgUrl} 
                                          alt="Иллюстрация" 
                                          onError={(e) => { if(e.target.src !== imgFallback) e.target.src = imgFallback; }}
                                          className="object-cover w-full h-full" />
                                    </div>
                                    <p className={`text-[11px] mt-3 text-center uppercase tracking-widest font-bold font-sans ${isBible ? 'text-amber-700' : 'text-emerald-700'}`}>{imgCap}</p>
                                </div>
                                <div className="mt-6 p-4 bg-white/60 rounded-xl border border-stone-200/50">
                                    <p className="font-sans text-sm md:text-base leading-relaxed text-stone-800">
                                        <strong>Новая функция:</strong> Вы можете запросить глубокий историко-теологический анализ любого стиха у нейросети! Наведите курсор на нужный стих и нажмите кнопку <strong>✨ AI Анализ</strong>.
                                    </p>
                                </div>
                            </div>

                            <h3 className={`font-sans font-bold text-xl uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-12 transition-all">
                                    <div className="flex items-start">
                                        <sup className={`text-xs font-sans font-bold mt-2 mr-4 flex-shrink-0 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        <span className="flex-1 text-xl">{t}</span>
                                    </div>
                                    
                                    {/* КНОПКИ ДЕЙСТВИЙ */}
                                    <div className="opacity-0 group-hover:opacity-100 absolute right-0 top-1 flex flex-col gap-2 transition-opacity">
                                        <button onClick={() => copyToClipboard(t)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm border border-stone-200/50 ${isBible ? 'text-amber-600/50 hover:text-amber-600' : 'text-emerald-600/50 hover:text-emerald-600'}`} title="Копировать">
                                            <Icons.Copy c="w-4 h-4"/>
                                        </button>
                                        <button onClick={() => handleAiRequest(v, t)} className={`p-2 rounded-lg bg-amber-100 hover:bg-amber-200 shadow-sm border border-amber-300 text-amber-700 font-bold flex items-center justify-center`} title={openComments[v] && aiResponses[v] ? "Закрыть анализ" : "Запросить AI Анализ (ZVENO)"}>
                                            {openComments[v] && aiResponses[v] ? "✕" : "✨"}
                                        </button>
                                    </div>

                                    {/* ПАНЕЛЬ AI КОММЕНТАРИЯ */}
                                    {openComments[v] && (
                                        <div className={`mt-4 ml-8 p-6 rounded-2xl text-sm font-sans border shadow-sm fade-in-up ${isBible ? 'bg-amber-50/80 border-amber-300 text-stone-800' : 'bg-emerald-50/80 border-emerald-300 text-stone-800'}`}>
                                            <div className="flex items-center mb-4 pb-3 border-b border-stone-200/50">
                                                <Icons.Sparkles c={`w-5 h-5 mr-2 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}/>
                                                <span className="font-bold uppercase tracking-widest text-[11px] text-stone-500">ZVENO AI: Академический разбор стиха {v}</span>
                                            </div>
                                            
                                            {isAiLoading[v] ? (
                                                <div className="flex items-center text-stone-500 italic py-4">
                                                    <Icons.Loader c="w-5 h-5 mr-3 text-amber-500" /> ZVENO AI анализирует стих через GPT-4o / Claude...
                                                </div>
                                            ) : (
                                                <div 
                                                    className="ai-content leading-relaxed" 
                                                    dangerouslySetInnerHTML={{ __html: aiResponses[v] || '' }} 
                                                />
                                            )}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ГЛОБАЛЬНЫЙ ПОИСК ---
        function SearchModule({ db }) {
            const [query, setQuery] = useState("");
            const [results, setResults] = useState({ bible: [], quran: [] });
            const [searching, setSearching] = useState(false);
            const [hasSearched, setHasSearched] = useState(false);

            const handleSearch = () => {
                if (!query || query.length < 3) return;
                setSearching(true); setHasSearched(true);
                setTimeout(() => {
                    const qLower = query.toLowerCase();
                    const bRes = [], qRes = [];
                    db.order.bible.forEach(book => {
                        Object.keys(db.texts.bible[book]).forEach(chap => {
                            Object.entries(db.texts.bible[book][chap]).forEach(([vNum, text]) => {
                                if (text.toLowerCase().includes(qLower)) bRes.push({ book, chap, vNum, text });
                            });
                        });
                    });
                    db.order.quran.forEach(surah => {
                        Object.entries(db.texts.quran[surah]["1"] || {}).forEach(([aNum, text]) => {
                            if (text.toLowerCase().includes(qLower)) qRes.push({ surah, aNum, text });
                        });
                    });
                    setResults({ bible: bRes.slice(0, 150), quran: qRes.slice(0, 150) });
                    setSearching(false);
                }, 100); 
            };

            const highlight = (text, word) => {
                if (!word) return text;
                const parts = text.split(new RegExp(`(${word})`, 'gi'));
                return parts.map((part, i) => part.toLowerCase() === word.toLowerCase() ? <span key={i} className="bg-amber-200 text-amber-900 font-bold px-1 rounded">{part}</span> : part);
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="p-8 border-b border-stone-200 bg-stone-50">
                        <h2 className="text-2xl font-serif font-bold text-stone-900 mb-4 flex items-center"><Icons.Search c="w-6 h-6 mr-3 text-amber-600"/> Глобальный поиск по текстам</h2>
                        <div className="flex gap-4">
                            <input type="text" value={query} onChange={(e)=>setQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} placeholder="Введите слово (Свет, Молитва)..." className="flex-1 p-4 rounded-xl border border-stone-300 font-sans outline-none" />
                            <button onClick={handleSearch} disabled={searching || query.length < 3} className="bg-[#1c1b1d] text-white px-8 rounded-xl font-bold disabled:opacity-50">{searching ? "Поиск..." : "Найти"}</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 flex flex-col md:flex-row gap-8 divide-y md:divide-y-0 md:divide-x divide-stone-200">
                        <div className="flex-1 md:pr-8">
                            <h3 className="font-bold text-amber-700 uppercase tracking-widest text-xs mb-6 border-b pb-2 flex justify-between">Библия {hasSearched && <span className="text-stone-400">Найдено: {results.bible.length}</span>}</h3>
                            {results.bible.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#fdfbf7] border border-amber-100 rounded-xl"><span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.book}, Гл {r.chap} : Ст {r.vNum}</span><p className="font-serif leading-relaxed text-stone-800">{highlight(r.text, query)}</p></div>
                            ))}
                        </div>
                        <div className="flex-1 md:pl-8">
                            <h3 className="font-bold text-emerald-700 uppercase tracking-widest text-xs mb-6 border-b pb-2 flex justify-between">Коран {hasSearched && <span className="text-stone-400">Найдено: {results.quran.length}</span>}</h3>
                            {results.quran.map((r, i) => (
                                <div key={i} className="mb-6 p-4 bg-[#f4faf7] border border-emerald-100 rounded-xl"><span className="text-[10px] font-bold uppercase text-stone-400 block mb-2">{r.surah} : Аят {r.aNum}</span><p className="font-serif leading-relaxed text-emerald-900">{highlight(r.text, query)}</p></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Параллельное чтение
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-stone-200 shadow-sm z-10 gap-4 md:gap-0">
                        <div className="md:pr-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
