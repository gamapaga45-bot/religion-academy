        // --- ZVENO AI API ИНТЕГРАЦИЯ (OpenAI-совместимый шлюз) ---
        // ZVENO AI — академический анализ. Разработано Nikolai Rogozin.
        async function fetchZvenoAIAnalysis(textToAnalyze, context, apiKey) {
            if (!apiKey) return marked.parse("⚙️ **Для AI-анализа укажите API ключ ZVENO AI в настройках** (иконка шестерёнки ⚙️ в левом боковом меню).\n\nZveno AI — российский OpenAI-совместимый шлюз к 200+ моделям. Ключ получите на [zveno.ai](https://zveno.ai).");

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 60000); // 60 сек тайм-аут

            try {
                const response = await fetch('https://api.zveno.ai/v1/chat/completions', {
                    method: 'POST',
                    signal: controller.signal,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-4o",
                        models: ["openai/gpt-4o", "anthropic/claude-sonnet-4-20250514", "google/gemini-2.5-pro"],
                        messages: [
                            {
                                role: "system",
                                content: "Ты — профессор-религиовед с учёными степенями в семитологии и сравнительном богословии. Проведи глубокий академический анализ текста. ОБЯЗАТЕЛЬНО структурируй ответ строго по этим разделам с заголовками ##:\n\n## 📖 Смысл и богословский посыл\n## 🔤 Этимология ключевых слов\n## 🏛 Исторический контекст\n## 🔗 Связи с другими текстами\n## 💡 Практическое значение\n\nКаждый раздел — минимум 2-3 предложения. Используй жирный текст и списки внутри разделов. Отвечай на русском языке."
                            },
                            {
                                role: "user",
                                content: `Проанализируй следующий текст:\n\n"${textToAnalyze}"\n\nКонтекст: ${context}.`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1500
                    })
                });
                clearTimeout(timeout);

                if (!response.ok) {
                    let errMsg = '';
                    try { const e = await response.json(); errMsg = e.error?.message || e.message || ''; } catch(_) {}
                    if (response.status === 401) return marked.parse("❌ **Ошибка 401 — Неверный API ключ.** Проверьте ключ в настройках (⚙️).");
                    if (response.status === 402) return marked.parse("💳 **Ошибка 402 — Недостаточно средств.** Пополните баланс на [zveno.ai](https://zveno.ai).");
                    if (response.status === 429) return marked.parse("⏳ **Ошибка 429 — Лимит запросов.** Подождите 10–20 секунд и повторите.");
                    if (response.status === 503) return marked.parse("🔧 **Ошибка 503 — Сервис временно недоступен.** Попробуйте через минуту.");
                    return marked.parse(`❌ **Ошибка API ${response.status}:** ${errMsg || 'Неизвестная ошибка'}. Проверьте ключ и баланс на [zveno.ai](https://zveno.ai).`);
                }

                const data = await response.json();
                const text = data.choices?.[0]?.message?.content;
                if (!text) return marked.parse("⚠️ **Пустой ответ от API.** Попробуйте ещё раз.");
                return marked.parse(text);

            } catch (err) {
                clearTimeout(timeout);
                console.error("Zveno AI error:", err);
                if (err.name === 'AbortError') return marked.parse("⏱️ **Превышено время ожидания (60 сек).** Сервер не ответил. Проверьте интернет и попробуйте снова.");
                return marked.parse(`❌ **Ошибка соединения с ZVENO AI.**\n\nВозможные причины:\n- Неверный или просроченный API ключ\n- Нет соединения с интернетом\n- Временная недоступность сервера\n\n*Детали: ${err.message}*\n\nПроверьте настройки на [zveno.ai](https://zveno.ai).`);
            }
        }

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('zveno_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [apiKeyInput, setApiKeyInput] = useState(localStorage.getItem('zveno_api_key') || '');
            // Глобальная модалка AI анализа
            const [aiModal, setAiModal] = useState(null);
            // Мобильное меню
            const [mobileOpen, setMobileOpen] = useState(false);

            const saveApiSettings = () => {
                const key = apiKeyInput.trim();
                setApiKey(key);
                localStorage.setItem('zveno_api_key', key);
                setShowSettings(false);
            };

            // Загрузка полных текстов Библии и Корана с надежных CDN
            useEffect(() => {
                const loadFullTexts = async () => {
                    try {
                        // 1. Библия
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        const bibleRaw = await bibleRes.json();
                        const bibleMap = {};
                        const bibleOrder = []; 
                        bibleRaw.forEach(book => {
                            const ruName = BIBLE_BOOKS_RU[book.name] || book.name;
                            bibleOrder.push(ruName);
                            bibleMap[ruName] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[ruName][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[ruName][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        // 2. Коран (пробуем два независимых CDN для 100% гарантии)
                        const quranMap = {};
                        const quranOrder = []; 
                        SURAH_NAMES_RU.forEach((ruName, index) => {
                            const title = `${index + 1}. ${ruName}`;
                            quranOrder.push(title);
                            quranMap[title] = { "1": {} }; 
                        });

                        try {
                            const quranRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/quran-api@1/editions/rus-elmir-kuliev.json');
                            const quranRaw = await quranRes.json();
                            quranRaw.quran.forEach(item => {
                                const title = quranOrder[item.chapter - 1];
                                if (title) quranMap[title]["1"][String(item.verse)] = item.text;
                            });
                        } catch (e) {
                            const fallbackRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                            const fallbackRaw = await fallbackRes.json();
                            fallbackRaw.data.surahs.forEach(surah => {
                                const title = quranOrder[surah.number - 1];
                                if (title) { surah.ayahs.forEach(ayah => { quranMap[title]["1"][String(ayah.numberInSurah)] = ayah.text; }); }
                            });
                        }

                        setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                        setDataStatus('success');
                    } catch (e) {
                        console.warn("CDN загрузка не удалась, используем запасные тексты:", e);
                        // Используем локальные JSON + встроенные запасные тексты
                        try {
                            const [bibleLocal, quranLocal] = await Promise.all([
                                fetch('./data/bible.json').then(r => r.json()),
                                fetch('./data/quran.json').then(r => r.json())
                            ]);
                            
                            const bibleMap = bibleLocal.content || {};
                            const bibleOrder = bibleLocal.books || Object.keys(bibleMap);
                            
                            // Применяем запасные тексты поверх заглушек
                            Object.keys(FALLBACK_BIBLE).forEach(book => {
                                if (!bibleMap[book]) bibleMap[book] = {};
                                Object.keys(FALLBACK_BIBLE[book]).forEach(ch => {
                                    bibleMap[book][ch] = { ...bibleMap[book][ch], ...FALLBACK_BIBLE[book][ch] };
                                });
                            });

                            const quranContent = quranLocal.content || {};
                            const quranOrder = quranLocal.surahs || Object.keys(quranContent);
                            const quranMap = {};
                            quranOrder.forEach(title => {
                                quranMap[title] = { "1": quranContent[title] || {} };
                            });
                            // Применяем запасные тексты Корана
                            Object.keys(FALLBACK_QURAN).forEach(surah => {
                                const key = quranOrder.find(k => k.includes(surah.split('.')[1]?.trim())) || surah;
                                if (quranMap[key]) quranMap[key]["1"] = { ...quranMap[key]["1"], ...FALLBACK_QURAN[surah] };
                            });

                            setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                            setDataStatus('error'); // Показываем что загрузили локально
                        } catch (e2) {
                            console.error("Даже локальные файлы не загрузились:", e2);
                            setDataStatus('error');
                        }
                    }
                    setLoading(false);
                };
                loadFullTexts();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {/* МОДАЛКА НАСТРОЕК API */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 fade-in-up">
                                <div className="flex items-center mb-6">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mr-4"><Icons.Key c="w-6 h-6" /></div>
                                    <h3 className="text-2xl font-bold font-serif text-stone-900">Настройки ZVENO AI</h3>
                                </div>
                                <div className="bg-amber-50 p-4 rounded-xl mb-6">
                                    <p className="text-stone-700 text-sm mb-3 font-bold">Zveno AI — OpenAI-совместимый шлюз к 200+ моделям. Оплата в рублях, без VPN.</p>
                                    <p className="text-stone-600 text-sm mb-2">С API ключом вы получите:</p>
                                    <ul className="text-sm text-stone-600 list-disc pl-5 space-y-1">
                                        <li>✨ Глубокий AI-анализ любого стиха (GPT-4o / Claude)</li>
                                        <li>🔊 Высококачественное аудио TTS (HD-голоса)</li>
                                        <li>⚡ Автоматический failover между моделями</li>
                                    </ul>
                                    <a href="https://zveno.ai" target="_blank" rel="noopener" className="inline-block mt-3 text-xs text-amber-700 font-bold underline">Получить ключ на zveno.ai →</a>
                                </div>
                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-widest mb-2">API Ключ ZVENO AI</label>
                                <input type="password" placeholder="sk-zveno-..." value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveApiSettings()} className="w-full p-4 border border-stone-300 rounded-xl mb-6 focus:ring-2 focus:ring-amber-500 outline-none font-mono text-sm" />
                                
                                {apiKey && (
                                    <div className="flex items-center gap-2 mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-xl">
                                        <div className="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0"></div>
                                        <span className="text-xs font-bold text-emerald-700">Ключ сохранён и активен</span>
                                        <button onClick={() => { setApiKeyInput(''); setApiKey(''); localStorage.removeItem('zveno_api_key'); }} className="ml-auto text-xs text-red-400 hover:text-red-600 font-bold">Удалить</button>
                                    </div>
                                )}
                                <div className="flex gap-4 justify-end">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-3 rounded-xl font-bold text-stone-500 hover:bg-stone-100">Отмена</button>
                                    <button onClick={saveApiSettings} className="px-6 py-3 rounded-xl font-bold bg-[#1c1b1d] text-white hover:bg-stone-800">Сохранить ключ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* МОБИЛЬНАЯ ШАПКА */}
                    <div className="mobile-header">
                        <div className="flex items-center gap-3">
                            <button onClick={()=>setMobileOpen(true)} className="text-stone-400 hover:text-white p-1">
                                <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                            </button>
                            <span className="text-white font-serif font-bold text-lg uppercase tracking-tight">Академия</span>
                            <span className="text-amber-500 text-[10px] font-bold tracking-widest">РЕЛИГИЙ</span>
                        </div>
                        <div className="flex items-center gap-2">
                            {dataStatus==='success' && <span className="w-2 h-2 rounded-full bg-emerald-500"/>}
                            {dataStatus==='loading' && <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"/>}
                            <button onClick={()=>{setApiKeyInput(apiKey);setShowSettings(true);}} className="text-stone-400 hover:text-white p-1">
                                <Icons.Settings c="w-5 h-5"/>
                            </button>
                        </div>
                    </div>

                    {/* МОБИЛЬНОЕ БОКОВОЕ МЕНЮ (drawer) */}
                    {mobileOpen && (
                        <div className="mobile-drawer">
                            <div className="mobile-drawer-bg" onClick={()=>setMobileOpen(false)}/>
                            <div className="mobile-drawer-panel">
                                <div className="p-5 border-b border-stone-800 flex items-center justify-between">
                                    <div>
                                        <h1 className="text-white font-serif font-bold text-xl uppercase">Академия</h1>
                                        <span className="text-amber-500 text-[10px] font-bold tracking-widest">РЕЛИГИОВЕДЕНИЯ</span>
                                    </div>
                                    <button onClick={()=>setMobileOpen(false)} className="text-stone-500 hover:text-white text-xl font-bold">✕</button>
                                </div>
                                <nav className="flex-1 py-4 px-2 overflow-y-auto">
                                    <SidebarNav view={view} setView={(v)=>{setView(v);setMobileOpen(false);}} loading={loading} dataStatus={dataStatus} apiKey={apiKey} setApiKeyInput={setApiKeyInput} setShowSettings={setShowSettings}/>
                                </nav>
                                <div className="p-4 border-t border-stone-800 text-center">
                                    <p className="text-[9px] text-stone-600 font-bold uppercase">© Nikolai Rogozin</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ДЕСКТОП САЙДБАР */}
                    <aside className="sidebar-desktop w-64 lg:w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-6 border-b border-stone-800/60 flex flex-col justify-center relative" style={{minHeight:'88px'}}>
                            <h1 className="text-stone-100 font-serif text-xl lg:text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-[10px] font-sans font-bold tracking-[0.2em] mt-1.5">РЕЛИГИОВЕДЕНИЯ</span>
                            <button onClick={() => { setApiKeyInput(apiKey); setShowSettings(true); }} className="absolute right-4 top-1/2 -translate-y-1/2 text-stone-600 hover:text-white transition-colors" title="Настройки API"><Icons.Settings c="w-5 h-5"/></button>
                        </div>
                        <nav className="flex-1 py-4 space-y-0.5 overflow-y-auto px-2">
                            <SidebarNav view={view} setView={setView} loading={loading} dataStatus={dataStatus} apiKey={apiKey} setApiKeyInput={setApiKeyInput} setShowSettings={setShowSettings}/>
                        </nav>
                        <div className="p-3 border-t border-stone-800/60 bg-[#161618]">
                            <div className="flex items-center">
                                {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-2"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">Синхронизация...</span></>}
                                {!loading && dataStatus==='success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-2"></div><span className="text-[10px] font-bold tracking-wider text-emerald-500">Базы загружены</span></>}
                                {!loading && dataStatus==='error' && <><div className="w-2 h-2 rounded-full bg-amber-500 mr-2"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">Офлайн режим</span></>}
                            </div>
                            <div className="mt-2 pt-2 border-t border-stone-800/40">
                                <p className="text-[9px] text-stone-600 font-bold uppercase tracking-widest">© Разработано</p>
                                <p className="text-[10px] text-amber-600/70 font-bold mt-0.5">Nikolai Rogozin</p>
                            </div>
                        </div>
                    </aside>

                    {/* МОБИЛЬНАЯ НИЖНЯЯ НАВИГАЦИЯ */}
                    <nav className="mobile-nav">
                        {[
                            {v:'dashboard', icon:'🏠', label:'Главная'},
                            {v:'religions', icon:'🌍', label:'Религии'},
                            {v:'step', icon:'📚', label:'Учёба'},
                            {v:'deep', icon:'✨', label:'AI'},
                            {v:'search', icon:'🔍', label:'Поиск'},
                        ].map(({v,icon,label})=>(
                            <button key={v} className={`mobile-nav-item ${view===v?'active':''}`} onClick={()=>setView(v)}>
                                <span style={{fontSize:20}}>{icon}</span>
                                <span>{label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="main-tablet flex-1 ml-64 lg:ml-72 main-mobile" style={{paddingBottom:'0'}}>
                        <div className="content-pad p-4 md:p-6 lg:p-10 min-h-screen bg-[#f5f4f0] pt-16 md:pt-6 pb-24 md:pb-6">
                            <div className="max-w-6xl mx-auto">
                            {view === 'dashboard' && <Dashboard setView={setView} apiKey={apiKey} setShowSettings={setShowSettings} />}
                            {view === 'step' && <StepStudyModule db={db} apiKey={apiKey} />}
                            {view === 'plain' && <PlainLanguageModule apiKey={apiKey} />}
                            {view === 'deep' && <DeepCommentaryModule apiKey={apiKey} />}
                            {view === 'manuscripts' && <ManuscriptsModule apiKey={apiKey} />}
                            {view === 'simple' && <DeepExplanationModule />}
                            {view === 'search' && <SearchModule db={db} />}
                            {view === 'reader' && <ParallelReaderModule db={db} />}
                            {view === 'bible' && <SingleReaderModule type="bible" db={db} apiKey={apiKey} setAiModal={setAiModal} />}
                            {view === 'quran' && <SingleReaderModule type="quran" db={db} apiKey={apiKey} setAiModal={setAiModal} />}
                            {view === 'religions' && <WorldReligionsModule apiKey={apiKey} setAiModal={setAiModal} />}
                            {view === 'religion_reader' && <ReligionReaderModule apiKey={apiKey} setAiModal={setAiModal} />}
                            </div>
                        </div>
                    </main>

                    {/* ═══ ГЛОБАЛЬНАЯ МОДАЛКА AI АНАЛИЗА ═══ */}
                    {aiModal && (
                        <div
                            className="fixed inset-0 flex items-center justify-center p-4"
                            style={{position:'fixed', top:0, left:0, right:0, bottom:0, zIndex:99999,
                                    backgroundColor:'rgba(0,0,0,0.7)', backdropFilter:'blur(4px)',
                                    display:'flex', alignItems:'center', justifyContent:'center'}}>
                            <div
                                style={{background:'#fff', borderRadius:24, boxShadow:'0 25px 60px rgba(0,0,0,0.4)',
                                        width:'100%', maxWidth:680, maxHeight:'88vh',
                                        display:'flex', flexDirection:'column', overflow:'hidden'}}>
                                {/* Шапка */}
                                <div style={{background: aiModal.isBible ? '#fffbeb' : '#f0fdf4',
                                             borderBottom:'1px solid', borderColor: aiModal.isBible ? '#fde68a' : '#bbf7d0',
                                             padding:'16px 24px', display:'flex', alignItems:'flex-start',
                                             justifyContent:'space-between', flexShrink:0}}>
                                    <div style={{flex:1, minWidth:0, paddingRight:12}}>
                                        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                                            <span style={{fontSize:14}}>✨</span>
                                            <span style={{fontSize:10, fontWeight:700, textTransform:'uppercase',
                                                          letterSpacing:'0.1em', color: aiModal.isBible ? '#92400e' : '#065f46'}}>
                                                ZVENO AI · {aiModal.label}
                                            </span>
                                        </div>
                                        <p style={{fontFamily:'Merriweather,serif', fontSize:14, lineHeight:1.5,
                                                   color: aiModal.isBible ? '#44403c' : '#064e3b', margin:0}}>
                                            <sup style={{fontSize:10, fontWeight:700, marginRight:4,
                                                         color: aiModal.isBible ? '#d97706' : '#059669'}}>
                                                {aiModal.verseId}
                                            </sup>
                                            {aiModal.verseText}
                                        </p>
                                    </div>
                                    <button
                                        onClick={() => setAiModal(null)}
                                        style={{flexShrink:0, width:32, height:32, borderRadius:16,
                                                background:'white', border:'1px solid #e5e7eb',
                                                display:'flex', alignItems:'center', justifyContent:'center',
                                                cursor:'pointer', fontSize:16, color:'#6b7280', fontWeight:700,
                                                marginLeft:8}}>
                                        ✕
                                    </button>
                                </div>
                                {/* Тело */}
                                <div style={{flex:1, overflowY:'auto', padding:24, minHeight:0}}>
                                    {aiModal.loading ? (
                                        <div style={{display:'flex', flexDirection:'column', alignItems:'center',
                                                     justifyContent:'center', padding:'64px 0', gap:16}}>
                                            <Icons.Loader c={`w-8 h-8 ${aiModal.isBible ? 'text-amber-500' : 'text-emerald-500'}`}/>
                                            <p style={{fontWeight:700, color:'#374151', margin:0}}>ZVENO AI анализирует...</p>
                                            <p style={{fontSize:13, color:'#9ca3af', margin:0}}>GPT-4o / Claude изучают текст</p>
                                        </div>
                                    ) : (
                                        <AiAccordion html={aiModal.html} isBible={aiModal.isBible} />
                                    )}
                                </div>
                                {/* Подвал */}
                                <div style={{padding:'12px 24px', borderTop:'1px solid #f3f4f6',
                                             background:'#f9fafb', display:'flex', alignItems:'center',
                                             justifyContent:'space-between', flexShrink:0}}>
                                    <span style={{fontSize:10, color:'#9ca3af', fontWeight:700,
                                                  textTransform:'uppercase', letterSpacing:'0.1em'}}>
                                        Академический анализ · Nikolai Rogozin
                                    </span>
                                    <button
                                        onClick={() => setAiModal(null)}
                                        style={{padding:'8px 20px', borderRadius:12, background:'#111827',
                                                color:'white', fontSize:12, fontWeight:700, border:'none',
                                                cursor:'pointer'}}>
                                        Закрыть
                                    </button>
                                </div>
                            </div>
                        </div>

                        '10': 'Бог один, но многих имён Он. Он — Создатель всего сущего. Его нет нужды бояться. Он не в ненависти. Он — вечный. Вне рождения. Самосущий. Постигается милостью Гуру.',
                        '11': 'Загрязнение ума — алчность и гордость. Ложь и лицемерие — грех величайший. Молитва Богу, говорит Нанак, — вот истинное омовение.',
                        '12': 'Истина выше всего, но выше Истины — жизнь в Истине. Если разум чист, можно увидеть Бога везде.',
                    }},
                ]
            },
            shinto: {
                name: 'Кодзики (Записи о деяниях древности)',
                tradition: 'Синтоизм',
                language: 'Японский → Русский',
                sections: [
                    { title: 'Эпоха богов (Камицуё)', verses: {
                        '1': 'В начале, когда небо и земля только разделились, имена богов, рождённых в Равнине Высокого Неба, были таковы: первым появился Амэ-но Минакануси-но Ками — Владыка Священного Центра Небес.',
                        '2': 'Затем — Такамимусуби-но Ками — Бог Высокого Творения. Затем — Камимусуби-но Ками — Бог Божественного Творения. Эти три бога — Единые Боги Незримые.',
                        '3': 'Изанаги и Изанами, стоя на Плавучем Небесном Мосту, погрузили Небесное Яшмовое Копьё в воды и помешали ими. Когда копьё вынули, капли, упавшие с него, стали первым островом Оногоро.',
                    }},
                    { title: 'Учение о ками', verses: {
                        '10': 'Ками — это природные силы, которые наполняют мир. В горах и реках, в деревьях и камнях, в ветре и море — везде присутствует ками. Всё живое и неживое наделено духом.',
                        '11': 'Очищение (михарай) и искренность сердца (макото-но кокоро) — основа отношений человека с ками. Чистое сердце привлекает благодать богов, нечистое отталкивает её.',
                        '12': 'Природа в Японии — священна. Каждый холм, каждое дерево может быть обителью ками. Поэтому японцы издревле не строили постоянных святилищ — ками и так повсюду.',
                    }},
                    { title: 'Молитвы норито', verses: {
                        '20': 'Я произношу слова великого ритуала очищения. Пусть грехи и нечистота, совершённые небесными и земными людьми, будут услышаны и унесены великой богиней Сэоридзимэ.',
                        '21': 'О Великая богиня Аматэрасу, освещающая небеса! Пусть твой свет осветит всё живое на восьми великих островах. Пусть люди живут в мире и согласии под твоим покровительством.',
                    }},
                ]
            },
        };
        </script>

        <script type="text/babel">
        // Компонент: Навигация сайдбара (общий для desktop и mobile)
        function SidebarNav({ view, setView, apiKey, setApiKeyInput, setShowSettings }) {
            const NI = ({icon: Icon, label, v}) => (

            return (
                <div className="space-y-0.5">

                    <NI icon={Icons.Dash} label="Главная" v="dashboard"/>
                    <NI icon={Icons.Compare} label="Пошаговое изучение" v="step"/>
                    <NI icon={Icons.Smile} label="Просто о сложном" v="plain"/>

                    <NI icon={Icons.Sparkles} label="Глубокий AI анализ" v="deep"/>
                    <NI icon={Icons.Scroll} label="Манускрипты" v="manuscripts"/>
                    <NI icon={Icons.Search} label="Глобальный поиск" v="search"/>
                    <NI icon={Icons.Info} label="Энциклопедия" v="simple"/>
                    <div className="px-3 pt-4 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Мировые религии</span></div>
                    <NI icon={Icons.Book} label="Все религии мира" v="religions"/>
                    <NI icon={Icons.Compare} label="Параллельное чтение" v="reader"/>
                    <div className="px-3 pt-4 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Тексты</span></div>
                    <NI icon={Icons.Book} label="Библия (AI)" v="bible"/>
                    <NI icon={Icons.Moon} label="Коран (AI)" v="quran"/>
                    <NI icon={Icons.Heart} label="Читать религию..." v="religion_reader"/>
                    {!apiKey && (
                        <button onClick={()=>setShowSettings(true)} className="w-full mt-4 mx-auto flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-amber-600/10 border border-amber-600/20 text-amber-500 text-xs font-bold transition-all hover:bg-amber-600/20">
                            <Icons.Key c="w-3.5 h-3.5"/> Подключить AI
                        </button>
                    )}
                </div>
            );
        }

        // --- УМНЫЙ АУДИО ДВИЖОК ---
        function AudioPlayer({ versesObj, theme, apiKey }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('AI_ZVENO');
            const [isPlaying, setIsPlaying] = useState(false);
            const [apiError, setApiError] = useState('');
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri')) return -1; return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const playNativeChunked = (textArray) => {
                let currentIndex = 0;
                const allPhrases = [];
                textArray.forEach(rawText => {
                    const processed = rawText.replace(/ — /g, ", ").replace(/ - /g, ", ");
                    const fragments = processed.split(/(?<=[.?!;])/g).filter(f => f.trim().length > 0);
                    fragments.forEach(f => allPhrases.push(f));
                });

                const speakNext = () => {
                    if (currentIndex >= allPhrases.length || !isPlaying) {
                        setIsPlaying(false);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(allPhrases[currentIndex]);
                    const voice = voices.find(v => v.name === selectedVoice);
                    if (voice) utterance.voice = voice;
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.85; 
                    utterance.pitch = 0.95; 
                    
                    utterance.onend = () => {
                        currentIndex++;
                        setTimeout(speakNext, 250); 
                    };
                    utterance.onerror = () => setIsPlaying(false);
                    window.speechSynthesis.speak(utterance);
                };
                speakNext();
            };

            const handlePlay = async () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                setApiError('');
                window.speechSynthesis.cancel(); 
                
                const sortedTexts = Object.entries(versesObj).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => t);

                if (apiKey && selectedVoice === 'AI_ZVENO') {
                    try {
                        // Zveno AI не поддерживает /v1/audio/speech (404).
                        // Запрашиваем очищенный текст через chat completions,
                        // затем озвучиваем лучшим голосом браузера.
                        const fullText = sortedTexts.join(" ").substring(0, 3000);
                        const response = await fetch('https://api.zveno.ai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                            body: JSON.stringify({
                                model: "openai/gpt-4o",
                                models: ["openai/gpt-4o", "anthropic/claude-sonnet-4-20250514"],
                                messages: [{
                                    role: "system",
                                    content: "Ты диктор. Получи текст и верни его точно, убрав только служебные символы. Не добавляй ничего от себя. Только чистый текст."
                                }, {
                                    role: "user",
                                    content: fullText
                                }],
                                temperature: 0,
                                max_tokens: 2000
                            })
                        });
                        if (!response.ok) throw new Error(`API ${response.status}`);
                        const data = await response.json();
                        const cleanText = data.choices?.[0]?.message?.content || fullText;
                        const ruVoice = voices.find(v => v.lang && v.lang.includes('ru')) || voices[0];
                        const utterance = new SpeechSynthesisUtterance(cleanText);
                        if (ruVoice) utterance.voice = ruVoice;
                        utterance.lang = 'ru-RU';
                        utterance.rate = 0.85;
                        utterance.pitch = 0.95;
                        utterance.onend = () => setIsPlaying(false);
                        utterance.onerror = () => setIsPlaying(false);
                        window.speechSynthesis.speak(utterance);
                    } catch (error) {
                        console.warn("Zveno AI: переключаемся на встроенный голос:", error);
                        setApiError('Используется встроенный голос.');
                        playNativeChunked(sortedTexts);
                    }
                } else {
                    playNativeChunked(sortedTexts);
                }
            };

            return (
                <div className="flex flex-col items-end">
                    <div className={`flex items-center p-2 rounded-xl border ${theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} shadow-sm`}>
                        <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                        <select value={selectedVoice} onChange={e => {setSelectedVoice(e.target.value); setApiError('');}} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                            <option value="AI_ZVENO" className="font-bold">✨ ZVENO AI (Нейросеть)</option>
                            <optgroup label="Системные голоса (Встроенные)">
                                {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                            </optgroup>
                        </select>
                        <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100'}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                            {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                        </button>
                    </div>
                    {apiError && <span className="text-[9px] text-rose-500 font-bold uppercase mt-1 px-1">{apiError}</span>}
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ setView, apiKey, setShowSettings }) {
            return (
                <div className="flex flex-col gap-6 fade-in-up">
                    <div className="bg-[#1c1b1d] text-stone-100 p-10 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                        <div className="relative z-10">
                            <h2 className="text-4xl font-serif font-bold mb-3 text-white">Академия Религиоведения 🧠</h2>
                            <p className="text-stone-400 text-lg mb-8 max-w-2xl leading-relaxed">
                                Полная платформа сравнительного изучения Библии и Корана с нейросетью <strong className="text-amber-500">ZVENO AI</strong> (GPT-4o / Claude). Оплата в рублях, без VPN.
                            </p>
                            {!apiKey && (
                                <button onClick={()=>setShowSettings(true)} className="bg-rose-600 hover:bg-rose-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all flex items-center mb-6">
                                    ⚙️ Подключить ZVENO API для AI-анализа <Icons.Key c="w-4 h-4 ml-2" />
                                </button>
                            )}
                        </div>
                        <Icons.Sparkles c="absolute -right-10 -bottom-20 w-[350px] h-[350px] text-stone-800 opacity-30 pointer-events-none" />
                    </div>
                    <div className="grid md:grid-cols-2 gap-4">
                        {[
                            {view:'step', icon:'📚', title:'Пошаговое изучение', desc:'5 уроков: сравнение Библии и Корана по темам. Простой язык, ключевые слова, AI-вопросы.', color:'amber'},
                            {view:'plain', icon:'💬', title:'Просто о сложном', desc:'Сотворение, грех, Иисус/Иса, молитва, заповеди — объяснено понятно и глубоко.', color:'blue'},
                            {view:'deep', icon:'🔬', title:'Глубокий AI анализ', desc:'8 больших тем: академический разбор нейросетью с цитатами, богословием и историей.', color:'purple'},
                            {view:'manuscripts', icon:'📜', title:'Манускрипты и оригиналы', desc:'Синайский кодекс, Свитки Мёртвого моря, Коран Топкапы — с фото и оригинальными текстами.', color:'stone'},
                            {view:'religions', icon:'🌍', title:'Мировые религии', desc:'10 традиций: Буддизм, Индуизм, Даосизм, Зороастризм, Конфуцианство, Сикхизм, Синто и другие с полными текстами.', color:'purple'},
                            {view:'reader', icon:'⚖️', title:'Параллельное чтение', desc:'Библия и Коран рядом. Выберите главу и суру — читайте одновременно.', color:'emerald'},
                            {view:'search', icon:'🔍', title:'Глобальный поиск', desc:'Найдите любое слово в полных текстах Библии и Корана одновременно.', color:'rose'},
                        ].map(item => (
                            <button key={item.view} onClick={()=>setView(item.view)}
                                className="bg-white border border-stone-200 hover:border-stone-400 hover:shadow-md rounded-2xl p-6 text-left transition-all group">
                                <span className="text-3xl block mb-3">{item.icon}</span>
                                <h3 className="font-serif font-bold text-xl text-stone-900 mb-2 group-hover:text-amber-700 transition-colors">{item.title}</h3>
                                <p className="text-stone-500 text-sm leading-relaxed">{item.desc}</p>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // --- ПОЛНАЯ ЭНЦИКЛОПЕДИЯ (ВОССТАНОВЛЕНА И ЖЕСТКО ВШИТА) ---
        function DeepExplanationModule() {
            return (
                <div className="space-y-12 fade-in-up pb-12">
                    <div className="text-center max-w-3xl mx-auto mb-12">
                        <h2 className="text-4xl font-serif font-bold text-stone-900 mb-6 flex justify-center items-center">
                            <Icons.Smile c="w-10 h-10 mr-4 text-amber-500"/> Полная Энциклопедия
                        </h2>
                        <p className="text-stone-600 text-lg leading-relaxed">
                            Глубокий разбор структуры, истории и теологии главных священных текстов. Иллюстрации загружаются из открытых исторических архивов.
                        </p>
                    </div>
                    
                    {/* БИБЛИЯ */}
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                        <div className="w-full h-64 md:h-96 relative bg-stone-100">
                             <img 
                               src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200&q=85" 
                               alt="Библия Гутенберга"
                               onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1024&q=80"; }}
                               className="absolute inset-0 w-full h-full object-cover" />
                             <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 text-white">
                                 <p className="text-sm font-bold uppercase tracking-widest opacity-80">Исторический архив</p>
                                 <p className="text-xl font-serif">Библия Гутенберга (XV век) — первая печатная книга в Европе.</p>
                             </div>
                        </div>
                        
                        <div className="p-8 md:p-12 lg:p-16">
                            <div className="flex items-center mb-8 pb-6 border-b border-stone-200">
                                <div className="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center mr-6 flex-shrink-0">
                                    <Icons.Book c="w-8 h-8 text-amber-600" />
                                </div>
                                <div>
                                    <h3 className="text-3xl md:text-4xl font-bold font-serif text-stone-900">Анатомия Библии</h3>
                                    <span className="text-amber-600 font-bold uppercase tracking-widest text-xs">Библиотека Заветов</span>
                                </div>
                            </div>
                            
                            <div className="space-y-8 text-stone-700 leading-loose text-lg">
                                <p>Слово «Библия» переводится с греческого как «Книги» (во множественном числе). Это не одно монолитное произведение, а гигантская <strong>древняя библиотека</strong>, писавшаяся более 1000 лет десятками разных авторов: царями, пастухами, священниками, пророками и рыбаками.</p>
                                
                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Часть 1: Ветхий Завет (Танах)</h4>
                                    <p className="mb-6">Написан в основном на древнееврейском языке (иврите) с небольшими фрагментами на арамейском. Иудейская традиция делит этот корпус на три части (Т-Н-Х):</p>
                                    
                                    <div className="space-y-6 pl-4 border-l-4 border-amber-300">
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Т — Тора (Пятикнижие Моисея)</strong> 
                                            Первые 5 книг (Бытие, Исход, Левит, Числа, Второзаконие). Описывают сотворение мира, историю патриархов (Авраама, Исаака, Иакова), грандиозный исход из египетского рабства и дарование Закона (613 заповедей) на горе Синай. Эти законы заложили моральный фундамент западной цивилизации.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Н — Невиим (Пророки)</strong> 
                                            Исторические хроники завоевания Ханаана, эпохи судей, правления царей (Давида, Соломона) и предупреждения пророков о грядущих наказаниях за отступничество от Бога. Пророки выступали как строгая моральная совесть нации.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Х — Ктувим (Писания)</strong> 
                                            Сборник мудрости и поэзии. Сюда входят Псалтирь (молитвенные гимны), Притчи Соломона, философские трактаты Екклесиаста и Иова (о проблеме страдания невинных), а также Песнь Песней.
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-stone-50 p-8 rounded-3xl border border-stone-200">
                                    <h4 className="text-2xl font-bold font-serif text-stone-900 mb-4 text-amber-800">Часть 2: Новый Завет</h4>
                                    <p className="mb-6">Написан на древнегреческом языке (койне) в I веке н.э. Является священным исключительно для христиан и состоит из 27 книг:</p>
                                    
                                    <div className="space-y-6 pl-4 border-l-4 border-amber-500">
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Евангелия (Благая весть)</strong> 
                                            Четыре биографии Иисуса Христа от Матфея, Марка, Луки и Иоанна. Описывают Его рождение, чудеса, Нагорную проповедь, распятие и воскресение. Первые три называют "синоптическими", а Евангелие от Иоанна — более философским и теологическим.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Деяния Апостолов и Послания</strong> 
                                            История создания первых христианских церквей и 21 письмо апостолов (в основном Павла). В них объясняется теология: как смерть Христа спасает человечество от греха.
                                        </div>
                                        <div>
                                            <strong className="text-stone-900 block mb-2 text-xl font-serif">Откровение Иоанна (Апокалипсис)</strong> 
                                            Пророческая книга, полная мистических символов, описывающая конец света, Страшный суд и создание "Нового Иерусалима", где не будет ни плача, ни болезней.
                                        </div>
                                    </div>
                                </div>

        // --- АККОРДЕОН ДЛЯ AI ОТВЕТА ---
        function AiAccordion({ html, isBible }) {
            // Первый раздел открыт по умолчанию
            const [openSections, setOpenSections] = React.useState({ 0: true });

            const sections = React.useMemo(() => {
                if (!html) return [];
                // Создаём временный DOM-элемент для парсинга
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                const children = Array.from(tmp.children); // только элементы, не текстовые узлы
                
                const result = [];
                let current = null;

                children.forEach(el => {
                    const tag = el.tagName.toLowerCase();
                    if (tag === 'h1' || tag === 'h2' || tag === 'h3') {
                        if (current) result.push(current);
                        current = { title: el.textContent.trim(), bodyHtml: '' };
                    } else {
                        if (!current) {
                            // Текст до первого заголовка — общий раздел
                            if (result.length === 0 || result[0].__intro !== true) {
                                result.unshift({ title: '📋 Краткое резюме', bodyHtml: '', __intro: true });
                            }
                            result[0].bodyHtml += el.outerHTML;
                        } else {
                            current.bodyHtml += el.outerHTML;
                        }
                    }
                });
                if (current) result.push(current);
                // Убираем пустые секции
                return result.filter(s => s.title && (s.bodyHtml.trim().length > 0));
            }, [html]);

            // Нет разделов или один без заголовка — рендерим как есть
            if (sections.length === 0) {
                return <div className="ai-content leading-relaxed text-sm" dangerouslySetInnerHTML={{ __html: html }}/>;
            }

            // Если только один раздел — без аккордеона, просто контент
            if (sections.length === 1) {
                return (
                    <div className={`rounded-xl border p-4 ${isBible ? 'border-amber-100 bg-amber-50/50' : 'border-emerald-100 bg-emerald-50/50'}`}>
                        <div className="ai-content text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: sections[0].bodyHtml }}/>
                    </div>
                );
            }

            const toggle = (i) => setOpenSections(prev => ({ ...prev, [i]: !prev[i] }));
            const A = isBible
                ? { border: 'border-amber-300', activeBg: 'bg-amber-50', activeText: 'text-amber-800', dot: 'bg-amber-500', hdr: 'hover:bg-amber-50/60' }
                : { border: 'border-emerald-300', activeBg: 'bg-emerald-50', activeText: 'text-emerald-800', dot: 'bg-emerald-500', hdr: 'hover:bg-emerald-50/60' };

            return (
                <div className="space-y-1.5 font-sans">
                    {sections.map((sec, i) => {
                        const isOpen = !!openSections[i];
                        return (
                            <div key={i} className={`rounded-xl overflow-hidden border transition-all duration-200 ${isOpen ? A.border : 'border-stone-200'}`}>
                                {/* Заголовок-кнопка */}
                                <button
                                    type="button"
                                    onClick={() => toggle(i)}
                                    className={`w-full flex items-center justify-between px-4 py-3 text-left transition-colors duration-150 ${isOpen ? A.activeBg : 'bg-white ' + A.hdr}`}>
                                    <div className="flex items-center gap-3 min-w-0">
                                        <span className={`w-2 h-2 rounded-full flex-shrink-0 transition-colors ${isOpen ? A.dot : 'bg-stone-300'}`}/>
                                        <span className={`font-bold text-sm leading-snug truncate ${isOpen ? A.activeText : 'text-stone-600'}`}>
                                            {sec.title}
                                        </span>
                                    </div>
                                    <span className={`ml-3 flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-sm font-black transition-all duration-200 ${isOpen ? A.activeBg + ' ' + A.activeText : 'bg-stone-100 text-stone-400'}`}
                                        style={{ transform: isOpen ? 'rotate(45deg)' : 'rotate(0deg)' }}>
                                        +
                                    </span>
                                </button>
                                {/* Тело раздела */}
                                {isOpen && (
                                    <div className="accordion-body px-4 pb-4 pt-3 bg-white border-t border-stone-100">
                                        <div className="ai-content text-sm leading-relaxed"
                                            dangerouslySetInnerHTML={{ __html: sec.bodyHtml }}/>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }
        </script>

        <script type="text/babel">

            return (

        // --- ГЛОБАЛЬНЫЙ ПОИСК ---
        function SearchModule({ db }) {
            const [query, setQuery] = useState("");
            const [results, setResults] = useState({ bible: [], quran: [] });
            const [searching, setSearching] = useState(false);
            const [hasSearched, setHasSearched] = useState(false);

            const handleSearch = () => {
                if (!query || query.length < 3) return;
                setSearching(true); setHasSearched(true);
                setTimeout(() => {
                    const qLower = query.toLowerCase();
                    const bRes = [], qRes = [];
                    db.order.bible.forEach(book => {
                        Object.keys(db.texts.bible[book]).forEach(chap => {
                            Object.entries(db.texts.bible[book][chap]).forEach(([vNum, text]) => {
                                if (text.toLowerCase().includes(qLower)) bRes.push({ book, chap, vNum, text });
                            });
                        });
                    });
                    db.order.quran.forEach(surah => {
                        Object.entries(db.texts.quran[surah]["1"] || {}).forEach(([aNum, text]) => {
                            if (text.toLowerCase().includes(qLower)) qRes.push({ surah, aNum, text });
                        });
                    });
                    setResults({ bible: bRes.slice(0, 150), quran: qRes.slice(0, 150) });
                    setSearching(false);
                }, 100); 
            };

            const highlight = (text, word) => {
                if (!word) return text;
                const parts = text.split(new RegExp(`(${word})`, 'gi'));
                return parts.map((part, i) => part.toLowerCase() === word.toLowerCase() ? <span key={i} className="bg-amber-200 text-amber-900 font-bold px-1 rounded">{part}</span> : part);
            };

                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">

                        </div>
                    </div>
                </div>

        // Параллельное чтение
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">

                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>

                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">

                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        </script>
