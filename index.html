<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия: Сравнительное Религиоведение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .font-sans { font-family: 'Open Sans', sans-serif; }
    </style>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ИКОНКИ ---
        const IconBase = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const BookOpen = ({ className }) => <IconBase className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const GitCompare = ({ className }) => <IconBase className={className}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><polyline points="16 9 18 11 20 9"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/><polyline points="4 15 6 17 8 15"/></IconBase>;
        const LayoutDashboard = ({ className }) => <IconBase className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>;
        const Library = ({ className }) => <IconBase className={className}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></IconBase>;
        const GraduationCap = ({ className }) => <IconBase className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const HelpCircle = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
        const CheckCircle2 = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const XCircle = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>;
        const Menu = ({ className }) => <IconBase className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
        const XIcon = ({ className }) => <IconBase className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;

        // --- БАЗА ДАННЫХ ---
        const DB = {
            curriculum: [
                {
                    id: 1, title: "Введение в Авраамические традиции",
                    content: "Иудаизм, христианство и ислам имеют общий корень — фигуру патриарха Авраама. Понимание этих текстов требует знания историко-культурного контекста Ближнего Востока.",
                    nuance: "Академическое религиоведение не оценивает «истинность» текста. Оно изучает его происхождение и историю."
                },
                {
                    id: 2, title: "Структура Библии",
                    content: "Библия делится на Ветхий Завет и Новый Завет. Тексты писались на протяжении более 1000 лет десятками авторов.",
                    nuance: "В библеистике применяется «Документальная гипотеза» (Вельхаузен)."
                },
                {
                    id: 3, title: "Структура Корана",
                    content: "Коран состоит из 114 сур. Суры расположены не в хронологическом порядке, а, как правило, от самых длинных к самым коротким.",
                    nuance: "Ключевой концепт — разделение сур на мекканские (единобожие) и мединские (законодательство)."
                }
            ],
            library: {
                bible: {
                    ot: ["Бытие", "Исход", "Левит", "Числа", "Второзаконие", "Псалтирь", "Исаия", "Иеремия"],
                    nt: ["Матфея", "Марка", "Луки", "Иоанна", "Деяния", "Римлянам", "Откровение"]
                },
                quran: {
                    meccan: ["1. Аль-Фатиха", "7. Аль-А'раф", "12. Йусуф", "19. Марьям", "37. Ас-Саффат"],
                    medinan: ["2. Аль-Бакара", "3. Аль Имран", "4. Ан-Ниса", "5. Аль-Маида"]
                }
            },
            texts: {
                bible: {
                    "Бытие": {
                        "1": { "1": "В начале сотворил Бог небо и землю.", "2": "Земля же была безвидна и пуста...", "3": "И сказал Бог: да будет свет. И стал свет." },
                        "22": { "1": "И было, после сих происшествий Бог искушал Авраама...", "2": "Бог сказал: возьми сына твоего, единственного твоего..." }
                    }
                },
                quran: {
                    "1. Аль-Фатиха": { "1": "Во имя Аллаха, Милостивого, Милосердного!", "2": "Хвала Аллаху, Господу миров..." },
                    "37. Ас-Саффат": { "102": "Когда сын достиг того, чтобы разделить с ним усердие, он сказал: «О сын мой! Воистину, я видел во сне, что я приношу тебя в жертву...»", "103": "Когда они оба покорились воле Аллаха..." }
                }
            },
            quiz: [
                { id: 1, q: "По какому принципу в основном расположены суры в Коране?", options: ["Хронологическому", "Алфавитному", "От длинных к коротким"], correct: 2 },
                { id: 2, q: "Какая гипотеза описывает формирование Пятикнижия?", options: ["Документальная", "Гипотеза устной традиции", "Единого автора"], correct: 0 }
            ]
        };

        // --- МОДУЛИ ---

        function DashboardHome({ setView }) {
            return (
                <div className="bg-stone-900 text-stone-100 p-8 md:p-12 rounded-xl shadow-lg relative overflow-hidden">
                    <div className="relative z-10">
                        <h2 className="text-3xl md:text-4xl font-bold font-serif mb-4">Академия Религиоведения</h2>
                        <p className="text-stone-400 font-sans max-w-2xl text-lg mb-8">Добро пожаловать в полную образовательную среду. Здесь вы можете изучать теорию по шагам, читать священные тексты, сравнивать их и проходить тесты.</p>
                        <div className="flex flex-wrap gap-4">
                            <button onClick={() => setView('curriculum')} className="bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-md font-bold transition-colors">Начать изучение</button>
                            <button onClick={() => setView('parallel')} className="bg-stone-700 hover:bg-stone-600 text-white px-6 py-3 rounded-md font-bold transition-colors">Открыть Синхропсис</button>
                        </div>
                    </div>
                </div>
            );
        }

        function CurriculumView() {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-6 md:p-8">
                    <h2 className="text-2xl font-bold font-serif mb-6 border-b pb-4">Шаги изучения</h2>
                    <div className="space-y-8 font-sans">
                        {DB.curriculum.map(lesson => (
                            <div key={lesson.id} className="bg-stone-50 p-6 rounded-lg border border-stone-200">
                                <h3 className="text-xl font-bold text-stone-800 mb-3">Шаг {lesson.id}: {lesson.title}</h3>
                                <p className="text-stone-700 text-lg mb-4">{lesson.content}</p>
                                <div className="bg-amber-50 border-l-4 border-amber-600 p-4 rounded-r">
                                    <p className="text-amber-900 text-sm italic"><strong>Нюанс религиоведа:</strong> {lesson.nuance}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function LibraryView() {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-6 md:p-8">
                    <h2 className="text-2xl font-bold font-serif mb-6 border-b pb-4">Библиотека текстов</h2>
                    <div className="grid md:grid-cols-2 gap-8 font-sans">
                        <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center"><BookOpen className="w-5 h-5 mr-2"/> Библия</h3>
                            <h4 className="font-bold text-slate-600 text-sm mb-2">Ветхий Завет (Выборка)</h4>
                            <div className="grid grid-cols-2 gap-2 mb-4">
                                {DB.library.bible.ot.map(b => <div key={b} className="p-2 bg-slate-50 border rounded text-sm text-slate-700">{b}</div>)}
                            </div>
                            <h4 className="font-bold text-slate-600 text-sm mb-2">Новый Завет (Выборка)</h4>
                            <div className="grid grid-cols-2 gap-2">
                                {DB.library.bible.nt.map(b => <div key={b} className="p-2 bg-slate-50 border rounded text-sm text-slate-700">{b}</div>)}
                            </div>
                        </div>
                        <div>
                            <h3 className="text-xl font-bold text-emerald-800 mb-4 flex items-center"><BookOpen className="w-5 h-5 mr-2"/> Коран</h3>
                            <h4 className="font-bold text-emerald-700 text-sm mb-2">Мекканские суры</h4>
                            <div className="grid grid-cols-2 gap-2 mb-4">
                                {DB.library.quran.meccan.map(s => <div key={s} className="p-2 bg-emerald-50 border rounded text-sm text-emerald-800">{s}</div>)}
                            </div>
                            <h4 className="font-bold text-emerald-700 text-sm mb-2">Мединские суры</h4>
                            <div className="grid grid-cols-2 gap-2">
                                {DB.library.quran.medinan.map(s => <div key={s} className="p-2 bg-emerald-50 border rounded text-sm text-emerald-800">{s}</div>)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ParallelReader() {
            const [bBook, setBBook] = useState("Бытие");
            const [bChap, setBChap] = useState("22");
            const [qSurah, setQSurah] = useState("37. Ас-Саффат");

            return (
                <div className="bg-white rounded-xl shadow-sm border border-stone-200 h-[calc(100vh-8rem)] flex flex-col">
                    <div className="bg-stone-100 border-b p-4 grid grid-cols-2 divide-x">
                        <div className="pr-4">
                            <label className="text-xs font-bold text-slate-600 block mb-1">Библия</label>
                            <select value={bBook} onChange={e=>setBBook(e.target.value)} className="w-full p-2 border rounded text-sm mb-2"><option>Бытие</option></select>
                            <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-full p-2 border rounded text-sm"><option value="1">Глава 1</option><option value="22">Глава 22</option></select>
                        </div>
                        <div className="pl-4">
                            <label className="text-xs font-bold text-emerald-700 block mb-1">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-2 border rounded text-sm"><option>1. Аль-Фатиха</option><option>37. Ас-Саффат</option></select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-x">
                        <div className="flex-1 p-6 font-serif leading-loose bg-[#fcfbfa]">
                            <h3 className="text-xl mb-4 text-center">{bBook}, Гл. {bChap}</h3>
                            {Object.entries(DB.texts.bible[bBook]?.[bChap] || {}).map(([v, t]) => <p key={v} className="mb-4"><sup className="text-xs text-slate-400 mr-2">{v}</sup>{t}</p>)}
                        </div>
                        <div className="flex-1 p-6 font-serif leading-loose bg-[#f4faf7]">
                            <h3 className="text-xl mb-4 text-center text-emerald-900">{qSurah}</h3>
                            {Object.entries(DB.texts.quran[qSurah] || {}).map(([v, t]) => <p key={v} className="mb-4"><sup className="text-xs text-emerald-500 mr-2">{v}</sup>{t}</p>)}
                        </div>
                    </div>
                </div>
            );
        }

        function QuizModule() {
            const [ans, setAns] = useState({});
            const [sub, setSub] = useState(false);
            return (
                <div className="bg-white rounded-xl shadow-sm border p-6 md:p-8">
                    <h2 className="text-2xl font-bold font-serif mb-6 border-b pb-4">Проверка знаний</h2>
                    <div className="space-y-6">
                        {DB.quiz.map((q, i) => (
                            <div key={q.id} className="bg-stone-50 p-6 rounded border">
                                <p className="font-bold mb-4">{i+1}. {q.q}</p>
                                <div className="space-y-2">
                                    {q.options.map((opt, idx) => {
                                        let c = "w-full text-left p-3 rounded border transition-colors ";
                                        if (sub) { c += (idx === q.correct ? "bg-emerald-100 border-emerald-500" : (ans[q.id]===idx ? "bg-red-100 border-red-500" : "bg-white")); } 
                                        else { c += (ans[q.id]===idx ? "bg-amber-100 border-amber-500" : "bg-white hover:bg-stone-100"); }
                                        return <button key={idx} onClick={()=>!sub && setAns({...ans, [q.id]:idx})} className={c}>{opt}</button>;
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-6">
                        {!sub ? <button onClick={()=>setSub(true)} className="bg-stone-900 text-white px-6 py-2 rounded font-bold">Проверить</button>
                              : <button onClick={()=>{setSub(false); setAns({});}} className="bg-stone-300 text-stone-800 px-6 py-2 rounded font-bold">Пройти заново</button>}
                    </div>
                </div>
            );
        }

        // --- ГЛАВНЫЙ КОМПОНЕНТ ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);

            const navs = [
                { id: 'dashboard', l: 'Главная', i: LayoutDashboard },
                { id: 'curriculum', l: 'Шаги изучения', i: GraduationCap },
                { id: 'library', l: 'Библиотека', i: Library },
                { id: 'parallel', l: 'Синхропсис', i: GitCompare },
                { id: 'quiz', l: 'Тесты', i: HelpCircle }
            ];

            return (
                <div className="min-h-screen flex">
                    {menuOpen && <div className="fixed inset-0 bg-black/50 z-20 md:hidden" onClick={()=>setMenuOpen(false)}></div>}
                    <aside className={`fixed inset-y-0 left-0 bg-stone-900 text-stone-300 w-64 flex flex-col z-30 transition-transform md:translate-x-0 md:static ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-stone-800 flex justify-between items-center">
                            <h1 className="text-lg font-bold text-white font-serif">Академия</h1>
                            <button onClick={()=>setMenuOpen(false)} className="md:hidden"><XIcon className="w-6 h-6"/></button>
                        </div>
                        <nav className="flex-1 py-4 px-2 space-y-1">
                            {navs.map(n => {
                                const Icon = n.i;
                                return <button key={n.id} onClick={()=>{setView(n.id); setMenuOpen(false);}} className={`w-full flex items-center px-4 py-3 rounded-lg ${view===n.id ? 'bg-amber-600 text-white' : 'hover:bg-stone-800'}`}><Icon className="w-5 h-5 mr-3"/><span className="font-bold text-sm">{n.l}</span></button>
                            })}
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="md:hidden bg-stone-900 text-white p-4 flex justify-between"><h2 className="font-serif font-bold">Академия</h2><button onClick={()=>setMenuOpen(true)}><Menu className="w-6 h-6"/></button></header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-5xl mx-auto">
                                {view === 'dashboard' && <DashboardHome setView={setView} />}
                                {view === 'curriculum' && <CurriculumView />}
                                {view === 'library' && <LibraryView />}
                                {view === 'parallel' && <ParallelReader />}
                                {view === 'quiz' && <QuizModule />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
