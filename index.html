<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия: Сравнительное Религиоведение</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .font-sans { font-family: 'Open Sans', sans-serif; }
        
        /* Кастомный скроллбар для красоты */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ИКОНКИ ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Icons = {
            Book: ({c}) => <IconBase className={c}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>,
            Compare: ({c}) => <IconBase className={c}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><polyline points="16 9 18 11 20 9"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/><polyline points="4 15 6 17 8 15"/></IconBase>,
            Dash: ({c}) => <IconBase className={c}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>,
            Cap: ({c}) => <IconBase className={c}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>,
            Help: ({c}) => <IconBase className={c}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Info: ({c}) => <IconBase className={c}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconBase>,
            Next: ({c}) => <IconBase className={c}><polyline points="9 18 15 12 9 6"/></IconBase>,
            Prev: ({c}) => <IconBase className={c}><polyline points="15 18 9 12 15 6"/></IconBase>,
            Moon: ({c}) => <IconBase className={c}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>
        };

        // --- БАЗА ДАННЫХ ПО УМОЛЧАНИЮ (Расширенная) ---
        const DEFAULT_DB = {
            curriculum: [
                { id: 1, title: "Исторический контекст Ближнего Востока", content: "Религии авраамического круга формировались в суровых условиях Ближнего Востока. Понимание географии, торговых путей и культуры кочевников необходимо для правильной расшифровки метафор в священных текстах.", nuance: "Академический метод требует дистанцироваться от теологических оценок." },
                { id: 2, title: "Текстология Библии: Формирование канона", content: "Библия — это многовековая библиотека, писавшаяся более тысячи лет разными авторами. Процесс отбора книг в официальный канон завершился лишь к IV веку н.э., отсекая множество апокрифической литературы.", nuance: "В библеистике применяется 'Документальная гипотеза', выделяющая разные источники (Яхвист, Элохист и др.)." },
                { id: 3, title: "Структура Корана: Мекка и Медина", content: "Коран состоит из 114 сур. В отличие от Библии, он имеет единый источник. Суры делятся на Мекканские (период проповеди единобожия) и Мединские (период создания общины и законов).", nuance: "Принципиально важно понимать 'Асбаб ан-нузуль' — обстоятельства и причины ниспослания конкретных аятов." },
                { id: 4, title: "Параллели: Сотворение мира", content: "И в книге Бытие, и в сурах Корана описывается акт божественного творения. Однако акценты различаются: Библия дает подробную хронологию 6 дней, тогда как Коран использует процесс творения как аргумент всемогущества Бога, разбрасывая упоминания по разным сурам.", nuance: "Сравнительное религиоведение изучает не только сходства, но и то, как общий миф адаптируется под нужды разных общин." },
                { id: 5, title: "Параллели: Фигура Авраама (Ибрахима)", content: "Авраам является праотцом всех трех традиций. В иудаизме он — первый патриарх, заключивший Завет. В христианстве — отец всех верующих. В исламе Ибрахим — 'Ханиф' (истинный монотеист), построивший Каабу вместе с сыном Исмаилом.", nuance: "Именно расхождение в том, кого Авраам должен был принести в жертву (Исаака или Исмаила), формирует важный водораздел." },
                { id: 6, title: "Заключение: Академический подход", content: "Академическое изучение текстов учит нас видеть историю формирования идей. Тексты живут и развиваются вместе с интерпретирующими их общинами. Следующим шагом мы рекомендуем перейти к самостоятельному параллельному чтению.", nuance: "Текст — это памятник своей эпохи. Его понимание требует знания языков оригинала (древнееврейского, греческого, арабского)." }
            ],
            quiz: [
                { id: 1, q: "Как расположены суры в Коране в основном?", options: ["Хронологически", "От длинных к коротким", "По алфавиту"], correct: 1 },
                { id: 2, q: "На каком языке написан оригинал Нового Завета?", options: ["Иврит", "Латынь", "Койне (греческий)"], correct: 2 },
                { id: 3, q: "Как называется гипотеза происхождения Пятикнижия?", options: ["Документальная", "Традиционная", "Синтетическая"], correct: 0 }
            ],
            texts: {
                bible: { 
                    "Бытие": { 
                        "1": { "1": "В начале сотворил Бог небо и землю.", "2": "Земля же была безвидна и пуста, и тьма над бездною, и Дух Божий носился над водою." },
                        "2": { "1": "Так совершены небо и земля и все воинство их." }
                    },
                    "Исход": {
                        "1": { "1": "Вот имена сынов Израилевых, которые вошли в Египет с Иаковом, вошли каждый со всем домом своим." }
                    }
                },
                quran: { 
                    "1. Аль-Фатиха": { 
                        "1": "Во имя Аллаха, Милостивого, Милосердного!",
                        "2": "Хвала Аллаху, Господу миров."
                    },
                    "37. Ас-Саффат": {
                        "102": "Когда сын достиг того, чтобы разделить с ним усердие, он сказал: «О сын мой! Воистину, я видел во сне, что я приношу тебя в жертву...»"
                    }
                }
            }
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---

        function App() {
            const [view, setView] = useState('dashboard');
            const [db, setDb] = useState(DEFAULT_DB);
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const timestamp = new Date().getTime();
                        // ЖЕСТКИЕ ССЫЛКИ НА ВАШ GITHUB РЕПОЗИТОРИЙ, ЧТОБЫ ГАРАНТИРОВАТЬ ЗАГРУЗКУ ВАШИХ 50 ГЛАВ
                        const resB = await fetch(`https://raw.githubusercontent.com/gamapaga45-bot/religion-academy/main/data/bible.json?v=${timestamp}`);
                        const resQ = await fetch(`https://raw.githubusercontent.com/gamapaga45-bot/religion-academy/main/data/quran.json?v=${timestamp}`);

                        if (!resB.ok || !resQ.ok) {
                            throw new Error(`Ошибка сети: Библия ${resB.status}, Коран ${resQ.status}`);
                        }

                        const bData = await resB.json();
                        const qData = await resQ.json();
                        setDb(prev => ({
                            ...prev,
                            // Слияние данных с сохранением уроков и тестов из DEFAULT_DB
                            texts: { bible: bData.content, quran: qData.content }
                        }));
                        setDataStatus('success');
                    } catch (e) { 
                        console.warn("Данные с GitHub не загружены, используем встроенную демо-базу. Причина:", e.message); 
                        setDataStatus('error');
                    }
                    setLoading(false);
                };
                loadData();
            }, []);

            return (
                <div className="min-h-screen flex">
                    {/* Боковое меню */}
                    <aside className="w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-8 border-b border-stone-800/60 flex flex-col justify-center h-32">
                            <h1 className="text-stone-100 font-serif text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                        </div>
                        <nav className="flex-1 px-4 py-8 space-y-2 overflow-y-auto custom-scrollbar">
                            <div className="text-[10px] font-bold text-stone-600 uppercase tracking-widest px-4 mb-3 mt-2">Обучение</div>
                            <NavItem icon={Icons.Dash} label="Главная панель" active={view==='dashboard'} onClick={()=>setView('dashboard')} />
                            <NavItem icon={Icons.Cap} label="Шаги изучения" active={view==='steps'} onClick={()=>setView('steps')} />
                            <NavItem icon={Icons.Help} label="Проверка знаний" active={view==='quiz'} onClick={()=>setView('quiz')} />
                            
                            <div className="text-[10px] font-bold text-stone-600 uppercase tracking-widest px-4 mb-3 mt-8">Библиотека текстов</div>
                            <NavItem icon={Icons.Compare} label="Параллельное чтение" active={view==='reader'} onClick={()=>setView('reader')} />
                            <NavItem icon={Icons.Book} label="Библия (Полный текст)" active={view==='bible'} onClick={()=>setView('bible')} />
                            <NavItem icon={Icons.Moon} label="Коран (Полный текст)" active={view==='quran'} onClick={()=>setView('quran')} />
                        </nav>
                    </aside>

                    {/* Контент */}
                    <main className="flex-1 ml-72 p-6 md:p-10 min-h-screen bg-[#f5f4f0]">
                        <div className="max-w-6xl mx-auto">
                            {view === 'dashboard' && <Dashboard setView={setView} loading={loading} dataStatus={dataStatus} />}
                            {view === 'steps' && <StepsModule lessons={db.curriculum} />}
                            {view === 'reader' && <ReaderModule texts={db.texts} />}
                            {view === 'bible' && <SingleReaderModule type="bible" texts={db.texts.bible} />}
                            {view === 'quran' && <SingleReaderModule type="quran" texts={db.texts.quran} />}
                            {view === 'quiz' && <QuizModule questions={db.quiz} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ КОМПОНЕНТЫ ---

        function NavItem({ icon: Icon, label, active, onClick }) {
            return (
                <button 
                    onClick={onClick} 
                    className={`w-full flex items-center px-4 py-3 rounded-xl font-bold text-sm transition-all duration-200 group
                    ${active 
                        ? 'bg-amber-600/10 text-amber-500 shadow-sm' 
                        : 'text-stone-400 hover:bg-stone-900 hover:text-stone-200'}`}
                >
                    <Icon c={`w-5 h-5 mr-4 flex-shrink-0 transition-colors ${active ? 'text-amber-500' : 'text-stone-600 group-hover:text-stone-400'}`} /> 
                    <span className="truncate">{label}</span>
                </button>
            );
        }

        function Dashboard({ setView, loading, dataStatus }) {
            return (
                <div className="bg-[#1c1b1d] text-stone-100 p-12 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                    <div className="relative z-10">
                        <h2 className="text-4xl font-serif font-bold mb-4 text-white">Инженерная среда обучения</h2>
                        <p className="text-stone-400 text-lg mb-8 max-w-2xl leading-relaxed">
                            Система готова к полномасштабному изучению. Вы можете проходить шаги обучения, изучать тексты параллельно или читать каждую книгу в индивидуальном режиме.
                        </p>
                        <div className="flex flex-wrap gap-4 mb-6">
                            <button onClick={()=>setView('steps')} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-amber-900/20 transition-all">Начать шаги</button>
                            <button onClick={()=>setView('reader')} className="bg-stone-700 hover:bg-stone-600 text-white px-8 py-3 rounded-xl font-bold transition-all">Параллельное чтение</button>
                        </div>
                        
                        {/* Статус загрузки базы данных */}
                        <div className="inline-flex items-center px-5 py-3 rounded-xl bg-stone-800/50 text-sm font-bold border border-stone-700">
                            {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-stone-400">Загрузка текстов с GitHub...</span></>}
                            {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-emerald-400">Полные базы текстов успешно загружены!</span></>}
                            {!loading && dataStatus === 'error' && <><div className="w-2 h-2 rounded-full bg-rose-500 mr-3"></div><span className="text-rose-400">Сервер GitHub недоступен. Включена Демо-версия.</span></>}
                        </div>
                    </div>
                    <Icons.Compare c="absolute -right-10 -bottom-20 w-[400px] h-[400px] text-stone-800 opacity-30 pointer-events-none" />
                </div>
            );
        }

        function StepsModule({ lessons }) {
            const [idx, setIdx] = useState(0);
            const lesson = lessons[idx];
            
            if (!lesson) return <div>Загрузка шагов...</div>;

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 p-10 min-h-[550px] flex flex-col">
                    <div className="flex justify-between items-center mb-10 border-b pb-6">
                        <div>
                            <span className="text-amber-600 text-xs font-bold uppercase tracking-widest mb-1 block">Модуль {lesson.id}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-900">{lesson.title}</h2>
                        </div>
                        <span className="bg-stone-100 px-4 py-2 rounded-full text-xs font-bold text-stone-400 uppercase tracking-tighter">Стр {idx+1} / {lessons.length}</span>
                    </div>
                    <div className="flex-1 space-y-8">
                        <p className="text-stone-700 text-xl leading-relaxed font-sans">{lesson.content}</p>
                        <div className="bg-amber-50/50 border-l-4 border-amber-500 p-6 rounded-r-2xl">
                            <div className="flex items-center mb-2"><Icons.Info c="w-5 h-5 text-amber-700 mr-2"/><h4 className="font-bold text-amber-900 text-xs uppercase tracking-wider">Заметка специалиста</h4></div>
                            <p className="text-amber-900 italic leading-relaxed">{lesson.nuance}</p>
                        </div>
                    </div>
                    <div className="flex justify-between mt-12 pt-8 border-t border-stone-100">
                        <button onClick={()=>setIdx(Math.max(0, idx-1))} disabled={idx===0} className="flex items-center px-6 py-3 bg-stone-50 text-stone-600 rounded-xl font-bold disabled:opacity-30 hover:bg-stone-100 transition-all border border-stone-200"><Icons.Prev c="w-4 h-4 mr-2"/> Назад</button>
                        <button onClick={()=>setIdx(Math.min(lessons.length-1, idx+1))} disabled={idx===lessons.length-1} className="flex items-center px-8 py-3 bg-[#1c1b1d] text-white rounded-xl font-bold disabled:opacity-30 hover:bg-stone-800 transition-all shadow-md">Вперед <Icons.Next c="w-4 h-4 ml-2"/></button>
                    </div>
                </div>
            );
        }

        function SingleReaderModule({ type, texts }) {
            const isBible = type === 'bible';
            const booksOrSurahs = Object.keys(texts || {});
            const [selectedBook, setSelectedBook] = useState(booksOrSurahs[0] || "");
            
            // Защита от пустых данных для выпадающих списков
            const chapters = isBible && selectedBook && texts[selectedBook] ? Object.keys(texts[selectedBook]) : [];
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");

            // Обновляем выбранную книгу при загрузке новых данных
            useEffect(() => {
                if (booksOrSurahs.length > 0 && (!selectedBook || !booksOrSurahs.includes(selectedBook))) {
                    setSelectedBook(booksOrSurahs[0]);
                }
            }, [texts]);

            // Обновляем главу при смене книги (только для Библии)
            useEffect(() => {
                if (isBible && chapters.length > 0 && (!selectedChapter || !chapters.includes(selectedChapter))) {
                    setSelectedChapter(chapters[0]);
                }
            }, [selectedBook, texts]);

            const content = isBible 
                ? (texts[selectedBook]?.[selectedChapter] || {}) 
                : (texts[selectedBook] || {});

            const themeClasses = isBible 
                ? "bg-[#fdfbf7] text-stone-800 ring-amber-500" 
                : "bg-[#f4faf7] text-emerald-900 ring-emerald-500";

            // Функция обработки смены книги (исправление бага)
            const handleBookChange = (e) => {
                const newBook = e.target.value;
                setSelectedBook(newBook);
                if (isBible) {
                    const newChapters = Object.keys(texts[newBook] || {});
                    setSelectedChapter(newChapters.length > 0 ? newChapters[0] : "");
                }
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-stone-200">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">
                                    {isBible ? 'Книга Библии' : 'Сура Корана'}
                                </label>
                                <select 
                                    value={selectedBook} 
                                    onChange={handleBookChange} 
                                    className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}
                                >
                                    {booksOrSurahs.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select 
                                        value={selectedChapter} 
                                        onChange={e=>setSelectedChapter(e.target.value)} 
                                        className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer"
                                    >
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-12 font-serif leading-loose text-lg ${themeClasses}`}>
                        <div className="max-w-3xl mx-auto">
                            <h3 className={`font-sans font-bold text-xs uppercase mb-10 pb-4 border-b ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).length > 0 ? (
                                Object.entries(content).map(([v, t]) => (
                                    <p key={v} className="mb-6">
                                        <sup className={`text-[10px] font-sans font-bold mr-3 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        {t}
                                    </p>
                                ))
                            ) : (
                                <p className="text-stone-400 italic">Текст не найден или загружается...</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ReaderModule({ texts }) {
            const bBooks = Object.keys(texts.bible || {});
            const [bBook, setBBook] = useState(bBooks[0] || "");
            const bChaps = bBook && texts.bible[bBook] ? Object.keys(texts.bible[bBook]) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");

            const qSurahs = Object.keys(texts.quran || {});
            const [qSurah, setQSurah] = useState(qSurahs[0] || "");

            useEffect(() => { if(bBooks.length > 0 && !bBook) setBBook(bBooks[0]); }, [texts.bible]);

            // Обработка смены книги в Библии
            const handleBibleBookChange = (e) => {
                const newBook = e.target.value;
                setBBook(newBook);
                const newChapters = Object.keys(texts.bible[newBook] || {});
                setBChap(newChapters.length > 0 ? newChapters[0] : "");
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-2 divide-x border-stone-200">
                        <div className="pr-4 space-y-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Корпус Библии</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={handleBibleBookChange} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 ring-amber-500 outline-none cursor-pointer">
                                    {bBooks.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 ring-amber-500 outline-none cursor-pointer">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="pl-4 space-y-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Корпус Корана</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 focus:ring-2 ring-emerald-500 outline-none text-emerald-900 cursor-pointer">
                                {qSurahs.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(texts.bible[bBook]?.[bChap] || {}).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(texts.quran[qSurah] || {}).map(([v, t]) => (
                                <p key={v} className="mb-6"><sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}</p>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function QuizModule({ questions }) {
            const [ans, setAns] = useState({});
            const [done, setDone] = useState(false);
            const score = questions.reduce((acc, q) => acc + (ans[q.id] === q.correct ? 1 : 0), 0);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 p-10">
                    <h2 className="text-3xl font-serif font-bold mb-10 border-b pb-6">Экзаменационный модуль</h2>
                    <div className="space-y-10">
                        {questions.map((q, i) => (
                            <div key={q.id} className="space-y-4">
                                <p className="font-bold text-stone-800 flex items-center"><span className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-xs mr-3">{i+1}</span>{q.q}</p>
                                <div className="grid gap-2 pl-11">
                                    {q.options.map((opt, idx) => {
                                        let style = "w-full text-left p-4 rounded-xl border text-sm font-bold transition-all ";
                                        if (done) {
                                            if (idx === q.correct) style += "bg-emerald-100 border-emerald-500 text-emerald-900";
                                            else if (ans[q.id] === idx) style += "bg-rose-100 border-rose-500 text-rose-900";
                                            else style += "bg-stone-50 border-stone-100 opacity-50";
                                        } else {
                                            style += ans[q.id] === idx ? "bg-amber-100 border-amber-600 text-amber-900 shadow-inner" : "bg-white hover:bg-stone-50 border-stone-200";
                                        }
                                        return <button key={idx} disabled={done} onClick={()=>setAns({...ans, [q.id]:idx})} className={style}>{opt}</button>
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 pt-8 border-t flex items-center justify-between">
                        {done ? (
                            <div className="flex items-center gap-6">
                                <span className="text-2xl font-serif font-bold">Итог: <span className={score === questions.length ? "text-emerald-600" : "text-amber-600"}>{score} / {questions.length}</span></span>
                                <button onClick={()=>{setDone(false); setAns({})}} className="px-6 py-3 bg-stone-100 rounded-xl font-bold text-stone-600 hover:bg-stone-200 transition-all">Пересдать</button>
                            </div>
                        ) : (
                            <button onClick={()=>setDone(true)} disabled={Object.keys(ans).length < questions.length} className="px-10 py-4 bg-[#1c1b1d] text-white rounded-2xl font-bold disabled:opacity-30 hover:bg-stone-800 transition-all shadow-lg">Завершить экзамен</button>
                        )}
                    </div>
                </div>
            );
        }

        // Рендер
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
