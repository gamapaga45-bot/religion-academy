        const getLineByLineComment = (isBible, book, chap, verse, text) => {
            if (isBible && book === "Бытие" && chap === "1" && verse === "1") return "В древнееврейском оригинале используется глагол 'бара' (творить из ничего), применяемый только к Богу.";
            if (isBible && book === "От Иоанна" && chap === "1" && verse === "1") return "Концепция 'Логоса' (Слова). Иоанн использует античный философский термин для объяснения природы Христа.";
            if (!isBible && book.includes("Аль-Фатиха") && verse === "1") return "Формула 'Басмала'. Подчеркивает два главных атрибута Аллаха: Ар-Рахман и Ар-Рахим.";
            let context = isBible ? "Ветхозаветная традиция" : "Мекканское откровение";
            if (isBible && ["От Матфея", "От Марка", "От Луки", "От Иоанна", "Деяния", "Римлянам", "Откровение"].includes(book)) context = "Новозаветный текст I века";
            if (!isBible && ["Аль-Бакара", "Аль Имран", "Ан-Ниса", "Аль-Маида"].some(s => book.includes(s))) context = "Мединское откровение (формирование права)";
            return `Академический анализ (Стих ${verse}): Данный фрагмент («${text.substring(0, 25)}...») классифицируется как ${context}. Экзегеты изучают его через призму культурно-исторического метода: текст отражает социальные и правовые нормы общины того времени.`;
        };

        // --- ОСНОВНОЕ ПРИЛОЖЕНИЕ ---
        function App() {
            const [view, setView] = useState('dashboard');
            
            // Динамические базы, загружаемые по JSON
            const [db, setDb] = useState({
                order: { bible: ["Бытие"], quran: ["1. Аль-Фатиха"] },
                texts: { bible: { "Бытие": { "1": { "1": "Загрузка..." } } }, quran: { "1. Аль-Фатиха": { "1": { "1": "Загрузка..." } } } },
                prayers: { bible: [], quran: [] },
                guide: { bible: [], quran: [] }
            });
            
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState('loading');
            const [statusText, setStatusText] = useState('Подготовка...');
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('zveno_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('zveno_api_key', key);
                setShowSettings(false);
            };

            useEffect(() => {
                const loadAllData = async () => {
                    try {
                        setStatusText("Загрузка текстов...");
                        
                        // 1. Тексты Писаний (Как раньше)
                        const bibleRes = await fetch('https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/ru_synodal.json');
                        const bibleRaw = await bibleRes.json();
                        const bibleMap = {};
                        const bibleOrder = []; 
                        bibleRaw.forEach(book => {
                            const ruName = BIBLE_BOOKS_RU[book.name] || book.name;
                            bibleOrder.push(ruName);
                            bibleMap[ruName] = {};
                            book.chapters.forEach((chap, cIdx) => {
                                bibleMap[ruName][String(cIdx + 1)] = {};
                                chap.forEach((verse, vIdx) => {
                                    bibleMap[ruName][String(cIdx + 1)][String(vIdx + 1)] = verse;
                                });
                            });
                        });

                        const quranMap = {};
                        const quranOrder = []; 
                        SURAH_NAMES_RU.forEach((ruName, index) => {
                            const title = `${index + 1}. ${ruName}`;
                            quranOrder.push(title);
                            quranMap[title] = { "1": {} }; 
                        });

                        try {
                            const quranRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/quran-api@1/editions/rus-elmir-kuliev.json');
                            const quranRaw = await quranRes.json();
                            quranRaw.quran.forEach(item => {
                                const title = quranOrder[item.chapter - 1];
                                if (title) quranMap[title]["1"][String(item.verse)] = item.text;
                            });
                        } catch (e) {
                            const fallbackRes = await fetch('https://api.alquran.cloud/v1/quran/ru.kuliev');
                            const fallbackRaw = await fallbackRes.json();
                            fallbackRaw.data.surahs.forEach(surah => {
                                const title = quranOrder[surah.number - 1];
                                if (title) { surah.ayahs.forEach(ayah => { quranMap[title]["1"][String(ayah.numberInSurah)] = ayah.text; }); }
                            });
                        }

                        // 2. ЗАГРУЗКА НОВЫХ JSON (Молитвы и Гайд из папки data/)
                        setStatusText("Подключение JSON баз...");
                        let prayersData = { bible: [], quran: [] };
                        let guideData = { bible: [], quran: [] };
                        
                        try {
                            // Пытаемся загрузить сгенерированные python скриптом файлы
                            const pRes = await fetch('data/prayers.json');
                            if(pRes.ok) prayersData = await pRes.json();
                            
                            const gRes = await fetch('data/guide.json');
                            if(gRes.ok) guideData = await gRes.json();
                        } catch(e) {
                            console.warn("Локальные JSON не найдены. Если вы не запускали build_data.py, запустите его.");
                        }

                        setDb({ 
                            order: { bible: bibleOrder, quran: quranOrder }, 
                            texts: { bible: bibleMap, quran: quranMap },
                            prayers: prayersData,
                            guide: guideData
                        });
                        setDataStatus('success');
                        setStatusText("Все JSON базы загружены!");
                    } catch (e) {
                        setDataStatus('error');
                        setStatusText("Ошибка загрузки.");
                    }
                    setLoading(false);
                };
                loadAllData();
            }, []);

            return (
                <div className="min-h-screen flex font-sans">
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 fade-in-up">
                                <div className="flex items-center mb-6">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mr-4"><Icons.Key c="w-6 h-6" /></div>
                                    <h3 className="text-2xl font-bold font-serif text-stone-900">Настройки AI Аудио</h3>
                                </div>
                                <p className="text-stone-600 mb-6 text-sm">Введите API-ключ ZVENO AI для художественного чтения. При отсутствии ключа используется умный встроенный движок с микро-паузами.</p>
                                <input type="password" placeholder="sk-zveno-..." defaultValue={apiKey} id="api-key-input" className="w-full p-4 border border-stone-300 rounded-xl mb-6 focus:ring-2 focus:ring-amber-500 outline-none font-mono" />
                                <div className="flex gap-4 justify-end">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-3 rounded-xl font-bold text-stone-500 hover:bg-stone-100">Отмена</button>

                                </div>
                            </div>
                        </div>
                    )}

                    <aside className="w-72 bg-[#0f0f11] text-stone-400 flex flex-col fixed inset-y-0 shadow-2xl z-20 border-r border-stone-800">
                        <div className="p-8 border-b border-stone-800/60 flex flex-col justify-center h-32 relative">
                            <h1 className="text-stone-100 font-serif text-2xl font-bold tracking-tight uppercase leading-none">Академия</h1>
                            <span className="text-amber-600 text-xs font-sans font-bold tracking-[0.25em] mt-2">РЕЛИГИОВЕДЕНИЯ</span>
                            <button onClick={() => setShowSettings(true)} className="absolute right-6 top-1/2 -translate-y-1/2 text-stone-600 hover:text-white transition-colors" title="Настройки API"><Icons.Settings c="w-5 h-5"/></button>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar px-3">
                            <div className="px-4 mt-2 mb-2"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Теория и Практика</span></div>
                            <NavItem icon={Icons.Dash} label="Главная панель" active={view==='dashboard'} onClick={()=>setView('dashboard')} />
                            <NavItem icon={Icons.Smile} label="Просто о сложном (JSON)" active={view==='simple'} onClick={()=>setView('simple')} />
                            <NavItem icon={Icons.Home} label="Этикет в Храме/Мечети" active={view==='etiquette'} onClick={()=>setView('etiquette')} />
                            <NavItem icon={Icons.Video} label="Видеоуроки" active={view==='videos'} onClick={()=>setView('videos')} />
                            
                            <div className="px-4 mt-8 mb-2"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Чтение Текстов</span></div>
                            <NavItem icon={Icons.Scroll} label="Языки и манускрипты" active={view==='originals'} onClick={()=>setView('originals')} />
                            <NavItem icon={Icons.Heart} label="Молитвы (JSON)" active={view==='prayers'} onClick={()=>setView('prayers')} />
                            <NavItem icon={Icons.Compare} label="Параллельное чтение" active={view==='reader'} onClick={()=>setView('reader')} />
                            <NavItem icon={Icons.Book} label="Библия (с комментариями)" active={view==='bible'} onClick={()=>setView('bible')} />
                            <NavItem icon={Icons.Moon} label="Коран (с комментариями)" active={view==='quran'} onClick={()=>setView('quran')} />
                        </nav>
                        
                        <div className="p-4 border-t border-stone-800/60 bg-[#161618]">
                            <div className="flex items-center">
                                {loading && <><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-3"></div><span className="text-[10px] font-bold tracking-wider text-amber-500">{statusText}</span></>}
                                {!loading && dataStatus === 'success' && <><div className="w-2 h-2 rounded-full bg-emerald-500 mr-3"></div><span className="text-[10px] font-bold tracking-wider text-emerald-500">{statusText}</span></>}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 ml-72 p-6 md:p-10 min-h-screen bg-[#f5f4f0]">
                        <div className="max-w-6xl mx-auto h-full">
                            {view === 'dashboard' && <Dashboard setView={setView} loading={loading} dataStatus={dataStatus} db={db} />}
                            {view === 'simple' && <SimpleExplanationModule db={db} />}
                            {view === 'etiquette' && <EtiquetteModule />}
                            {view === 'prayers' && <PrayersModule db={db} />}
                            {view === 'videos' && <VideoLessonsModule />}
                            {view === 'originals' && <OriginalsModule />}
                            {view === 'reader' && <ParallelReaderModule db={db} />}

                            {view === 'quran' && <SingleReaderModule type="quran" db={db} apiKey={apiKey} />}
                        </div>
                    </main>
                </div>
            );
        }

        function NavItem({ icon: Icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-4 py-3 rounded-xl font-bold text-sm transition-all duration-200 group ${active ? 'bg-amber-600/10 text-amber-500 shadow-sm' : 'text-stone-400 hover:bg-stone-800 hover:text-stone-200'}`}>
                    <Icon c={`w-5 h-5 mr-4 flex-shrink-0 transition-colors ${active ? 'text-amber-500' : 'text-stone-600 group-hover:text-stone-400'}`} /> 
                    <span className="truncate">{label}</span>
                </button>
            );
        }

        // --- УМНЫЙ АУДИО ДВИЖОК С ПАУЗАМИ И ZVENO AI ---
        function AudioPlayer({ versesObj, theme, apiKey }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('AI_ZVENO_PREMIUM');
            const [isPlaying, setIsPlaying] = useState(false);
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri')) return -1; return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const playNativeChunked = (textArray) => {
                let currentIndex = 0;
                const allPhrases = [];
                textArray.forEach(rawText => {
                    // Умная расстановка пауз
                    const processed = rawText.replace(/ — /g, ", ").replace(/ - /g, ", ");
                    const fragments = processed.split(/(?<=[.?!;])/g).filter(f => f.trim().length > 0);
                    fragments.forEach(f => allPhrases.push(f));
                });

                const speakNext = () => {
                    if (currentIndex >= allPhrases.length || !isPlaying) {
                        setIsPlaying(false);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(allPhrases[currentIndex]);
                    const voice = voices.find(v => v.name === selectedVoice);
                    if (voice) utterance.voice = voice;
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.85; 
                    utterance.pitch = 0.95; 
                    
                    utterance.onend = () => {
                        currentIndex++;
                        setTimeout(speakNext, 250); 
                    };
                    utterance.onerror = () => setIsPlaying(false);
                    window.speechSynthesis.speak(utterance);
                };
                speakNext();
            };

            const handlePlay = async () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                window.speechSynthesis.cancel(); 
                
                const sortedTexts = Object.entries(versesObj).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => t);

                if (apiKey && selectedVoice === 'AI_ZVENO_PREMIUM') {
                    try {
                        const fullText = sortedTexts.join(" ");
                        const response = await fetch('https://api.openai.com/v1/audio/speech', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                            body: JSON.stringify({ model: "tts-1", input: fullText.substring(0, 4000), voice: theme === 'bible' ? 'onyx' : 'echo' })
                        });
                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        const blob = await response.blob();
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        audio.onended = () => setIsPlaying(false);
                        audio.play();
                    } catch (error) {
                        console.warn("CORS/API Ошибка. Включение умного встроенного движка...");
                        setSelectedVoice(voices[0]?.name || '');
                        playNativeChunked(sortedTexts);
                    }
                } else {
                    playNativeChunked(sortedTexts);
                }
            };

            return (
                <div className={`flex items-center p-2 rounded-xl border ${theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} shadow-sm`}>
                    <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                    <select value={selectedVoice} onChange={e => setSelectedVoice(e.target.value)} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                        <option value="AI_ZVENO_PREMIUM" className="font-bold">✨ ZVENO AI (Нейросеть)</option>
                        <optgroup label="Системные голоса (Умные паузы)">
                            {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                        </optgroup>
                    </select>
                    <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100'}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                        {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                    </button>
                </div>
            );
        }

        // --- ПРОСТО О СЛОЖНОМ (ЧТЕНИЕ ИЗ JSON) ---

        function PrayersModule({ db }) {

                    {prayers.length === 0 ? (

                            <p className="text-sm mt-2">Запустите <b>build_data.py</b>, чтобы создать файл <i>data/prayers.json</i></p>
                        </div>
                    ) : (
                        <div className="grid gap-8">
                            {prayers.map((item, idx) => (
                                <div key={idx} className="bg-white rounded-3xl shadow-sm border border-stone-200 p-8 md:p-10">
                                    <span className={`text-[10px] font-bold uppercase tracking-widest block mb-2 ${mode==='bible'?'text-amber-600':'text-emerald-600'}`}>{item.title}</span>
                                    <h3 className="text-3xl font-bold font-serif text-stone-900 mb-6">{item.subtitle}</h3>
                                    
                                    <div className="bg-stone-50 p-8 rounded-3xl mb-8 border border-stone-200 relative group">
                                        <p className="text-xl md:text-2xl font-serif text-stone-800 leading-relaxed italic pr-8">«{item.text}»</p>
                                        <button onClick={() => copyToClipboard(item.text)} className="opacity-0 group-hover:opacity-100 absolute right-4 top-4 text-stone-400 hover:text-amber-600 transition-opacity" title="Копировать"><Icons.Copy c="w-5 h-5"/></button>
                                    </div>

                                    <div className={`border-l-4 p-6 rounded-r-2xl text-base leading-relaxed ${mode==='bible'?'border-amber-400 bg-amber-50/50 text-amber-900':'border-emerald-400 bg-emerald-50/50 text-emerald-900'}`}>
                                        <div className="flex items-center mb-3"><Icons.Info c="w-5 h-5 mr-2"/><strong className="uppercase tracking-widest">Богословский разбор</strong></div>
                                        {item.analysis}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- ЭТИКЕТ В ХРАМАХ ---
        function EtiquetteModule() {
            const [mode, setMode] = useState('church');
            return (
                <div className="space-y-8 fade-in-up pb-12">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-stone-200 pb-4 gap-4">
                        <h2 className="text-3xl font-serif font-bold text-stone-900 flex items-center"><Icons.Home c="w-8 h-8 mr-3 text-amber-600"/> Правила Поведения</h2>
                        <div className="flex bg-stone-200/50 p-1 rounded-xl w-full md:w-auto">
                            <button onClick={()=>setMode('church')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition-all ${mode==='church' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Православный Храм</button>
                            <button onClick={()=>setMode('mosque')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition-all ${mode==='mosque' ? 'bg-white shadow-sm text-emerald-700' : 'text-stone-500 hover:text-stone-700'}`}>Исламская Мечеть</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden">
                        <div className="w-full h-64 md:h-80 relative bg-stone-100 flex items-center justify-center">
                            <SafeImage 
                                src={mode === 'church' ? "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Cathedral_of_Christ_the_Saviour_in_Moscow.jpg/800px-Cathedral_of_Christ_the_Saviour_in_Moscow.jpg" : "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Sheikh_Zayed_Mosque_-_Abu_Dhabi.jpg/800px-Sheikh_Zayed_Mosque_-_Abu_Dhabi.jpg"} 
                                alt={mode === 'church' ? "Храм Христа Спасителя" : "Мечеть шейха Зайда"} 
                                fallbackClass={mode === 'church' ? 'img-fallback-bible' : 'img-fallback-quran'} 
                                className="absolute inset-0 w-full h-full object-cover" 
                            />
                        </div>
                        <div className="p-8 md:p-12">
                            <div className="space-y-8">
                                {ETIQUETTE_DB[mode].map((item, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row gap-6">
                                        <div className={`w-12 h-12 flex-shrink-0 rounded-full flex items-center justify-center font-bold text-xl ${mode === 'church' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>{idx + 1}</div>
                                        <div><h4 className="text-xl font-bold text-stone-900 mb-2">{item.rule}</h4><p className="text-stone-600 leading-relaxed text-lg">{item.desc}</p></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ВИДЕОУРОКИ ---
        function VideoLessonsModule() {
            const videos = [
                { title: "Исторический контекст Ветхого Завета", platform: "RuTube", embedUrl: "https://rutube.ru/play/embed/b87e221d91cc3525287b929114f9d0c6", color: "amber" },
                { title: "Как формировался текст Корана", platform: "RuTube", embedUrl: "https://rutube.ru/play/embed/f2c96c4d7b1b3a6e9a8f1f5e8f5d4c3b", color: "emerald" },
                { title: "Авраамические религии: Точки пересечения", platform: "VK Video", embedUrl: "https://vk.com/video_ext.php?oid=-22822305&id=456239017&hash=5a9d8b7b", color: "stone" }
            ];

            return (
                <div className="space-y-8 fade-in-up pb-12">
                    <h2 className="text-3xl font-serif font-bold text-stone-900 border-b border-stone-200 pb-4 mb-8 flex items-center"><Icons.Video c="w-8 h-8 mr-3 text-stone-700"/> Видеоуроки</h2>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {videos.map((vid, idx) => (
                            <div key={idx} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-200 flex flex-col hover:shadow-md transition-shadow">
                                <div className="aspect-video bg-stone-900 relative">
                                    <iframe src={vid.embedUrl} frameBorder="0" allowFullScreen sandbox="allow-same-origin allow-scripts" className="w-full h-full absolute top-0 left-0" title={vid.title}></iframe>
                                </div>
                                <div className="p-6">
                                    <span className={`text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full bg-${vid.color}-100 text-${vid.color}-700`}>{vid.platform}</span>
                                    <h3 className="text-lg font-bold text-stone-800 mt-4 leading-snug">{vid.title}</h3>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- ОРИГИНАЛЫ И ЯЗЫКИ ---
        function OriginalsModule() {
            const [mode, setMode] = useState('bible');
            return (
                <div className="space-y-8 fade-in-up pb-12">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-stone-200 pb-4 gap-4">
                        <h2 className="text-3xl font-serif font-bold text-stone-900 flex items-center"><Icons.Scroll c="w-8 h-8 mr-3 text-amber-600"/> Языки и манускрипты</h2>
                        <div className="flex bg-stone-200/50 p-1 rounded-xl w-full md:w-auto">
                            <button onClick={()=>setMode('bible')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition-all ${mode==='bible' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Иврит и Койне</button>
                            <button onClick={()=>setMode('quran')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition-all ${mode==='quran' ? 'bg-white shadow-sm text-emerald-700' : 'text-stone-500 hover:text-stone-700'}`}>Арабский язык</button>
                        </div>
                    </div>
                    <div className="grid gap-8">
                        {ORIGINALS_DB[mode].map((item, idx) => (
                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col xl:flex-row">
                                <div className="w-full xl:w-2/5 h-64 xl:h-auto relative bg-stone-100 flex items-center justify-center">
                                    <SafeImage src={item.image} alt={item.imageAlt} fallbackClass={mode === 'bible' ? 'img-fallback-bible' : 'img-fallback-quran'} className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-stone-900/90 p-4 text-xs font-bold uppercase tracking-widest text-stone-200 z-10">{item.imageAlt}</div>
                                </div>
                                <div className="w-full xl:w-3/5 p-8 md:p-10 flex flex-col justify-center">
                                    <span className={`text-[10px] font-bold uppercase tracking-widest block mb-2 ${mode==='bible'?'text-amber-600':'text-emerald-600'}`}>{item.title}</span>
                                    <h3 className="text-2xl font-bold font-serif text-stone-900 mb-6">{item.subtitle}</h3>
                                    <div className="bg-stone-50 p-6 rounded-2xl mb-6 border border-stone-200 text-center">
                                        <p className="text-2xl md:text-3xl font-serif text-stone-900 mb-4" dir={mode==='bible' && idx!==2 ? "rtl" : mode==='quran' ? "rtl" : "ltr"}>{item.original}</p>
                                        <p className="text-sm font-bold text-stone-500 mb-2">{item.transliteration}</p>
                                        <p className="text-lg font-serif italic text-stone-800">{item.translation}</p>
                                    </div>
                                    <div className={`border-l-4 p-4 text-sm leading-relaxed ${mode==='bible'?'border-amber-400 bg-amber-50 text-amber-900':'border-emerald-400 bg-emerald-50 text-emerald-900'}`}>
                                        <div className="flex items-center mb-2"><Icons.Info c="w-4 h-4 mr-2"/><strong className="uppercase text-[10px] tracking-widest">Академический анализ</strong></div>
                                        {item.analysis}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- МОДУЛЬ ЧТЕНИЯ ---
        function SingleReaderModule({ type, db, apiKey }) {
            const isBible = type === 'bible';
            const order = isBible ? db.order.bible : db.order.quran;
            
            const [selectedBook, setSelectedBook] = useState(order[0] || "");
            const chaptersObj = isBible && selectedBook ? db.texts.bible[selectedBook] : {};
            const chapters = Object.keys(chaptersObj).sort((a,b)=>Number(a)-Number(b));
            const [selectedChapter, setSelectedChapter] = useState(chapters[0] || "");
            const [openComments, setOpenComments] = useState({});

            useEffect(() => {
                if (order.length > 0 && !selectedBook) setSelectedBook(order[0]);
                setOpenComments({}); 
            }, [order, selectedBook]);

            useEffect(() => {
                if (isBible && chapters.length > 0 && !chapters.includes(selectedChapter)) setSelectedChapter(chapters[0]);
                setOpenComments({}); 
            }, [selectedBook, chapters, isBible, selectedChapter]);

            const content = isBible ? (chaptersObj[selectedChapter] || {}) : (db.texts.quran[selectedBook]?.["1"] || {});
            const academicComment = ACADEMIC_COMMENTS[selectedBook] || ACADEMIC_COMMENTS["default"];

            let imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Library_of_Celsus_in_Ephesus.jpg/800px-Library_of_Celsus_in_Ephesus.jpg";
            let imgCap = "Древняя библиотека.";
            if (isBible) {
                if(selectedBook === "Бытие" || selectedBook === "Исход") { imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Judean_Desert_View.jpg/800px-Judean_Desert_View.jpg"; imgCap = "Пустынный ландшафт Ближнего Востока"; }
                if(selectedBook.includes("Евангелие") || selectedBook.includes("От")) { imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Gospel_of_Matthew_Papyrus.jpg/800px-Gospel_of_Matthew_Papyrus.jpg"; imgCap = "Древнегреческий папирус Нового Завета"; }
            } else {
                imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Kaaba_mirror_edit.jpg/800px-Kaaba_mirror_edit.jpg"; imgCap = "Священная Кааба в Мекке";
            }

            const toggleComment = (verseId) => setOpenComments(prev => ({ ...prev, [verseId]: !prev[verseId] }));

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 md:p-6 flex flex-col xl:flex-row gap-4 items-center justify-between border-stone-200 shadow-sm z-10">
                        <div className="flex-1 w-full flex gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">{isBible ? 'Книга Библии' : 'Сура Корана'}</label>
                                <select value={selectedBook} onChange={(e) => { setSelectedBook(e.target.value); if (isBible) setSelectedChapter("1"); }} className={`w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 outline-none cursor-pointer transition-all ${isBible ? 'focus:ring-amber-500' : 'focus:ring-emerald-500'}`}>
                                    {order.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            {isBible && (
                                <div className="w-32">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Глава</label>
                                    <select value={selectedChapter} onChange={e=>setSelectedChapter(e.target.value)} className="w-full p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 focus:ring-2 focus:ring-amber-500 outline-none cursor-pointer transition-all">
                                        {chapters.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-4 items-center w-full xl:w-auto justify-end">
                            <AudioPlayer versesObj={content} theme={isBible ? 'bible' : 'quran'} apiKey={apiKey} />
                        </div>
                    </div>
                    
                    <div className={`flex-1 overflow-y-auto p-8 md:p-16 font-serif leading-loose text-lg ${isBible ? "bg-[#fcfbf9] text-stone-800" : "bg-[#f5fbf8] text-emerald-950"}`}>
                        <div className="max-w-3xl mx-auto">
                            <div className={`mb-12 p-8 rounded-3xl border shadow-sm fade-in-up ${isBible ? 'bg-amber-50/50 border-amber-200' : 'bg-emerald-50/50 border-emerald-200'}`}>
                                <h4 className={`font-sans font-bold text-sm uppercase tracking-widest mb-4 flex items-center ${isBible ? 'text-amber-800' : 'text-emerald-800'}`}>
                                    <Icons.Book c="w-5 h-5 mr-3"/> Контекст {isBible ? 'книги' : 'суры'}
                                </h4>
                                <div className="my-6">
                                    <div className="w-full h-56 md:h-72 rounded-xl overflow-hidden relative shadow-sm border border-stone-200/50 bg-stone-100 flex items-center justify-center">
                                        <SafeImage src={imgUrl} alt="Иллюстрация" fallbackClass={isBible ? 'img-fallback-bible' : 'img-fallback-quran'} className="object-cover w-full h-full" />
                                    </div>
                                    <p className={`text-[11px] mt-3 text-center uppercase tracking-widest font-bold font-sans ${isBible ? 'text-amber-700' : 'text-emerald-700'}`}>{imgCap}</p>
                                </div>
                                <p className={`font-sans text-sm md:text-base leading-relaxed ${isBible ? 'text-amber-900' : 'text-emerald-900'}`}>
                                    В данном разделе применяется <strong>Генеративный алгоритм академических комментариев</strong>. Выберите любой стих ниже (нажмите на иконку диалога справа), чтобы получить историко-критический анализ конкретной строки.
                                </p>
                            </div>

                            <h3 className={`font-sans font-bold text-xl uppercase tracking-widest mb-10 pb-6 border-b text-center ${isBible ? 'text-stone-400 border-stone-200' : 'text-emerald-500 border-emerald-200'}`}>
                                {isBible ? `${selectedBook}, Глава ${selectedChapter}` : selectedBook}
                            </h3>
                            
                            {Object.entries(content).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-12 transition-all">
                                    <div className="flex items-start">
                                        <sup className={`text-xs font-sans font-bold mt-2 mr-4 flex-shrink-0 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}>{v}</sup>
                                        <span className="flex-1 text-xl">{t}</span>
                                    </div>
                                    <div className="opacity-0 group-hover:opacity-100 absolute right-0 top-1 flex flex-col gap-2 transition-opacity">
                                        <button onClick={() => copyToClipboard(t)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm border border-stone-200/50 ${isBible ? 'text-amber-600/50 hover:text-amber-600' : 'text-emerald-600/50 hover:text-emerald-600'}`} title="Копировать"><Icons.Copy c="w-4 h-4"/></button>
                                        <button onClick={() => toggleComment(v)} className={`p-2 rounded-lg bg-stone-100/80 hover:bg-white shadow-sm border border-stone-200/50 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`} title="Комментарий"><Icons.MessageSquare c="w-4 h-4"/></button>
                                    </div>
                                    {openComments[v] && (
                                        <div className={`mt-4 ml-8 p-5 rounded-2xl text-sm font-sans border-l-4 shadow-sm fade-in-up ${isBible ? 'bg-amber-50 border-amber-400 text-amber-900' : 'bg-emerald-50 border-emerald-400 text-emerald-900'}`}>
                                            <div className="flex items-center mb-2"><Icons.Info c={`w-4 h-4 mr-2 ${isBible ? 'text-amber-600' : 'text-emerald-600'}`}/><span className="font-bold uppercase tracking-widest text-[10px]">Анализ стиха {v}</span></div>
                                            <p className="leading-relaxed">{getLineByLineComment(isBible, selectedBook, selectedChapter, v, t)}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ПАРАЛЛЕЛЬНОЕ ЧТЕНИЕ ---
        function ParallelReaderModule({ db }) {
            const [bBook, setBBook] = useState(db.order.bible[0] || "");
            const bChaps = bBook ? Object.keys(db.texts.bible[bBook]).sort((a,b)=>Number(a)-Number(b)) : [];
            const [bChap, setBChap] = useState(bChaps[0] || "");
            const [qSurah, setQSurah] = useState(db.order.quran[0] || "");

            useEffect(() => { 
                if(!bBook) setBBook(db.order.bible[0]); 
                if(!qSurah) setQSurah(db.order.quran[0]); 
            }, [db.order, bBook, qSurah]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-stone-200 h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div className="bg-white border-b p-4 grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-stone-200 shadow-sm z-10 gap-4 md:gap-0">
                        <div className="md:pr-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block">Библия</label>
                            <div className="flex gap-2">
                                <select value={bBook} onChange={e=>{setBBook(e.target.value); setBChap("1");}} className="flex-1 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {db.order.bible.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={bChap} onChange={e=>setBChap(e.target.value)} className="w-24 p-3 border border-stone-200 rounded-xl text-sm font-bold bg-stone-50 outline-none cursor-pointer focus:ring-2 focus:ring-amber-500 transition-all">
                                    {bChaps.map(c => <option key={c} value={c}>Гл {c}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="md:pl-4 space-y-2 p-2">
                            <label className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest block">Коран</label>
                            <select value={qSurah} onChange={e=>setQSurah(e.target.value)} className="w-full p-3 border border-emerald-100 rounded-xl text-sm font-bold bg-emerald-50/50 outline-none text-emerald-900 cursor-pointer focus:ring-2 focus:ring-emerald-500 transition-all">
                                {db.order.quran.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x border-stone-200">
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-stone-800 bg-[#fdfbf7]">
                            <h3 className="text-stone-400 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-stone-200">{bBook}, Глава {bChap}</h3>
                            {Object.entries(db.texts.bible[bBook]?.[bChap] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-amber-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 p-8 md:p-10 font-serif leading-loose text-lg text-emerald-900 bg-[#f4faf7]">
                            <h3 className="text-emerald-500 font-sans font-bold text-xs uppercase mb-8 pb-4 border-b border-emerald-200">{qSurah}</h3>
                            {Object.entries(db.texts.quran[qSurah]?.["1"] || {}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => (
                                <div key={v} className="mb-6 group relative pr-8">
                                    <sup className="text-[10px] font-sans font-bold text-emerald-600 mr-3">{v}</sup>{t}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
