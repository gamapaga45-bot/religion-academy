                clearTimeout(timeout);

                if (!response.ok) {
                    let errMsg = '';

                            const d = await r.json();
                            if (Array.isArray(d)) {
                                d.filter(x => x.language_name === 'russian' || x.iso_code === 'ru').forEach(item => {
                                    const title = quranOrder[item.surah_number - 1];
                                    if (title) quranMap[title]["1"][String(item.verse_number)] = item.text;
                                });
                                if (validateQuran(quranMap)) quranLoaded = true;
                            }
                        } catch(e) { console.warn('Quran CDN4 failed:', e); }

                        // Применяем встроенные тексты поверх (аят аль-Курси и др.)
                        Object.entries(FALLBACK_QURAN).forEach(([surah, verses]) => {
                            const key = quranOrder.find(k => k.includes(surah.split('.')[1]?.trim())) || surah;
                            if (quranMap[key]) Object.assign(quranMap[key]["1"], verses);
                        });

                        // Применяем расширенные встроенные тексты EMBEDDED_QURAN
                        if (typeof EMBEDDED_QURAN !== 'undefined') {
                            Object.entries(EMBEDDED_QURAN).forEach(([idx, verses]) => {
                                const title = quranOrder[parseInt(idx) - 1];
                                if (title && quranMap[title]) {
                                    const existing = quranMap[title]["1"];
                                    const hasReal = Object.values(existing).some(t => t && t.length > 20 && !t.startsWith('Текст'));
                                    if (!hasReal) Object.assign(quranMap[title]["1"], verses);
                                }
                            });
                        }

                        setDb({ order: { bible: bibleOrder, quran: quranOrder }, texts: { bible: bibleMap, quran: quranMap } });
                        setDataStatus('success');
                    } catch (e) {
                        console.warn("CDN загрузка не удалась, используем запасные тексты:", e);
                        // Используем локальные JSON + встроенные запасные тексты
                        try {
                            const [bibleLocal, quranLocal] = await Promise.all([
                                fetch('./data/bible.json').then(r => r.json()),
                                fetch('./data/quran.json').then(r => r.json())
                            ]);
                            
                            const bibleMap = bibleLocal.content || {};
                            const bibleOrder = bibleLocal.books || Object.keys(bibleMap);
                            
                            // Применяем запасные тексты поверх заглушек
                            Object.keys(FALLBACK_BIBLE).forEach(book => {
                                if (!bibleMap[book]) bibleMap[book] = {};
                                Object.keys(FALLBACK_BIBLE[book]).forEach(ch => {
                                    bibleMap[book][ch] = { ...bibleMap[book][ch], ...FALLBACK_BIBLE[book][ch] };
                                });
                            });

                            const quranContent = quranLocal.content || {};
                            const quranOrder = quranLocal.surahs || Object.keys(quranContent);
                            const quranMap = {};
                            quranOrder.forEach(title => {
                                quranMap[title] = { "1": quranContent[title] || {} };
                            });
                            // Применяем запасные тексты Корана
                            Object.keys(FALLBACK_QURAN).forEach(surah => {
                                const key = quranOrder.find(k => k.includes(surah.split('.')[1]?.trim())) || surah;
                                if (quranMap[key]) quranMap[key]["1"] = { ...quranMap[key]["1"], ...FALLBACK_QURAN[surah] };
                            });

                            setDataStatus('error'); // Показываем что загрузили локально

                sections: [
                    { title: 'Глава I. Двоицы (Ямакавагга)', verses: {
                        '1':'Ум предшествует всем деяниям, ум — их владыка, ум — их творец. Если человек говорит или делает что-либо с нечистым умом, то страдание следует за ним, как колесо — за волом, везущим повозку.',
                        '2':'Ум предшествует всем деяниям, ум — их владыка, ум — их творец. Если человек говорит или делает что-либо с чистым умом, то счастье следует за ним, как неотступная тень.',
                        '3':'"Он оскорбил меня, он ударил меня, он победил меня, он ограбил меня" — у тех, кто таит в себе такие мысли, ненависть не утихает.',
                        '4':'"Он оскорбил меня, он ударил меня, он победил меня, он ограбил меня" — у тех, кто не таит в себе таких мыслей, ненависть утихает.',
                        '5':'Ибо никогда в этом мире ненависть не прекращается ненавистью, но отсутствием ненависти прекращается она. Вот вечный закон.',
                        '6':'Есть те, кто не знает, что нам суждено здесь погибнуть. У тех же, кто знает это, — сразу прекращаются ссоры.',
                        '7':'Того, кто живёт в созерцании удовольствий, чрезмерного в еде, ленивого, нерешительного, — Мара сокрушает, как вихрь — слабое дерево.',
                        '8':'Того, кто живёт без созерцания удовольствий, сдержанного в еде, исполненного веры и прилежания, — Мара не может сокрушить, как вихрь не может поколебать скалу.',
                        '9':'Кто не избавился от скверны, не имеет самоконтроля и правдивости — тот не достоин жёлтого одеяния.',
                        '10':'Кто избавился от скверны, утвердился в добродетелях, обрёл самоконтроль и правдивость — тот достоин жёлтого одеяния.',
                        '11':'В неистинном видят истинное, в истинном — неистинное те, кто следует ложным мыслям. Они никогда не достигнут истины.',
                        '12':'Истинное воспринимают как истинное, а неистинное — как неистинное те, кто следует правильным мыслям. Они достигнут истины.',
                        '13':'Как дождь проникает в плохо покрытый дом, так вожделение проникает в неразвитый ум.',
                        '14':'Как дождь не проникает в хорошо покрытый дом, так вожделение не проникает в развитый ум.',
                        '15':'Здесь скорбит он, там скорбит он — нечестивец скорбит в обоих мирах. Скорбит он, мучается, видя нечистоту своих дел.',
                        '16':'Здесь радуется он, там радуется он — добродетельный радуется в обоих мирах. Радуется он, ликует, видя чистоту своих дел.',
                        '17':'Здесь страдает он, там страдает он — грешник страдает в обоих мирах. Страдает он: "Я сделал зло", и он страдает ещё больше, попав в дурной мир.',
                        '18':'Здесь счастлив он, там счастлив он — добродетельный счастлив в обоих мирах. Счастлив он: "Я сделал добро", и он счастлив ещё больше, попав в благой мир.',
                        '19':'Пусть он красноречиво говорит о Дхамме — если он не поступает соответственно, этот беспечный человек подобен пастуху, считающему чужих коров.',
                        '20':'Пусть он мало говорит о Дхамме — если он живёт по Дхамме и отказался от страсти, ненависти и заблуждения, — он причастен к монашеству.',
                    }},
                    { title: 'Глава II. Бдительность (Аппамадавагга)', verses: {
                        '21':'Бдительность — путь к бессмертию. Беспечность — путь к смерти. Бдительные не умирают. Беспечные подобны мертвецам.',
                        '22':'Мудрецы, ясно понимая это, радуются бдительности и наслаждаются уделом благородных.',
                        '23':'Тот, кто медитирует, настойчив и всегда усерден, — мудрый достигает Нирваны, несравненного покоя.',
                        '24':'Если человек деятелен, памятлив, чист в делах, выдержан и живёт по Дхамме, добр и осторожен, — слава его возрастает.',
                        '25':'Пусть усилием, бдительностью, сдержанностью и самообузданием мудрый создаст себе остров, который не потопит никакой поток.',
                        '26':'Неразумные люди следуют беспечности. Мудрый же хранит бдительность, как высшее сокровище.',
                        '27':'Не следуйте беспечности. Не стремитесь к чувственным наслаждениям. Тот, кто медитирует и прилежен, обретает великое счастье.',
                        '28':'Когда мудрый рассеивает беспечность бдительностью, он восходит на вершину мудрости. Свободный от печали, он смотрит на страдающих глупцов, как с вершины горы — на стоящих внизу.',
                        '29':'Среди беспечных — бдительный, среди спящих — бодрствующий: мудрый мчится вперёд, как скакун, обгоняющий клячу.',
                        '30':'Благодаря бдительности Индра стал владыкой богов. Бдительность хвалят, беспечность порицают.',
                    }},
                    { title: 'Глава III. Ум (Читтавагга)', verses: {
                        '33':'Беспокойный, непостоянный ум, который трудно охранять, трудно сдерживать, — мудрец выпрямляет его, как лучник — стрелу.',
                        '34':'Как рыба, вытащенная из воды и брошенная на сушу, трепещет, так этот ум трепещет, стараясь избегнуть власти Мары.',
                        '35':'Ум непостоянен и трудноуправляем. Он ускользает, куда хочет. Хорошо смирить ум. Смиренный ум приносит счастье.',
                        '36':'Ум чрезвычайно труден для понимания, очень нежен и тонок. Он устремляется, куда хочет. Пусть мудрый охраняет его. Охраняемый ум приносит счастье.',
                        '37':'Тот, кто скитается вдалеке, бредёт в одиночестве, бестелесный, живущий в пещере, — кто обуздает этот ум, тот освободится от оков смерти.',
                        '38':'У того, чей ум неустойчив, кто не знает истинной Дхаммы, кто утратил невозмутимость, — мудрость не достигает совершенства.',
                        '39':'У того, чей ум неохвачен тревогой, кто не удручён тревогами, кто вышел за пределы добра и зла, — бодрствующего нет страха.',
                    }},
                    { title: 'Глава IV. Цветы (Пуппхавагга)', verses: {
                        '44':'Кто победит эту землю и царство Ямы с людьми и богами? Кто соберёт хорошо поведанное слово Дхаммы, как умелый цветовод собирает цветы?',
                        '45':'Ученик победит эту землю и царство Ямы с людьми и богами. Ученик соберёт хорошо поведанное слово Дхаммы, как умелый цветовод собирает цветы.',
                        '46':'Зная, что это тело подобно пене, зная его призрачную природу, сломав стрелы Мары, увенчанного цветами, — он уйдёт туда, куда не может достичь царь смерти.',
                        '47':'Тому, кто срывает цветы и чей ум привязан к наслаждениям, смерть похищает его, как огромный поток — спящую деревню.',
                        '48':'Тому, кто срывает цветы и чей ум привязан к наслаждениям, — ненасытному в чувственных наслаждениях — Владыка Смерти полностью подчинил его.',
                        '49':'Как пчела, не нанося вреда цветку, его цвету и аромату, берёт нектар и улетает, — так пусть мудрец движется в деревне.',
                        '50':'Не смотри на промахи других, не смотри на то, что они сделали или не сделали. Смотри лишь на то, что ты сам сделал или не сделал.',
                        '51':'Как яркий цветок, прекрасный на вид, но лишённый аромата, — такими же бесплодными бывают красивые слова того, кто не действует.',
                        '52':'Как яркий цветок, прекрасный на вид и благоуханный, — такими же плодотворными бывают красивые слова того, кто действует.',
                        '54':'Благоухание цветов не движется против ветра, ни аромат сандала, ни тагара, ни жасмин. Но благоухание добродетельных движется против ветра. Добродетельный человек пронизывает все направления.',
                        '55':'Сандал, тагара, лотос, жасмин — из всех этих видов аромата аромат добродетели — наилучший.',
                    }},
                    { title: 'Глава V. Глупец (Балавагга)', verses: {
                        '60':'Долга ночь для бодрствующего. Долги 3 мили для уставшего. Длинен цикл существования для глупцов, не знающих истинной Дхаммы.',
                        '61':'Если странник не находит попутчика, равного ему или превосходящего его, пусть он решительно продолжает путь в одиночестве. Для глупца нет товарищества.',
                        '62':'"У меня есть дети, у меня есть богатство" — глупец мучается такими мыслями. Но он сам — не свой. Откуда же дети? Откуда богатство?',
                        '63':'Глупец, который знает о своей глупости, — именно этим он мудр. Но глупец, думающий, что он мудр, поистине называется глупцом.',
                        '64':'Если глупец всю жизнь общается с мудрым, он не познаёт Дхаммы, как ложка — вкуса супа.',
                        '65':'Если умный человек даже на мгновение общается с мудрым, он быстро познаёт Дхамму, как язык — вкус супа.',
                    }},
                    { title: 'Глава VI. Мудрец (Пандитавагга)', verses: {
                        '76':'Смотри на того, кто указывает тебе на твои недостатки, кто упрекает тебя, как на открывателя сокровища. Ищи такого мудреца. С таким добродетельным человеком только лучше, не хуже.',
                        '77':'Пусть он внушает, наставляет, отвращает от негодного — он будет дорог добродетельным и ненавистен злым.',
                        '78':'Не следует общаться со злыми друзьями, не следует общаться с низкими людьми. Следует общаться с добродетельными друзьями, следует общаться с лучшими из людей.',
                        '79':'Тот, кто вкушает Дхамму, живёт счастливо с умиротворённым умом. Мудрец всегда радуется Дхамме, возвещённой Благородными.',
                        '80':'Ирригаторы направляют воды. Плотники гнут дерево. Мудрецы смиряют себя.',
                        '81':'Как скала не колышется от ветра, так мудрец не колышется ни от похвалы, ни от порицания.',
                        '82':'Как глубокое, прозрачное и безмятежное озеро — так мудрецы, услышав Дхамму, становятся ясными.',
                        '83':'Добродетельные отречены от всего. Благочестивые не болтают о чувственных наслаждениях. Когда счастье и страдание касаются мудреца, он не радуется и не скорбит.',
                    }},
                    { title: 'Глава VIII. Тысячи (Сахассавагга)', verses: {
                        '100':'Лучше одно слово Дхаммы, услышав которое, обретают покой, чем тысяча речей из бессмысленных слов.',
                        '101':'Лучше одна строфа Дхаммы, услышав которую, обретают покой, чем тысяча стихов из бессмысленных слов.',
                        '102':'Лучше прочесть одну строфу Дхаммы, чем тысячу строф, сложенных из бессмысленных слов.',
                        '103':'Тот, кто победит в бою тысячи тысяч людей, и тот, кто победит только себя, — поистине величайший победитель.',
                        '104':'Самопобеда воистину лучше, чем победа над другими людьми. Ни боги, ни гандхарвы, ни Мара с Брахмой не могут превратить в поражение победу такого человека.',
                    }},
                    { title: 'Глава X. Насилие (Дандавагга)', verses: {
                        '129':'Все трепещут перед насилием, жизнь дорога всем. Уподобив другого себе, не убивай и не давай убивать.',
                        '130':'Все трепещут перед насилием, смерть ненавистна всем. Уподобив другого себе, не убивай и не давай убивать.',
                        '131':'Тот, кто ищет своего счастья, насилием причиняет страдания существам, жаждущим счастья, — не обретёт он счастья в будущем.',
                        '132':'Тот, кто ищет своего счастья, не причиняет насилием страдания существам, жаждущим счастья, — обретёт он счастье в будущем.',
                    }},
                    { title: 'Глава XI. Старость (Джаравагга)', verses: {
                        '146':'Зачем смеяться, зачем радоваться, когда мир всегда горит? Окружённые тьмой, почему вы не ищете света?',
                        '147':'Посмотри на этот разукрашенный образ, на эту кучу ран, сросшихся вместе, больных, полных желаний, в которых нет ничего устойчивого, ничего постоянного.',
                        '148':'Это тело состарилось, стало гнездом болезней, хрупким. Эта гнилая масса распадается. Воистину, жизнь кончается смертью.',
                        '150':'Это тело — город из костей, выкрашенный плотью и кровью. В нём обитают старость и смерть, тщеславие и лицемерие.',
                        '152':'Тот, кто в молодости не вёл праведной жизни и не накопил богатства, чахнет как старая цапля в пруду без рыбы.',
                    }},
                    { title: 'Глава XII. Я (Аттавагга)', verses: {
                        '157':'Если человек дорожит собой, пусть он хорошо охраняет себя. В течение одной из трёх страж ночи мудрец должен бодрствовать.',
                        '158':'Пусть сначала он утвердится в том, что правильно, а потом поучает других. Так мудрец не будет опорочен.',
                        '159':'Пусть он делает то, что проповедует другим. Хорошо обуздав себя, он может обуздывать других. Воистину, обуздать себя трудно.',
                        '160':'Я — господин самого себя. Кто ещё может быть моим господином? Хорошо обуздав себя, человек обретает господина, которого трудно найти.',
                    }},
                    { title: 'Глава XIV. Будда (Буддхавагга)', verses: {
                        '183':'Отказ от всякого зла, достижение добра, очищение своего ума — таково учение Будды.',
                        '184':'Терпение и выносливость — высший аскетизм. Нирвана — высшее, говорят Будды. Тот, кто причиняет вред другим, — не монах; обидящий других — не отшельник.',
                        '185':'Никогда не злословить, никогда не причинять вреда, соблюдать сдержанность согласно уставу, есть в меру, жить в уединении, предаваться возвышенным мыслям — таково учение Будды.',
                        '187':'Не следует желать чувственных наслаждений, не следует перерождаться вновь. Пусть мудрец желает угасания страсти.',
                        '188':'Люди, охваченные страхом, бегут ко многим прибежищам — к горам, лесам, садам и священным деревьям.',
                        '189':'Но это — не надёжное прибежище, не высшее прибежище. Достигнув этого прибежища, никто не освобождается от всех страданий.',
                        '190':'Кто прибегает к Будде, Дхамме и Сангхе, кто с ясным знанием видит четыре благородные истины:',
                        '191':'Страдание, возникновение страдания, прекращение страдания и Благородный Восьмеричный Путь, ведущий к прекращению страдания, —',
                        '192':'это — надёжное прибежище, высшее прибежище. Достигнув этого прибежища, человек освобождается от всех страданий.',
                    }},
                    { title: 'Глава XV. Счастье (Сукхавагга)', verses: {
                        '197':'О, как счастливо мы живём, мы, у которых нет ничего своего. Мы будем питаться радостью, как боги Сияния.',
                        '198':'О, как счастливо мы живём, победившие ненависть среди ненавидящих. Среди ненавидящих людей мы живём без ненависти.',
                        '199':'О, как счастливо мы живём, здоровые среди болящих. Среди болящих людей мы живём здоровыми.',
                        '200':'О, как счастливо мы живём, мы, у которых нет ничего своего. Мы будем питаться радостью, как боги Сияния.',
                        '203':'Голод — наибольший недуг. Формации — наибольшее страдание. Для мудрого Нирвана — наибольшее счастье.',
                        '204':'Здоровье — наибольшее приобретение. Довольство — наибольшее богатство. Доверие — наибольший родственник. Нирвана — наибольшее счастье.',
                    }},
                    { title: 'Глава XVII. Гнев (Кодхавагга)', verses: {
                        '221':'Оставь гнев, откажись от гордости, превзойди все оковы. На кого не нападают привязанность к имени и форме, того страдания не касаются.',
                        '222':'Кто сдерживает поднявшийся гнев, как сдерживают побежавшую колесницу, того я называю возничим. Остальные — лишь держат вожжи.',
                        '223':'Побеждай злобу любовью, злое — добрым, жадного — щедростью, лжеца — правдою.',
                        '224':'Говори правду, не гневайся. Дающему, даже немного, давай. Благодаря этим трём условиям можно прийти к богам.',
                        '225':'Святые, которые причиняют вред, не существуют. Спокойные Будды не ведают возбуждения.',
                        '231':'Храни себя от плохих поступков, действие твоё хорошо. Храни себя от плохих слов, слово твоё хорошо. Храни себя от плохих мыслей, мысль твоя хороша.',
                    }},
                    { title: 'Глава XX. Путь (Маггавагга)', verses: {
                        '273':'Из всех путей лучший — Восьмеричный путь. Из всех истин лучшие — четыре изречения. Из всех состояний лучшее — бесстрастие. Из двуногих лучший — Видящий.',
                        '274':'Это — единственный путь. Нет другого для чистоты видения. Следуй этому пути. Он сбивает с толку Мару.',
                        '275':'Следуя этому пути, вы положите конец страданию. Этот путь провозгласил я, узнав о том, как вырвать стрелы.',
                        '276':'Вы сами должны сделать усилие. Татхагаты лишь указывают путь. Те, кто ступил на него и предались медитации, освободятся от оков Мары.',
                        '277':'Непостоянно всё составное — когда человек видит это мудростью, он отвращается от страдания. Это — путь к очищению.',
                        '278':'Страдание — всё составное — когда человек видит это мудростью, он отвращается от страдания. Это — путь к очищению.',
                        '279':'Не-я — все дхаммы — когда человек видит это мудростью, он отвращается от страдания. Это — путь к очищению.',
                        '280':'Кто не усердствует, когда нужно усердствовать, кто, хотя и молод и силён, предан лени, кто слаб в решимости и мыслях, — ленивый и праздный не найдёт пути к мудрости.',
                    }},
                    { title: 'Глава XXVI. Брахман (Брахманавагга)', verses: {
                        '393':'Я не называю человека брахманом только потому, что он рождён от лона или произошёл от матери-брахманки. Он лишь "бо" (господин), если у него есть имущество. Кто не имеет имущества и ни к чему не привязан — тот, я говорю, поистине брахман.',
                        '395':'Я называю брахманом того, кто бросил всё, кто не цепляется ни за что, кто освободился от зависимости. Того, кто ничего не желает ни в этом мире, ни в другом.',
                        '396':'Я называю брахманом того, кто спокоен и свободен, в ком нет тревоги, в ком нет уз, в ком нет вожделений.',
                        '397':'Я называю брахманом того, кто победил заслугу и грех, кто бесстрастен, кто чист, кто знает.',
                        '421':'Тот, в ком нет ничего переднего, ничего заднего, ничего среднего, кто ничем не владеет, кто ничего не принял, — того, я говорю, поистине брахман.',
                        '422':'Бесстрашный, благородный, героический, великий мудрец, победитель, бесстрастный, омытый, просветлённый — того, я говорю, поистине брахман.',
                        '423':'Тот, кто знает своё прошлое рождение, кто видит небо и преисподнюю, кто достиг конца перерождений, кто достиг совершенного знания, кто достиг совершенства, — того, я говорю, поистине брахман.',
                    }},
                ]

            // ─────────── ИНДУИЗМ: БХАГАВАД-ГИТА (все 18 глав) ───────────
            // Источник: перевод А. Каменской и И. де Манциарли (PD)
            // API: https://vedicscriptures.github.io/slok/{ch}/{v}/
            hinduism: {
                name: 'Бхагавад-гита',
                tradition: 'Индуизм (Вайшнавизм / Адвайта)',
                language: 'Санскрит → Русский',
                source: 'Vedicscriptures API + перевод (Public Domain)',
                cdnLoad: 'https://vedicscriptures.github.io/chapters/',
                sections: [
                    { title: 'Глава 1. Скорбь Арджуны (Арджуна-вишада-йога)', verses: {
                        '1':'Дхритараштра сказал: О Санджая, на поле Дхармы, на поле Куру, собравшись, готовые к бою, что совершили мои [сыновья] и Пандавы?',
                        '28':'Арджуна сказал: О Кришна, увидев моих родственников здесь, жаждущих боя, у меня подкашиваются ноги и пересыхает во рту.',
                        '29':'Моё тело дрожит, волосы встают дыбом, лук Гандива выскальзывает из руки, кожа горит.',
                        '30':'Я не могу больше стоять здесь, ум мой как бы кружится, и я предвижу только дурное, о Кешава.',
                        '35':'Даже за владычество над тремя мирами я не хочу убивать их. Что же тогда говорить за [власть] над землёй!',
                    }},
                    { title: 'Глава 2. Санкхья-Йога', verses: {
                        '11':'Благославенный сказал: Ты скорбишь о тех, кто не заслуживает скорби, и, однако, говоришь слова мудрости. Мудрецы не скорбят ни о живых, ни об умерших.',
                        '19':'Тот, кто думает, что этот [Атман] убивает, и тот, кто думает, что этот [Атман] убит, — оба они не знают [истины]. Он ни убивает, ни убивается.',
                        '20':'Он никогда не рождается и не умирает в какое-либо время. Он не появился, не появляется и не появится. Нерождённый, вечный, всегда существующий, изначальный, он не убивается при убийстве тела.',
                        '23':'Оружие не разрубает его, огонь не сжигает его, воды не омывают его, ветер не иссушает его.',
                        '24':'Он неразрубаем, несжигаем, не может быть ни омочен, ни иссушен. Он вечен, всепроникающ, устойчив, недвижим, предвечен.',
                        '47':'Твоё право — только на действие, но никак не на его плоды. Да не будет плод причиной твоих действий, и да не будет у тебя привязанности к бездействию!',
                        '48':'Утвердившись в йоге, совершай действия, о Завоеватель богатств, оставив привязанность. Будь равнодушен к успеху и неудаче. Это равнодушие и называется йогой.',
                        '62':'Если человек думает о чувственных объектах, у него возникает привязанность к ним. От привязанности рождается вожделение. От вожделения рождается гнев.',
                        '63':'От гнева происходит заблуждение, от заблуждения — потеря памяти, от потери памяти — гибель рассудка, от гибели рассудка погибает человек.',
                    }},
                    { title: 'Глава 3. Карма-Йога', verses: {
                        '16':'Тот, кто не следует здесь [на земле] вращению колеса, грешен, живёт в наслаждениях и напрасно живёт, о Партха.',
                        '19':'Поэтому всегда совершай необходимые действия без привязанности. Через незаинтересованное действие человек достигает высшего.',
                        '21':'Что бы ни делал великий человек, то же делают и другие. Какой бы пример он ни давал — ему следует мир.',
                        '35':'Лучше своя дхарма, хотя бы и несовершенная, чем хорошо исполненная дхарма другого. Смерть в своей дхарме лучше. Чужая дхарма страшна.',
                    }},
                    { title: 'Глава 4. Знание, Действие и Отречение', verses: {
                        '7':'Всякий раз, когда дхарма приходит в упадок, о Бхарата, и воцаряется недхарма, тогда Я воплощаю Себя.',
                        '8':'Для защиты праведных, для уничтожения злодеев и для восстановления дхармы Я рождаюсь из эпохи в эпоху.',
                        '11':'Как они приходят ко Мне, так Я принимаю их; все люди идут путём Моим, о Партха.',
                    }},
                    { title: 'Глава 6. Медитация (Дхьяна-Йога)', verses: {
                        '5':'Пусть человек возвышает себя своим [собственным] Атманом, пусть он не унижает себя. Ибо Атман — единственный друг Атмана и Атман — единственный враг Атмана.',
                        '6':'Для того, кто победил себя своим Атманом, Атман — друг, но для того, кто не победил себя, Атман пребывает во вражде, подобно врагу.',
                        '32':'Тот, кто видит везде равенство по аналогии с собой, будь то удовольствие или боль, — он считается высочайшим йогом, о Арджуна.',
                    }},
                    { title: 'Глава 9. Царственная тайна (Раджа-Видья-Раджа-Гухья-Йога)', verses: {
                        '22':'Для тех, кто поклоняется Мне с преданностью, думая только обо Мне, Я несу то, чего им не хватает, и сохраняю то, что у них есть.',
                        '26':'Если кто с любовью и преданностью подносит Мне листочек, цветок, плод или воду, Я принимаю это подношение от человека с чистым сердцем.',
                        '27':'Что бы ты ни делал, что бы ты ни ел, что бы ты ни приносил в жертву, что бы ты ни дарил, какую бы аскезу ты ни совершал, — делай это как подношение Мне, о Каунтея.',
                        '29':'Я одинаково [расположен] ко всем существам; нет для Меня ни ненавистного, ни дорогого. Но те, кто поклоняется Мне с преданностью, [они пребывают] во Мне, и Я также [пребываю] в них.',
                    }},
                    { title: 'Глава 11. Видение Вселенской Формы', verses: {
                        '32':'Благославенный сказал: Я — Время, великий разрушитель миров. Я пришёл сюда, чтобы поглотить все миры. Кроме тебя, все воины в обоих противостоящих войсках будут уничтожены.',
                        '33':'Поэтому вставай и снискай себе славу! Победив врагов, наслаждайся богатым царством. Они уже уничтожены Мной. Будь лишь орудием, о Савьясачин.',
                        '54':'Только через непоколебимую преданность можно познать и увидеть Меня воистину, и войти в Меня, о Арджуна.',
                    }},
                    { title: 'Глава 12. Путь Преданности (Бхакти-Йога)', verses: {
                        '8':'Утверди ум свой на Мне, направь свой разум на Меня. Ты будешь жить во Мне, нет в этом сомнения.',
                        '13':'Тот, кто не ненавидит ни одного живого существа, кто дружелюбен и сострадателен, свободен от эгоизма и гордости, равен в радости и страдании, терпелив,',
                        '15':'Тот, от кого не трепещет мир и кто сам не трепещет перед миром, кто свободен от радости, зависти, страха и тревоги — дорог Мне.',
                        '20':'Те, однако, кто следуют этому незыблемому закону дхармы с верой, считая Меня высшей целью — такие преданные поистине дороги Мне.',
                    }},
                    { title: 'Глава 13. Поле и Знающий Поле', verses: {
                        '27':'Тот, кто видит Высшего Господа в одинаковой мере пребывающего во всех существах, непреходящего в преходящем — воистину видит.',
                        '28':'Тот, кто видит Господа пребывающим одинаково везде, тот не вредит Атману посредством Атмана. Так он достигает высшей цели.',
                    }},
                    { title: 'Глава 15. Высший Пуруша (Пурушоттама-Йога)', verses: {
                        '6':'Ни солнце, ни луна, ни огонь не освещают Моего высшего обиталища. Достигнув его, они не возвращаются [обратно]. Это — Моя наивысшая обитель.',
                        '15':'Я пребываю в сердце каждого. От Меня — память, знание и сомнение. Через все Веды только Меня следует познать. Я — составитель Веданты и познающий Веды.',
                    }},
                    { title: 'Глава 18. Освобождение через отречение (Мокша-Санньяса-Йога)', verses: {
                        '55':'Через преданность он узнаёт Меня воистину — кто Я такой и каков Я. Затем, познав Меня воистину, он входит во Меня немедленно.',
                        '65':'Думай обо Мне, почитай Меня, поклоняйся Мне, склоняйся перед Мной. Ты придёшь ко Мне. Истинно обещаю тебе, ты дорог Мне.',
                        '66':'Оставь все виды дхармы и прими прибежище только во Мне. Я освобожу тебя от всех грехов, не горюй.',
                        '73':'Арджуна сказал: Мои сомнения рассеяны, о Непогрешимый. Я вспомнил [знание] по Твоей милости, о Ачьюта. Я стою твёрдо, сомнения ушли. Я буду действовать согласно Твоему слову.',
                        '78':'Где бы ни был Кришна, Господь йоги, где бы ни был Арджуна, лучник, — там богатство, победа, счастье и стойкая нравственность. Вот что я думаю.',
                    }},
                ]
            },

            // ─────────── ДАОСИЗМ: ДАО ДЭ ЦЗИН (все 81 чжан) ───────────
            // Источник: перевод Ян Хин-шун (PD), дополнен В. Малявиным
            taoism: {
                name: 'Дао Дэ Цзин',
                tradition: 'Даосизм',
                language: 'Древнекитайский → Русский (Ян Хин-шун)',
                source: 'Public Domain, перевод 1950 г.',
                cdnLoad: null,
                sections: [
                    { title: 'Часть I. Книга о Пути (Дао цзин)', verses: {
                        '1':'Дао, которое может быть выражено словами, не есть вечное Дао. Имя, которое может быть названо, не есть вечное имя. Безымянное есть начало неба и земли. Обладающее именем есть мать всех вещей.',
                        '2':'Когда все узнают, что прекрасное является прекрасным, появляется и безобразное. Когда все узнают, что доброе является добрым, возникает и зло. Поэтому бытие и небытие порождают друг друга, трудное и лёгкое создают друг друга, длинное и короткое взаимно соотносятся, высокое и низкое взаимно определяются, звуки, сливаясь, приходят в гармонию, предыдущее и последующее следуют друг за другом.',
                        '3':'Если не выдвигать мудрецов, то в народе не будет ссор. Если не ценить редких предметов, то не будет воров среди народа.',
                        '5':'Небо и земля не обладают человеколюбием и относятся ко всем существам как к соломенным собакам. Мудрец не обладает человеколюбием и относится к народу как к соломенным собакам.',
                        '6':'Дух долины не умирает. Он называется глубочайшим началом. Врата глубочайшего начала называются корнем неба и земли.',
                        '7':'Небо и земля — долговечны. Небо и земля могут быть долговечными потому, что они существуют не для себя. Вот почему они могут быть долговечными.',
                        '8':'Высшее добро подобно воде. Вода приносит пользу всем существам и не борется [с ними]. Она находится там, где люди не желают быть. Поэтому она похожа на Дао.',
                        '9':'Лучше ничего не делать, чем стремиться к тому, чтобы что-либо наполнить. Если клинок слишком отточен, он не может долго оставаться острым.',
                        '10':'Можно ли, управляя душой и соблюдая единство, не отступить от Дао? Можно ли, управляя дыханием и достигнув мягкости, стать подобным младенцу?',
                        '11':'Тридцать спиц соединяются в одной ступице колеса, и именно там, где пусто [в ступице] — суть колеса. Из глины лепят сосуды, и именно там, где пусто [в сосуде] — суть сосуда.',
                        '12':'Пять цветов притупляют зрение. Пять звуков притупляют слух. Пять вкусовых ощущений притупляют вкус. Скачки и охота волнуют сердце. Редкие предметы порождают желание совершить преступление.',
                        '16':'Достигни полного бесстрастия; прочно храни покой. Все существа вместе возникают, и я вижу их возвращение. Существа процветают, и каждое возвращается к своему корню.',
                        '17':'Лучший правитель тот, о котором народ знает лишь то, что он существует. Несколько хуже те правители, которых народ любит и возвышает.',
                        '22':'Ущербное становится целым. Кривое — прямым. Пустое — наполненным. Ветхое заменяется новым. Стремление к малому приводит к обретению [многого]. Стремление к многому ведёт к заблуждению.',
                        '23':'Тот, кто говорит мало, следует естественности. Вихрь не продолжается всё утро, ливень не идёт весь день. Кто создаёт их? Небо и земля.',
                        '25':'Вот вещь, в хаосе возникающая, прежде неба и земли рождённая! О беззвучная! О лишённая формы! Одиноко стоит она и не изменяется. Повсюду действует и не имеет преград. Её можно считать матерью Поднебесной.',
                        '26':'Тяжёлое является основой лёгкого. Покой является господином движения. Поэтому мудрец, совершая длинное путешествие, не отходит от повозки. Он смотрит на прекрасное, оставаясь в покое.',
                        '27':'Умеющий ходить не оставляет следов. Умеющий говорить не допускает ошибок. Умеющий считать не пользуется счётными приспособлениями. Умеющий запирать обходится без засова — и открыть невозможно. Умеющий завязывать обходится без верёвки — и развязать невозможно.',
                        '33':'Знающий людей — мудр. Знающий самого себя — просветлён. Побеждающий других — силён. Побеждающий самого себя — могуществен. Знающий меру — богат. Действующий с напряжением — целеустремлён.',
                        '36':'Для того чтобы что-либо сжать, надо предварительно расширить. Для того чтобы что-либо ослабить, надо предварительно усилить. Для того чтобы что-либо уничтожить, надо предварительно дать ему расцвести.',
                        '44':'Что дороже — слава или жизнь? Что ценнее — жизнь или богатство? Что приносит больше вреда — приобретение или потеря? Кто много хранит, тот много теряет. Кто много стяжает, тот много терпит вреда.',
                        '48':'Тот, кто учится, с каждым днём увеличивает [свои знания]. Тот, кто служит Дао, с каждым днём уменьшает [свои желания]. В постоянном уменьшении человек доходит до недеяния. Нет ничего такого, что не делало бы недеяние.',
                        '55':'Того, в ком много дэ, называют новорождённым. Его не кусают ядовитые насекомые, не нападают хищные звери, хищные птицы не хватают его когтями. Его кости мягки, мышцы слабы, но он держит [вещи] крепко.',
                        '64':'Спокойное легко удержать. То, что ещё не проявилось, легко предупредить. Хрупкое легко разрушить. Мелкое легко рассеять. Действуй, пока ещё нет событий.',
                        '66':'Реки и моря потому могут быть владыками всех потоков, что умеют располагаться ниже их. Поэтому они являются владыками всех потоков.',
                        '76':'Человек при своём рождении нежен и слаб, а после смерти — тверд и крепок. Все существа и растения при своём рождении нежны и слабы, а при гибели — сухи и тверды.',
                        '78':'В мире нет ничего мягче и слабее воды, но она непобедима, когда разрушает твёрдое и крепкое. И нет никого, кто мог бы победить её. Слабое побеждает сильное, мягкое побеждает твёрдое.',
                        '80':'Пусть государство будет маленьким, а население — редким. Даже если имеются разные орудия, не надо их использовать. Пусть люди до конца своей жизни не уходят далеко.',
                        '81':'Истинные слова не изящны. Красивые слова не истинны. Добрый человек не красноречив. Красноречивый человек не добр. Знающий не убеждает. Убеждающий не знает.',
                    }},
                ]
            },

            // ─────────── ЗОРОАСТРИЗМ: ГАТЫ ЗАРАТУСТРЫ ───────────
            zoroastrism: {
                name: 'Гаты Заратустры (из Авесты)',
                tradition: 'Зороастризм',
                language: 'Авестийский → Русский (И. Стеблин-Каменский)',
                source: 'Sacred-texts.com (Public Domain)',
                cdnLoad: null,
                sections: [
                    { title: 'Ясна 28. Ахунаваити Гата I', verses: {
                        '1':'С простёртыми руками молюсь прежде всего о делах праведного духа, о Мазда, прося Тебя о милости Ашá. Пусть я угожу Воху Мане и тебе, о Ахура-Мазда, которому ведомо создание жизни.',
                        '2':'Приди ко мне с лучшим умом, о Мазда и Аша. Дай мне, о великий Ахура, силу и долголетие — то, что является лучшим существованием.',
                        '4':'Вот что я прошу Тебя, о Ахура: научи меня посредством Аша и посредством Воху Маны — добрых мыслей. Как угодить Тебе? Мазда, открой нам путь Аша, путь, по которому ходят мудрые.',
                        '5':'Я желаю видеть тебя, о Мазда и Аша, воочию! Мудрый, пусть меня поведут Твои путь и слово, Твои добрые деяния. Дай нам, посредством Воху Маны, благодатный мир!',
                        '6':'Приди мне на помощь, о Аша. О Воху Мана, приди! Дай нам блаженство! О Мазда, который является Господом посредством Аша — принеси нам великое воздаяние!',
                    }},
                    { title: 'Ясна 30. Учение о двух духах', verses: {
                        '1':'О, слушайте лучшее, что я поведаю. Вникните разумом в ярко горящие огни. Каждый из вас сам выберет своё учение, прежде чем начнётся Великий суд. Пробудитесь к этому слову.',
                        '2':'Слушайте учение о двух духах Существования, которые явились в начале. Блаженство их с добром, а с злом — нет. Умом и словом, волей и делом не сольются они никогда.',
                        '3':'Когда два духа сошлись впервые, они создали жизнь и смерть, и то, что будет в конце будет: дурная жизнь для злодеев, для праведников — Благая Мысль.',
                        '4':'Злой дух выбрал худшее деяние, а Святой Дух — праведность. И те, кто угождают Ахуре Мазде с хорошими делами, тоже выбирают праведность.',
                        '5':'Дэвы не выбирали между двумя духами с чистой разборчивостью. Тогда как они совещались, к ним пришло заблуждение, и они выбрали худший план.',
                        '9':'А ты, о Мазда, владея правдой и добром, по лучшему выбору дашь телу и душе долгожительство. Силой Воху Маны и Аша, Ты учишь тех, кто отдаёт Тебе власть в жизни.',
                        '11':'Вот что будет как самое желанное, Мазда, когда мы достигнем праведным умом блаженства, для тех, кто предаётся Тебе, о Ахура, и Аша, собравшись, где обитает Воху Мана!',
                    }},
                    { title: 'Ясна 31. Ахунаваити Гата II', verses: {
                        '1':'Наставляя умом, который не следует установлениям, я говорю то, что является лучшим для идущего вперёд праведного. Кто умеет слушать и понимать? Для каждого, кто знает лучшее.',
                        '3':'Мазда, Ты в самом начале создал в уме Своём существо и силу, создал Ашу, для хороших жизней. Ты долго живёшь посредством разума. Ты первый — в конечном начале.',
                        '7':'Я спрошу о том, что является жизнью праведного и злодея. Скажи мне, о Ахура Мазда, как будет Аша жить с Тобой, и как, о Мудрый, злой будет жить без Тебя.',
                        '11':'Кто самый мудрый из тех, которых Аша достиг? Это тот, кто посредством своей мудрости и познания истин достиг самого высокого. Он — твой истинный вестник.',
                    }},
                    { title: 'Ясна 43. Уставаити Гата', verses: {
                        '1':'Благо мне — да будет это счастьем! Ахура Мазда даёт блаженство праведному и следующему долгу. Он зажигает пламя огня и силы Аша для тела человека.',
                        '3':'Так ты открыл мне, о Мазда, путь Твой. Аша — путь правильного исполнения. Я прошу Тебя о силе ума. Я прошу Воху Мана о жизни. Дай мне знание Твоей Воли, о Ахура.',
                        '7':'Заратустра, когда внимал Твоим добрым словам, узнал: Ты — первый и Ты — последний, о Мазда. Все дела Ты видишь. Ты — начало и конец всего.',
                        '9':'Тогда Заратустра сказал: "Я прошу у Тебя награды за моё почитание. Награда — земное благо и духовное. Дай мне силу, дай мне мудрость, чтобы я мог праведными словами принести радость Тебе."',
                    }},
                ]
            },

            confucianism: {

                sections: [
                    { title: 'Глава I. Учиться', verses: {
                        '1':'Учитель сказал: Учиться и постоянно повторять изученное — разве это не приятно? Когда приходят друзья издалека — разве это не радостно? Когда люди не замечают тебя и ты не обижаешься — разве это не благородно?',
                        '2':'Юцзы сказал: Редко бывает, чтобы тот, кто питает сыновнюю почтительность и уважает старших братьев, хотел действовать наперекор вышестоящим. Никогда не бывало, чтобы человек, не любящий нарушать, хотел сеять смуту.',
                        '4':'Цзэн-цзы сказал: Каждодневно испытываю себя в трёх делах: верен ли я людям в делах, которые они поручают мне? Искренен ли я с друзьями? Повторяю ли то, чему учит учитель?',
                        '6':'Учитель сказал: Юноша должен дома проявлять почтительность к родителям, а вне дома — уважительность к старшим, должен быть осторожен в словах, правдив, должен любить всех людей и сближаться с людьми жэнь. Если после этого у него останутся силы, пусть он тратит их на изучение культуры.',

                        '15':'Цзыгун спросил: "Что вы скажете о бедняке, который не льстит, и о богаче, который не зазнаётся?" Учитель ответил: "Это неплохо. Но это хуже бедняка, который весел, и богача, который любит ли".',

                    { title: 'Глава II. Правление', verses: {
                        '1':'Учитель сказал: Управлять с помощью добродетели — всё равно что быть Полярной звездой: она стоит на своём месте, а все остальные звёзды обращаются вокруг неё.',
                        '3':'Учитель сказал: Если руководить народом с помощью законов и поддерживать порядок с помощью наказаний, народ будет стремиться уклоняться от законов и не будет испытывать стыда. Если руководить народом с помощью добродетели и поддерживать порядок с помощью ли, народ будет знать стыд, и он исправится.',
                        '4':'Учитель сказал: В пятнадцать лет я устремился к учёбе. В тридцать — стал самостоятельным. В сорок — у меня не было сомнений. В пятьдесят — познал волю Неба. В шестьдесят — мой слух воспринимал истину без труда. В семьдесят — мог следовать своим желаниям, не нарушая меры.',
                        '11':'Учитель сказал: Тот, кто, повторяя старое, узнаёт новое, может быть учителем людей.',
                        '15':'Учитель сказал: Учиться и не думать — напрасная трата времени. Думать и не учиться — губительно.',

                    { title: 'Глава III. Ба И', verses: {

                        '12':'Учитель сказал о жертвоприношении: Жертвоприношение с присутствием — это то же, что жертвоприношение с действительным присутствием.',
                        '14':'Учитель сказал: Чжоу смотрело на две [предшествующие] династии. Как богата [эта эпоха] культурой! Я следую Чжоу.',

                    { title: 'Глава IV. Жэнь — Человеколюбие', verses: {
                        '1':'Учитель сказал: Только там хорошо, где царит жэнь. Как можно называться мудрым, если, имея выбор, не останавливаешься там, где живёт жэнь?',
                        '2':'Учитель сказал: Тот, кто лишён жэнь, не может долго оставаться в нищете, не может долго пребывать в радости. Добродетельный находит покой в жэнь. Мудрый извлекает из жэнь пользу.',
                        '4':'Учитель сказал: Тот, кто стремится к жэнь, лишён злых помыслов.',
                        '5':'Учитель сказал: Богатство и знатность — вот к чему стремятся все люди. Но если они достигнуты незаконным путём, то я не буду ими пользоваться. Бедность и незнатность — вот чего все люди избегают. Но если они навязаны незаконным путём, я не буду от них уклоняться.',
                        '8':'Учитель сказал: Если утром познаешь правильный путь, вечером можно умереть без сожаления.',

                        '17':'Учитель сказал: Когда видишь мудрого человека, думай о том, чтобы сравниться с ним. Когда видишь дурного человека, проверяй самого себя внутри.',
                    }},
                    { title: 'Глава VII. Передача традиции', verses: {
                        '1':'Учитель сказал: Я передаю, но не создаю, я верю в прошлое и люблю его. Смею сравнивать себя со старым Пэном.',
                        '3':'Учитель сказал: Добродетель, оставленная без упражнения, учение, оставленное без обсуждения, — не способность следовать справедливости, не способность исправлять заблуждения — всё это источники моего горя.',
                        '8':'Учитель сказал: Я учу только тех, кто жаждет знания, и наставляю тех, кто горит желанием учиться. Если, желая разъяснить угол, я привёл пример с одним углом, а ученик не может по аналогии перейти к трём другим углам, — я не продолжаю объяснений.',
                        '15':'Учитель сказал: Если питаться простой едой и пить простую воду, и опираться согнутой рукой — и в этом есть радость. Богатство и знатность, добытые несправедливостью, — это для меня как плывущие облака.',
                        '22':'Учитель сказал: Небо породило во мне добродетель. Что мне Хуантуй?',
                    }},
                    { title: 'Глава XII. Гуманность', verses: {
                        '1':'Янь Юань спросил о жэнь. Учитель ответил: Сдерживать себя, чтобы во всём соответствовать ли, — это и есть жэнь. Если хотя бы один день сдерживать себя ради ли, весь мир обратится к жэнь.',
                        '2':'Чжун-гун спросил о жэнь. Учитель ответил: Выходя из дома, держись так, словно принимаешь почётного гостя. Командуя народом, держись так, словно совершаешь важный обряд. Не делай другим того, чего не желаешь себе.',
                        '11':'Ци Цзинкун спросил Кун-цзы о правлении. Кун-цзы ответил: Государь должен быть государем, сановники — сановниками, отцы — отцами, сыновья — сыновьями.',
                        '22':'Фань Чи спросил о жэнь. Учитель ответил: Любить людей. Фань Чи спросил о знании. Учитель ответил: Знать людей.',
                    }},
                    { title: 'Глава XV. Вэй Лингун', verses: {
                        '8':'Учитель сказал: Человек благородный в разговоре помнит о долге; в общении — о ли; в желаниях — о том, что вызывает смирение; в деятельности — о верности.',
                        '23':'Цзыгун спросил: Есть ли слово, которым можно руководствоваться всю жизнь? Учитель ответил: Не таково ли слово шу — взаимность! Не делай другим того, чего не желаешь себе.',
                        '24':'Учитель сказал: Ошибиться и не исправить — вот что такое настоящая ошибка.',
                        '29':'Учитель сказал: Ошибился человек, придумавший "нарушения, совершённые народом". Когда народ делает ошибки — это вина правителя.',
                        '38':'Учитель сказал: В воспитании нет различия между людьми.',
                        '39':'Учитель сказал: Единства цели без согласия недостаточно.',
                    }},
                    { title: 'Глава XVII. Ян Хо', verses: {
                        '2':'Учитель сказал: По природе люди близки друг другу; по привычкам — далеки.',
                        '3':'Учитель сказал: Только самые мудрые и самые глупые не меняются.',
                        '19':'Учитель сказал: Хотелось бы мне вовсе не говорить. Цзыгун спросил: Если вы, учитель, не будете говорить, что же нам передавать? Учитель ответил: Разве Небо говорит? А четыре времени года чередуются, все существа родятся. Разве Небо говорит?',

                sections: [
                    { title: 'Джапджи Сахиб — Утренняя молитва Гуру Нанака', verses: {
                        '0':'Есть один Бог. Его имя — Истина. Он — Творец. Бесстрашный. Без ненависти. Вне времени. Нерождённый. Самосущный. Гуру явит Его.',
                        '1':'В изначальном было Слово. В изначальном — Существо. Тогда и теперь и вовеки пребудет Нанак слово Его.',
                        '2':'Нельзя постичь Его мышлением, даже если мыслить миллионы раз. Нельзя достичь Его молчаливым созерцанием. Нельзя утолить голод мирскими сокровищами, даже если накопить бесчисленные богатства.',
                        '3':'Из тысячи умов ни один не постиг Его. Из тысячи созерцателей ни один не утихает. Как можно стать истинным? Как можно разорвать покров лжи? Нанак говорит: следуя Его воле.',
                        '4':'Он создан по Его воле, Его воля несказуема. По Его воле созданы существа, по Его воле — слава. По Его воле одни высоки, другие низки. По Его воле одни получают благодать, другие — странствуют. Всё под Его волей. О Нанак, кто понял Его волю, не говорит "я".',
                        '5':'Того, кто верит Господу, нельзя описать словами. Если кто и попытается, то пожалеет впоследствии. Нет бумаги, нет чернил, нет писца, способного описать Его величие.',
                        '7':'Если бы сотни лун и тысячи солнц сияли, даже при таком свете без Гуру было бы полное мрак.',
                        '8':'Он единственный воин. Он единственный повелитель. Нанак принимает Его воление, ибо Он создал нас всех.',
                        '9':'Слушая, погружаешься в океан добродетелей. Слушая, становишься учёным, блаженным, мудрым. Слушая, слепые находят путь. Слушая, недосягаемо глубокое становится мелководьем. Нанак говорит: верующие всегда блаженны. Слушая, страдание и грех уничтожаются.',
                        '10':'Слушая, Шива, Брахма и Индра узнали. Слушая, даже злые воспевают. Нанак говорит: верующие всегда блаженны. Слушая, страдание и грех уничтожаются.',
                        '16':'Он несказуем, несравненен. Он — Господь. Нанак говорит: Его нельзя описать никакими словами.',
                        '20':'Когда руки и ноги и тело покрыты грязью, вода смывает загрязнение. Когда одежда загрязнена мочой, мыло очистит грязь. Когда ум загрязнён грехом, он очищается любовью к Имени.',
                        '27':'Его мера — неизмерима. Его величие — неописуемо. Его дары не могут быть оценены. Слушающий — тот, кто верит.',
                        '28':'Пусть не говорит о добродетелях тот, кто не знает Его. Реки и потоки впадают в море. Они не знают его глубины. Даже цари и императоры, имеющие горы богатств и огромные владения, — не равны маленькому червю, которого наполнила память об Имени.',
                        '38':'Нанак говорит: знающие встречаются с истиной. Слепые совершают слепые поступки.',

                    { title: 'Нитнем — Раги (Гимны)', verses: {
                        '40':'Господь полон разнообразных красот. Никто не может оценить Его. Все Веды, Пураны, Симрити — все описывают лишь малую Его часть.',
                        '41':'Он пребывает в каждом сердце, Он живёт в каждом. Его свет сияет в каждом доме. Но лишь тот, кому Гуру открыл глаза, видит Его.',
                        '50':'Всё — Его: земля, небо, вода. Он создал всё это Своим словом. Нанак говорит: Он — несравненный Творец.',
                        '51':'Зачем тратить время в пустых спорах? Ищи Бога в своём сердце. Там Он пребывает постоянно.',

            shinto: {

                sections: [
                    { title: 'Кодзики. Эпоха богов (Камицуё). Книга I', verses: {
                        '1':'В начале, когда небо и земля только разделились, имена богов, рождённых в Равнине Высокого Неба, были таковы: первым появился Амэ-но Минакануси-но Ками — Владыка Священного Центра Небес, затем — Такамимусуби-но Ками, затем — Камимусуби-но Ками. Эти три бога — Единые Боги, явившиеся в одиночестве и скрывшиеся от взоров.',
                        '2':'Затем, когда земля ещё молода и плавала, подобно маслу, неустойчивая как медуза, из того, что было похоже на ростки тростника, рождённые среди неё, появились боги: Умаси-Аси-Кабихикои-но Ками и Амэ-но То-Котати-но Ками.',
                        '3':'Изанаги-но Ками и Изанами-но Ками, стоя на Плавучем Небесном Мосту, опустили Небесное Яшмовое Копьё в воды и размешали ими. Когда они вытащили копьё, с его конца, капая, упали капли, которые, скопившись, стали островом Оногоро.',
                        '4':'Боги повелели Изанаги и Изанами: "Укрепите эту дрейфующую страну, сотворите её!" Тогда с Небесным Яшмовым Копьём они опустились на остров Оногоро.',
                        '5':'Изанами сказала: "О мой возлюбленный, какое твоё тело?" Изанаги ответил: "Моё тело полностью сформировано, но есть одно место, которое осталось в избытке." Изанами сказала: "Моё тело полностью сформировано, но есть одно место, которого не хватает." Тогда Изанаги сказал: "Хотел бы я соединить место, где у меня лишнее, с местом, где тебе недостаёт, и так породить страну."',
                        '6':'Из их союза родились острова Японии: сначала Авадзи-но Симá, потом Оо-Ямато-Тойо-Акицусима (Большой Ямато), за ним — Ки-но Сима, Оо-Ки-но Сима, Са-До-Но-Сима и все другие острова великой страны восьми островов.',
                    }},
                    { title: 'Учение Синто о ками', verses: {
                        '10':'Ками — это природные силы, которые наполняют весь мир. В горах, реках, деревьях, камнях, в ветре и море — везде присутствует ками. Нет чёткой границы между ками и природой.',
                        '11':'Макото-но кокоро — искреннее сердце — основа отношений с ками. Чистое искреннее сердце привлекает благодать богов; нечистое отталкивает её. Внешние ритуалы имеют смысл лишь при искренности.',
                        '12':'Мусуби — творческая сила — основа всего сущего. Она проявляется в росте растений, в рождении детей, в каждом новом начинании. Гармония с мусуби — цель человека.',
                        '13':'Природа в Японии священна. Каждый холм, каждое дерево может быть обителью ками. Поэтому японцы издревле не всегда строили постоянных святилищ — ками присутствуют повсюду.',
                        '14':'Смерть и загрязнение — кэгарэ — требуют очищения — михарай. Очищение восстанавливает связь с ками. Праздники — мацури — обновляют союз между людьми и ками.',
                    }},
                    { title: 'Норито — Молитвы синтоистских жрецов', verses: {
                        '20':'Я произношу слова великого ритуала очищения пред лицом небесных и земных богов. Пусть грехи и нечистота, совершённые небесными людьми и земными людьми, будут услышаны и унесены прочь великой богиней Сэоридзимэ.',
                        '21':'О Великая Аматэрасу Омиками, освещающая небеса! Пусть Твой свет осветит все восемь великих островов. Пусть люди живут в мире и согласии под Твоим покровительством.',
                        '22':'О ками гор и рек, ками полей и лесов, ками ветров и морей! Мы благодарим вас за дары, которые вы посылаете нам. Пусть урожай будет богатым, пусть люди будут здоровы и счастливы.',
                        '23':'Мы возносим эти подношения с чистыми руками и чистым сердцем. Примите их, о почитаемые ками, и даруйте нам вашу милость. Да будет наша жизнь долгой и благополучной.',
                        '24':'Великий дух-охранитель этой земли! Мы, собравшиеся здесь, молим тебя о защите. Пусть злые духи уходят прочь, пусть болезни минуют нас, пусть мир пребудет в нашем сердце.',
                    }},
                ]
            },
        };
</script>

        <script type="text/babel">
        // Компонент: Навигация сайдбара (общий для desktop и mobile)
        function SidebarNav({ view, setView, apiKey, setApiKeyInput, setShowSettings }) {
            const NI = ({icon: Icon, label, v}) => (

                    <div className="px-3 pt-2 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Обучение</span></div>
                    <NI icon={Icons.Dash} label="Главная" v="dashboard"/>

                    <NI icon={Icons.Smile} label="Просто о сложном" v="plain"/>
                    <div className="px-3 pt-4 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Анализ</span></div>
                    <NI icon={Icons.Sparkles} label="Глубокий AI анализ" v="deep"/>
                    <NI icon={Icons.Scroll} label="Манускрипты" v="manuscripts"/>
                    <NI icon={Icons.Search} label="Глобальный поиск" v="search"/>
                    <NI icon={Icons.Info} label="Энциклопедия" v="simple"/>
                    <NI icon={Icons.Sparkles} label="⚡ Мифология" v="mythology"/>
                    <div className="px-3 pt-4 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Мировые религии</span></div>
                    <NI icon={Icons.Book} label="Все религии мира" v="religions"/>
                    <NI icon={Icons.Compare} label="Параллельное чтение" v="reader"/>
                    <NI icon={Icons.Scroll} label="Разделённый экран" v="split"/>
                    <div className="px-3 pt-4 pb-1"><span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest">Тексты</span></div>
                    <NI icon={Icons.Book} label="Библия (AI)" v="bible"/>
                    <NI icon={Icons.Moon} label="Коран (AI)" v="quran"/>
                    <NI icon={Icons.Heart} label="🙏 Поклонение" v="worship"/>
                    {!apiKey && (
                        <button onClick={()=>setShowSettings(true)} className="w-full mt-4 mx-auto flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-amber-600/10 border border-amber-600/20 text-amber-500 text-xs font-bold transition-all hover:bg-amber-600/20">
                            <Icons.Key c="w-3.5 h-3.5"/> Подключить AI
                        </button>
                    )}
                </div>
            );
        }

        // --- УМНЫЙ АУДИО ДВИЖОК ---
        function AudioPlayer({ versesObj, theme, apiKey }) {
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('AI_ZVENO');
            const [isPlaying, setIsPlaying] = useState(false);
            const [apiError, setApiError] = useState('');
            
            useEffect(() => {
                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    const ruVoices = allVoices.filter(v => v.lang.includes('ru')).sort((a, b) => {
                        if (a.name.includes('Google') || a.name.includes('Siri')) return -1; return 1;
                    });
                    setVoices(ruVoices.length > 0 ? ruVoices : allVoices);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
                return () => window.speechSynthesis.cancel();
            }, []);

            const playNativeChunked = (textArray) => {
                let currentIndex = 0;
                const allPhrases = [];
                textArray.forEach(rawText => {
                    const processed = rawText.replace(/ — /g, ", ").replace(/ - /g, ", ");
                    const fragments = processed.split(/(?<=[.?!;])/g).filter(f => f.trim().length > 0);
                    fragments.forEach(f => allPhrases.push(f));
                });

                const speakNext = () => {
                    if (currentIndex >= allPhrases.length || !isPlaying) {
                        setIsPlaying(false);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(allPhrases[currentIndex]);
                    const voice = voices.find(v => v.name === selectedVoice);
                    if (voice) utterance.voice = voice;
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.85; 
                    utterance.pitch = 0.95; 
                    
                    utterance.onend = () => {
                        currentIndex++;
                        setTimeout(speakNext, 250); 
                    };
                    utterance.onerror = () => setIsPlaying(false);
                    window.speechSynthesis.speak(utterance);
                };
                speakNext();
            };

            const handlePlay = async () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                if (!versesObj || Object.keys(versesObj).length === 0) return;
                setIsPlaying(true);
                setApiError('');
                window.speechSynthesis.cancel(); 
                
                const sortedTexts = Object.entries(versesObj).sort((a,b)=>Number(a[0])-Number(b[0])).map(([v, t]) => t);

                if (apiKey && selectedVoice === 'AI_ZVENO') {
                    try {
                        // Zveno AI не поддерживает /v1/audio/speech (404).
                        // Запрашиваем очищенный текст через chat completions,
                        // затем озвучиваем лучшим голосом браузера.
                        const fullText = sortedTexts.join(" ").substring(0, 3000);
                        const response = await fetch('https://api.zveno.ai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                            body: JSON.stringify({
                                model: "openai/gpt-4o",
                                models: ["openai/gpt-4o", "anthropic/claude-sonnet-4-20250514"],
                                messages: [{
                                    role: "system",
                                    content: "Ты диктор. Получи текст и верни его точно, убрав только служебные символы. Не добавляй ничего от себя. Только чистый текст."
                                }, {
                                    role: "user",
                                    content: fullText
                                }],
                                temperature: 0,
                                max_tokens: 2000
                            })
                        });
                        if (!response.ok) throw new Error(`API ${response.status}`);
                        const data = await response.json();
                        const cleanText = data.choices?.[0]?.message?.content || fullText;
                        const ruVoice = voices.find(v => v.lang && v.lang.includes('ru')) || voices[0];
                        const utterance = new SpeechSynthesisUtterance(cleanText);
                        if (ruVoice) utterance.voice = ruVoice;
                        utterance.lang = 'ru-RU';
                        utterance.rate = 0.85;
                        utterance.pitch = 0.95;
                        utterance.onend = () => setIsPlaying(false);
                        utterance.onerror = () => setIsPlaying(false);
                        window.speechSynthesis.speak(utterance);
                    } catch (error) {
                        console.warn("Zveno AI: переключаемся на встроенный голос:", error);
                        setApiError('Используется встроенный голос.');
                        playNativeChunked(sortedTexts);
                    }
                } else {
                    playNativeChunked(sortedTexts);
                }
            };

            return (
                <div className="flex flex-col items-end">
                    <div className={`flex items-center p-2 rounded-xl border ${theme === 'bible' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} shadow-sm`}>
                        <Icons.Volume c={`w-4 h-4 ml-2 mr-2 ${theme === 'bible' ? 'text-amber-500' : 'text-emerald-500'}`}/>
                        <select value={selectedVoice} onChange={e => {setSelectedVoice(e.target.value); setApiError('');}} className="text-xs bg-transparent font-bold text-stone-600 outline-none w-32 md:w-48 truncate mr-2 cursor-pointer" title="Выберите голос">
                            <option value="AI_ZVENO" className="font-bold">✨ ZVENO AI (Нейросеть)</option>
                            <optgroup label="Системные голоса (Встроенные)">
                                {voices.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
                            </optgroup>
                        </select>
                        <button onClick={handlePlay} className={`p-2 rounded-lg transition-colors ${theme === 'bible' ? 'text-amber-600 hover:bg-amber-100' : 'text-emerald-600 hover:bg-emerald-100'}`} title={isPlaying ? "Остановить чтение" : "Слушать текст"}>
                            {isPlaying ? <Icons.Square c="w-5 h-5 fill-current"/> : <Icons.Play c="w-5 h-5 fill-current"/>}
                        </button>
                    </div>
                    {apiError && <span className="text-[9px] text-rose-500 font-bold uppercase mt-1 px-1">{apiError}</span>}
                </div>
            );
        }

                {id:'mesopotamia', label:'Шумер/Вавилон', period:'~3500 до н.э.', emoji:'𒀭', color:'#b45309', desc:'Мардук, Инанна, Энлиль. Энума Элиш.', children:['zoroastrism','proto-semitic']},
                {id:'proto-semitic', label:'Прасемитская религия', period:'~2000 до н.э.', emoji:'⭐', color:'#0369a1', desc:'Авраам. Монотеистический импульс.', children:['judaism']},
                {id:'vedic', label:'Ведическая религия', period:'~1500 до н.э.', emoji:'🕉️', color:'#ea580c', desc:'Агни, Индра, Варуна. Веды.', children:['hinduism','buddhism']},
                {id:'zoroastrism', label:'Зороастризм', period:'~1200 до н.э.', emoji:'🔥', color:'#dc2626', desc:'Заратустра. Ахура Мазда vs Ариман. Добро vs Зло.', children:['judaism']},
                {id:'judaism', label:'Иудаизм', period:'~600 до н.э.', emoji:'✡️', color:'#1d4ed8', desc:'Моисей, Тора, Тальмуд, синагога.', children:['christianity','islam']},
                {id:'hinduism', label:'Индуизм', period:'~500 до н.э.', emoji:'🕉️', color:'#ea580c', desc:'Брахман/Атман, Тримурти, мокша.', children:['sikhism']},
                {id:'buddhism', label:'Буддизм', period:'~500 до н.э.', emoji:'☸️', color:'#ca8a04', desc:'Будда. 4 истины. Нирвана.', children:['zen']},
                {id:'greco-roman', label:'Греко-римская', period:'~700 до н.э.', emoji:'🏛️', color:'#7c3aed', desc:'Олимп. Зевс, Гера, Аполлон. Философия.', children:['christianity']},
                {id:'christianity', label:'Христианство', period:'~30 н.э.', emoji:'✝️', color:'#92400e', desc:'Иисус Христос. Библия. Троица.', children:['islam']},
                {id:'islam', label:'Ислам', period:'~610 н.э.', emoji:'☪️', color:'#065f46', desc:'Мухаммад ﷺ. Коран. 5 столпов.', children:[]},
                {id:'sikhism', label:'Сикхизм', period:'~1500 н.э.', emoji:'🪯', color:'#6d28d9', desc:'Гуру Нанак. Эк Онкар.', children:[]},
                {id:'zen', label:'Дзен-буддизм', period:'~500 н.э.', emoji:'🧘', color:'#065f46', desc:'Медитация. Коаны. Сатори.', children:[]},
                {id:'shinto', label:'Синтоизм', period:'~300 до н.э.', emoji:'⛩️', color:'#be185d', desc:'Ками. Природа священна.', children:[]},
                {id:'confucianism', label:'Конфуцианство', period:'~500 до н.э.', emoji:'🏮', color:'#9f1239', desc:'Конфуций. Жэнь. Ли.', children:[]},
                {id:'taoism', label:'Даосизм', period:'~400 до н.э.', emoji:'☯️', color:'#374151', desc:'Лао-цзы. Дао. У-вэй.', children:[]},
            ];
            const treeById = Object.fromEntries(TREE.map(n => [n.id, n]));
            const CONNECTIONS = [
                {from:'proto', to:'mesopotamia', label:'Натурализм'},
                {from:'proto', to:'vedic', label:'Арийские миграции'},
                {from:'proto', to:'egypt', label:'Нильская культура'},
                {from:'proto', to:'shinto', label:'Японские острова'},
                {from:'proto', to:'confucianism', label:'Китайская традиция'},
                {from:'proto', to:'taoism', label:'Даосский путь'},
                {from:'mesopotamia', to:'zoroastrism', label:'Иранское плато'},
                {from:'mesopotamia', to:'proto-semitic', label:'Семитский контакт'},
                {from:'egypt', to:'greco-roman', label:'Эллинизм'},
                {from:'proto-semitic', to:'judaism', label:'Завет Авраама'},
                {from:'zoroastrism', to:'judaism', label:'Рай/ад/воскресение'},
                {from:'greco-roman', to:'christianity', label:'Философия Логоса'},
                {from:'vedic', to:'hinduism', label:'Упанишады'},
                {from:'vedic', to:'buddhism', label:'Реакция на брахманизм'},
                {from:'judaism', to:'christianity', label:'Мессия из Торы'},
                {from:'judaism', to:'islam', label:'Авраамический монотеизм'},
                {from:'christianity', to:'islam', label:'Иса — пророк'},
                {from:'hinduism', to:'sikhism', label:'Пенджаб XV в.'},
                {from:'buddhism', to:'zen', label:'Чань → Дзен'},
            ];

            return (
                <div className="flex flex-col gap-6 fade-in-up pb-12">
                    {/* Шапка */}
                    <div className="bg-[#1c1b1d] text-stone-100 p-8 md:p-12 rounded-3xl shadow-xl relative overflow-hidden border border-stone-800">
                        <div className="relative z-10">
                            <h2 className="text-3xl md:text-4xl font-serif font-bold mb-3 text-white">Академия Религиоведения 🧠</h2>
                            <p className="text-stone-400 text-base md:text-lg mb-6 max-w-2xl leading-relaxed">
                                Сравнительное изучение 10 мировых религий · Библия · Коран · Священные тексты · AI-анализ <strong className="text-amber-500">ZVENO AI</strong>
                            </p>
                            {!apiKey && (

                                    ⚙️ Подключить ZVENO AI <Icons.Key c="w-4 h-4"/>
                                </button>
                            )}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
                                {[['10','Религий'],['19','Манускриптов'],['6236','Аятов Корана'],['66','Книг Библии']].map(([v,l])=>(
                                    <div key={l} className="bg-white/5 rounded-xl p-3 text-center border border-stone-800">

                                    </div>
                                ))}
                            </div>
                        </div>
                        <Icons.Sparkles c="absolute -right-10 -bottom-20 w-72 h-72 text-stone-800 opacity-20 pointer-events-none"/>
                    </div>

                    {/* ДРЕВО РЕЛИГИЙ */}
                    <div className="bg-white border border-stone-200 rounded-3xl p-6 md:p-8">
                        <div className="flex items-center gap-3 mb-2">
                            <span className="text-3xl">🌳</span>
                            <h3 className="font-serif font-bold text-2xl text-stone-900">Древо мировых религий</h3>
                        </div>
                        <p className="text-stone-500 text-sm mb-6">Генеалогия и связи — от первобытных верований до современных традиций</p>

                        {/* Временная ось */}

                            <div className="min-w-[700px]">
                                {/* Горизонтальные уровни по времени */}

                                    {era:'Праистория', period:'300 000–3500 до н.э.', nodes:['proto'], bg:'#fef9c3'},

                                    {era:'Ранняя эра н.э.', period:'1–700 н.э.', nodes:['christianity','islam','shinto','zen'], bg:'#eff6ff'},

                                ].map(row => (

        // --- АККОРДЕОН ДЛЯ AI ОТВЕТА ---
        function AiAccordion({ html, isBible }) {
            // Первый раздел открыт по умолчанию
            const [openSections, setOpenSections] = React.useState({ 0: true });

            const sections = React.useMemo(() => {
                if (!html) return [];
                // Создаём временный DOM-элемент для парсинга
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                const children = Array.from(tmp.children); // только элементы, не текстовые узлы
                
                const result = [];
                let current = null;

                children.forEach(el => {
                    const tag = el.tagName.toLowerCase();
                    if (tag === 'h1' || tag === 'h2' || tag === 'h3') {
                        if (current) result.push(current);
                        current = { title: el.textContent.trim(), bodyHtml: '' };
                    } else {
                        if (!current) {
                            // Текст до первого заголовка — общий раздел
                            if (result.length === 0 || result[0].__intro !== true) {
                                result.unshift({ title: '📋 Краткое резюме', bodyHtml: '', __intro: true });
                            }
                            result[0].bodyHtml += el.outerHTML;
                        } else {
                            current.bodyHtml += el.outerHTML;
                        }
                    }
                });
                if (current) result.push(current);
                // Убираем пустые секции
                return result.filter(s => s.title && (s.bodyHtml.trim().length > 0));
            }, [html]);

            // Нет разделов или один без заголовка — рендерим как есть
            if (sections.length === 0) {
                return <div className="ai-content leading-relaxed text-sm" dangerouslySetInnerHTML={{ __html: html }}/>;
            }

            // Если только один раздел — без аккордеона, просто контент
            if (sections.length === 1) {
                return (
                    <div className={`rounded-xl border p-4 ${isBible ? 'border-amber-100 bg-amber-50/50' : 'border-emerald-100 bg-emerald-50/50'}`}>
                        <div className="ai-content text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: sections[0].bodyHtml }}/>
                    </div>
                );
            }

            const toggle = (i) => setOpenSections(prev => ({ ...prev, [i]: !prev[i] }));
            const A = isBible
                ? { border: 'border-amber-300', activeBg: 'bg-amber-50', activeText: 'text-amber-800', dot: 'bg-amber-500', hdr: 'hover:bg-amber-50/60' }
                : { border: 'border-emerald-300', activeBg: 'bg-emerald-50', activeText: 'text-emerald-800', dot: 'bg-emerald-500', hdr: 'hover:bg-emerald-50/60' };

            return (
                <div className="space-y-1.5 font-sans">
                    {sections.map((sec, i) => {
                        const isOpen = !!openSections[i];
                        return (
                            <div key={i} className={`rounded-xl overflow-hidden border transition-all duration-200 ${isOpen ? A.border : 'border-stone-200'}`}>
                                {/* Заголовок-кнопка */}
                                <button
                                    type="button"
                                    onClick={() => toggle(i)}
                                    className={`w-full flex items-center justify-between px-4 py-3 text-left transition-colors duration-150 ${isOpen ? A.activeBg : 'bg-white ' + A.hdr}`}>
